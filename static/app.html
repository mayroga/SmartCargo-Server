<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AL CIELO - SmartCargo Advisory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* Tus Estilos Originales */
body { font-family: 'Inter', Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px; color:#111; }
h1 { text-align:center; color:#0a3d62; margin-bottom:20px; }
.collapsible { background-color:#0a3d62; color:white; cursor:pointer; padding:10px; width:100%; border:none; text-align:left; outline:none; font-size:16px; border-radius:5px; margin-bottom:5px; }
.active, .collapsible:hover { background-color:#062c47; }
.content { padding:0 15px; display:none; overflow:hidden; background-color:#f9f9f9; border-radius:5px; margin-bottom:10px; }
label { display:block; margin:8px 0 4px; font-weight:500; }
input, select, textarea { padding:8px; width:100%; margin-bottom:10px; border-radius:4px; border:1px solid #ccc; box-sizing: border-box; }
.docs, .tip, .checklist { background:#eef; padding:8px; margin:5px 0; border-radius:4px; font-size:14px; }
.result { font-size:18px; font-weight:bold; margin-top:15px; white-space:pre-wrap; }
.alert { color:red; font-weight:bold; margin:5px 0; }
.checklist input { margin-right:8px; }

/* Nuevos Estilos Agregados */
.lang-bar { text-align: right; margin-bottom: 15px; }
.btn-lang { padding: 5px 15px; cursor: pointer; border-radius: 20px; border: 1px solid #0a3d62; background: white; font-weight: bold; }
.btn-lang.active { background: #0a3d62; color: white; }
.analysis-box { background: #fffde7; border: 2px solid #0a3d62; height: 100px; font-family: monospace; }
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin: 10px 0; }
.photo-item { border: 1px solid #ddd; padding: 5px; background: white; border-radius: 5px; text-align: center; }
.photo-item img { max-width: 100%; height: 80px; object-fit: cover; }
</style>
</head>
<body>

<div class="lang-bar">
    <button class="btn-lang active" onclick="setLang('es')">ESPAÑOL</button>
    <button class="btn-lang" onclick="setLang('en')">ENGLISH</button>
</div>

<h1 id="txtTitle">AL CIELO - SmartCargo Advisory</h1>

<label id="txtAnalysis">Cuadro de Análisis (Análisis, Voz, Copiar/Pegar):</label>
<textarea id="analisisTexto" class="analysis-box" placeholder="Pegue aquí el manifiesto o describa la carga..."></textarea>

<button class="collapsible" id="txtSec1">I. Identificación y Rol</button>
<div class="content">
<label for="rolUsuario" id="txtRol">Rol del Usuario:</label>
<select id="rolUsuario" onchange="updateRolFields()">
<option value="">Seleccione</option>
<option value="Forwarder">Forwarder</option>
<option value="Chofer">Chofer / Camionero</option>
<option value="AgenteWarehouse">Agente Warehouse</option>
<option value="CounterAgent">Counter Agent</option>
</select>
<p id="avisoRol" class="tip"></p>
<label for="awb">AWB:</label>
<input type="text" id="awb" placeholder="045-12345678">
</div>

<button class="collapsible" id="txtSecPhotos">II. Fotos de la Mercancía</button>
<div class="content">
    <label id="txtPhotoLabel">Subir fotos (Aparecerán en reportes):</label>
    <input type="file" id="fotoInput" accept="image/*" multiple onchange="previewPhotos()">
    <div class="photo-grid" id="photoGrid"></div>
</div>

<button class="collapsible" id="txtSec3">III. Dimensiones y Peso</button>
<div class="content">
<label id="txtPcs">Piezas:</label>
<input type="number" id="piezas" value="1">
<label id="txtWeight">Peso Total (kg):</label>
<input type="number" id="pesoTotal" oninput="calcularVolumen()">
<label>L (cm):</label> <input type="number" id="largo" oninput="calcularVolumen()">
<label>W (cm):</label> <input type="number" id="ancho" oninput="calcularVolumen()">
<label>H (cm):</label> <input type="number" id="alto" oninput="calcularVolumen()">
<label>Peso Volumétrico (kg):</label>
<input type="text" id="pesoVolumetrico" readonly style="background:#eee">
<p id="alertDimensiones" class="alert"></p>
</div>

<button class="collapsible" id="txtSec4">IV. Seguridad y Checklist</button>
<div class="content">
<div class="checklist">
<label><input type="checkbox" id="chkDGR"> DGR / MSDS</label>
<label><input type="checkbox" id="chkPerecederos"> Perecederos / Cert. Fitosanitario</label>
<label><input type="checkbox" id="chkAnimales"> AVI / Cert. Veterinario</label>
<label><input type="checkbox" id="chkEmbalaje"> Embalaje y Flejes</label>
<label><input type="checkbox" id="chkSobres"> Sobres: Originales INSIDE / Copias OUTSIDE</label>
</div>
</div>

<button class="collapsible" id="txtSec5">V. Validación Final</button>
<div class="content">
<button onclick="evaluarCarga()" style="background:red; color:white; padding:15px; width:100%; border:none; border-radius:5px; font-weight:bold; cursor:pointer;" id="txtBtnEval">EVALUAR CARGA</button>
<div id="resultadoFinal" class="result"></div>
</div>

<script>
let currentLang = 'es';

// Función para cambiar idioma completo
function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.btn-lang').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    
    const t = {
        es: { title: "AL CIELO - SmartCargo Advisory", sec1: "I. Identificación y Rol", secPhotos: "II. Fotos de la Mercancía", sec3: "III. Dimensiones y Peso", sec4: "IV. Seguridad y Checklist", btn: "EVALUAR CARGA" },
        en: { title: "AL CIELO - Smart Cargo Advisory", sec1: "I. ID & Role", secPhotos: "II. Cargo Photos", sec3: "III. Weight & Dimensions", sec4: "IV. Security Checklist", btn: "EVALUATE CARGO" }
    };
    document.getElementById('txtTitle').innerText = t[lang].title;
    document.getElementById('txtSec1').innerText = t[lang].sec1;
    document.getElementById('txtSecPhotos').innerText = t[lang].secPhotos;
    document.getElementById('txtSec3').innerText = t[lang].sec3;
    document.getElementById('txtSec4').innerText = t[lang].sec4;
    document.getElementById('txtBtnEval').innerText = t[lang].btn;
}

// Previsualización de fotos
function previewPhotos() {
    const grid = document.getElementById('photoGrid');
    const files = document.getElementById('fotoInput').files;
    grid.innerHTML = "";
    Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
            grid.innerHTML += `<div class="photo-item"><img src="${e.target.result}"><br><span>OK</span></div>`;
        };
        reader.readAsDataURL(file);
    });
}

// Lógica original de colapsables
document.querySelectorAll(".collapsible").forEach(btn => {
    btn.onclick = function() {
        this.classList.toggle("active");
        let content = this.nextElementSibling;
        content.style.display = content.style.display === "block" ? "none" : "block";
    }
});

function calcularVolumen() {
    const L = +document.getElementById('largo').value || 0;
    const W = +document.getElementById('ancho').value || 0;
    const H = +document.getElementById('alto').value || 0;
    const vol = (L * W * H) / 6000;
    document.getElementById('pesoVolumetrico').value = vol.toFixed(2);
    
    let msg = "";
    if(H > 160) msg = currentLang === 'es' ? "⚠️ Solo Main Deck." : "⚠️ Main Deck Only.";
    document.getElementById('alertDimensiones').innerText = msg;
}

async function evaluarCarga() {
    const resDiv = document.getElementById('resultadoFinal');
    resDiv.innerHTML = "...";
    
    const data = {
        lang: currentLang,
        analisisTexto: document.getElementById('analisisTexto').value,
        rolUsuario: document.getElementById('rolUsuario').value,
        awb: document.getElementById('awb').value,
        piezas: document.getElementById('piezas').value,
        pesoTotal: document.getElementById('pesoTotal').value,
        alto: document.getElementById('alto').value,
        pesoVolumetrico: document.getElementById('pesoVolumetrico').value,
        chkDGR: document.getElementById('chkDGR').checked,
        chkPerecederos: document.getElementById('chkPerecederos').checked,
        chkAnimales: document.getElementById('chkAnimales').checked,
        chkEmbalaje: document.getElementById('chkEmbalaje').checked
    };

    try {
        const res = await fetch('/api/evaluar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        
        let html = `<div style="padding:15px; border-radius:10px; background:${result.status.includes('READY')?'#dff9fb':'#ffbe76'}">`;
        html += `<h2>${result.status}</h2>`;
        html += "<ul>" + result.errores.map(e => `<li style="color:red">${e}</li>`).join('') + "</ul>";
        html += "<h3>Acciones:</h3><ul>" + result.soluciones.map(s => `<li>${s}</li>`).join('') + "</ul></div>";
        resDiv.innerHTML = html;

        // Voz en el idioma seleccionado
        const utterance = new SpeechSynthesisUtterance(result.status + ". " + (result.errores[0] || ""));
        utterance.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
        speechSynthesis.speak(utterance);

    } catch (err) { resDiv.innerHTML = "Error."; }
}

function updateRolFields() {
    const rol = document.getElementById('rolUsuario').value;
    document.getElementById('avisoRol').innerText = (rol === "Chofer") ? "Tip: Revise sellos." : "";
}
</script>
</body>
</html>
