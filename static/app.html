<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO | SMARTCARGO ADVISORY</title>
    <style>
        :root { --avianca-red: #e11a22; --black: #000000; --gold: #d4a017; --gray: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: #ddd; margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: auto; background: white; border: 4px solid var(--black); box-shadow: 10px 10px 0px rgba(0,0,0,0.2); }
        .header { background: var(--black); color: white; padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--avianca-red); }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .section { border: 1px solid #ccc; padding: 20px; border-radius: 4px; background: white; }
        h3 { background: var(--black); color: white; padding: 10px; margin-top: 0; font-size: 14px; text-transform: uppercase; border-left: 10px solid var(--avianca-red); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; font-weight: bold; box-sizing: border-box; }
        .piece-table { width: 100%; border-collapse: collapse; }
        .piece-table th { background: #eee; padding: 10px; font-size: 11px; border: 1px solid #ccc; }
        .piece-row td { border: 1px solid #ccc; padding: 5px; }
        .btn-group { padding: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .btn { padding: 15px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-red { background: var(--avianca-red); color: white; }
        .btn-black { background: var(--black); color: white; }
        .result-panel { display: none; padding: 25px; background: #fff; border: 5px solid var(--black); margin: 20px; }
        .alert-item { background: #fff1f1; border-left: 5px solid var(--avianca-red); padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; letter-spacing:2px;">AL CIELO | ASESORÍA SMARTCARGO</h1>
            <small>ESTACIÓN: MIAMI FL (MIA) | GATEWAY: AVIANCA CARGO (045)</small>
        </div>
        <button class="btn btn-black" onclick="location.reload()">BORRAR DATOS</button>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="section">
                <h3>I. Identificación y Seguridad (TSA/IATA)</h3>
                <input type="text" id="awb" placeholder="GUÍA AÉREA (045-XXXXXXXX)">
                <input type="text" id="descripcion_carga" placeholder="DESCRIPCIÓN ESPECÍFICA (EJ: REPUESTOS AERONÁUTICOS)">
                <select id="known_shipper">
                    <option value="true">SHIPPER CONOCIDO</option>
                    <option value="false">SHIPPER DESCONOCIDO</option>
                </select>
                <select id="naturaleza" onchange="actualizarChecks()">
                    <option value="GENERAL">CARGA GENERAL (GEN)</option>
                    <option value="DGR">MERCANCÍA PELIGROSA (DGR)</option>
                    <option value="PER">PERECEDEROS (PER)</option>
                    <option value="VAL">VALORES (VAL)</option>
                </select>
            </div>
            <div class="section" style="margin-top:20px;">
                <h3>II. Auditoría de Documentos</h3>
                <div id="check_area" style="background:#f9f9f9; padding:10px; border:1px dashed #999; margin-bottom:10px;"></div>
                <textarea id="docs_texto" placeholder="Notas adicionales del Pouch..."></textarea>
            </div>
        </div>

        <div class="right-col">
            <div class="section">
                <h3>III. Auditoría Física (Entrada Manual)</h3>
                <table class="piece-table">
                    <thead>
                        <tr><th>CANT</th><th>L</th><th>W</th><th>H</th><th>PESO (LB)</th><th>FOTO</th></tr>
                    </thead>
                    <tbody id="piezas_body"></tbody>
                </table>
                <button class="btn btn-black" style="width:100%; margin-top:10px;" onclick="addPiece()">+ AGREGAR ESTIBA / PIEZA</button>
            </div>
            <div class="section" style="margin-top:20px;">
                <h3>IV. Reporte del Inspector</h3>
                <textarea id="voz_texto" rows="4" placeholder="Reporte de daños, sellos o discrepancias físicas..."></textarea>
                <input type="file" id="bulk_photo" style="font-size:10px;">
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-black" onclick="window.print()">GENERAR PDF REPORTE</button>
        <button class="btn btn-red" onclick="procesar()">ASESORAR Y VALIDAR</button>
        <button class="btn btn-black">BORRAR / RESET</button>
    </div>

    <div id="resultados" class="result-panel"></div>
</div>

<script>
function addPiece() {
    const tr = document.createElement('tr');
    tr.className = 'piece-row';
    tr.innerHTML = `
        <td><input type="number" class="p_cant" value="1"></td>
        <td><input type="number" class="p_l" placeholder="L"></td>
        <td><input type="number" class="p_w" placeholder="W"></td>
        <td><input type="number" class="p_h" placeholder="H"></td>
        <td><input type="number" class="p_real" placeholder="LB"></td>
        <td><input type="file" capture="environment" accept="image/*" style="width:80px; font-size:9px;"></td>
    `;
    document.getElementById('piezas_body').appendChild(tr);
}

function actualizarChecks() {
    const nat = document.getElementById('naturaleza').value;
    const area = document.getElementById('check_area');
    const docs = {
        "GENERAL": ["Factura Original", "Packing List", "AWB Firmada"],
        "DGR": ["Shipper's Declaration", "MSDS", "Etiquetas Clase"],
        "PER": ["Cert. Fitosanitario", "Instrucción Temp"],
        "VAL": ["Manifiesto VAL", "Custodia Armada"]
    };
    area.innerHTML = docs[nat].map(d => `<label><input type="checkbox" class="doc_check" value="${d}"> ${d}</label><br>`).join('');
}

async function procesar() {
    const piezas = [];
    document.querySelectorAll('.piece-row').forEach(r => {
        piezas.push({
            cant: r.querySelector('.p_cant').value,
            l: r.querySelector('.p_l').value,
            w: r.querySelector('.p_w').value,
            h: r.querySelector('.p_h').value,
            p_real: r.querySelector('.p_real').value
        });
    });

    const payload = {
        awb: document.getElementById('awb').value,
        naturaleza: document.getElementById('naturaleza').value,
        known_shipper: document.getElementById('known_shipper').value === "true",
        descripcion_carga: document.getElementById('descripcion_carga').value,
        docs_texto: document.getElementById('docs_texto').value,
        docs_check: Array.from(document.querySelectorAll('.doc_check:checked')).map(c => c.value),
        piezas: piezas
    };

    const res = await fetch('/api/validar_carga', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    
    const data = await res.json();
    const resDiv = document.getElementById('resultados');
    resDiv.style.display = 'block';
    let html = `<h2 style="color:var(--avianca-red)">ESTADO: ${data.status}</h2>`;
    html += `<h4>COBRABLE: ${data.p_cobrable} LBS | EQUIPO: ${data.recomendacion_vuelo}</h4><hr>`;
    data.alertas.forEach((a, i) => {
        html += `<div class="alert-item"><strong>⚠️ ${a}</strong><br><small>${data.explicaciones[i]}</small><br><i>Riesgo: ${data.riesgos[i]}</i></div>`;
    });
    resDiv.innerHTML = html;
    resDiv.scrollIntoView();
}

addPiece();
actualizarChecks();
</script>
</body>
</html>
