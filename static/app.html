<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMARTCARGOSERVER</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
    font-family: 'Inter', sans-serif;
    background: #f7f7f7;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 900px;
    margin: 2rem auto;
    padding: 1rem;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #333;
}

.question-block {
    margin-bottom: 2rem;
}

.question-text {
    font-weight: 600;
    margin-bottom: 0.5rem;
}

.why {
    background: #fff7e6;
    padding: 0.5rem;
    border-left: 5px solid orange;
    margin-bottom: 0.5rem;
    border-radius: 4px;
}

.instruction {
    background: #e9f5ff;
    padding: 0.75rem;
    border-left: 5px solid #0077cc;
    margin-bottom: 0.5rem;
    border-radius: 4px;
}

.alert {
    background: #ffe5e5;
    border-left: 5px solid red;
    padding: 0.75rem;
    margin-bottom: 0.5rem;
    border-radius: 4px;
}

select,
input {

    width: 100%;
    padding: 0.5rem;
    margin-bottom: 0.5rem;
    border-radius: 4px;
    border: 1px solid #ccc;
    font-size: 1rem;

}

button {

    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    border: none;
    border-radius: 6px;
    background: #0077cc;
    color: #fff;
    cursor: pointer;

}

button:disabled {

    background: #aaa;
    cursor: not-allowed;

}

.summary {

    background: #f0f0f0;
    padding: 1rem;
    border-radius: 6px;
    margin-top: 1rem;

}

</style>

</head>

<body>

<div class="container">

    <h1>SMARTCARGOSERVER — Validación RFC</h1>

    <div id="question-container"></div>

    <button id="next-btn">Siguiente</button>

    <div id="summary" class="summary" style="display:none;"></div>

</div>


<!-- IMPORTANTE: ruta correcta -->

<script src="/static/app.js"></script>

</body>
</html>
