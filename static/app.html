<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - SmartCargo Advisory MIA</title>
    <style>
        :root { --green: #22c55e; --red: #ef4444; --yellow: #facc15; --bg: #0b0f14; --card: #1f2937; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #ffffff; margin: 0; padding: 0; padding-bottom: 50px; }
        header { background: #111827; padding: 20px; font-size: 20px; font-weight: bold; border-bottom: 3px solid var(--green); text-align: center; letter-spacing: 1px; }
        .container { padding: 15px; max-width: 850px; margin: auto; }
        .card { background: var(--card); padding: 20px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #374151; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h3 { margin-top: 0; color: var(--green); font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #374151; padding-bottom: 10px; margin-bottom: 15px; }
        
        .step-box { background: #111827; padding: 10px; border-left: 4px solid var(--green); margin-bottom: 6px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .qty-badge { background: var(--green); color: black; font-weight: bold; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        .base-doc { border-color: var(--yellow); background: rgba(250, 204, 21, 0.05); }

        label { display: block; margin-top: 15px; font-weight: bold; font-size: 11px; color: #9ca3af; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #111827; color: white; border: 1px solid #4b5563; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        
        .piece-row { background: #111827; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .grid-pieces { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .vol-display { color: var(--yellow); font-size: 12px; font-weight: bold; margin-top: 8px; display: block; }
        .img-preview { max-width: 120px; margin-top: 10px; border-radius: 5px; border: 1px solid var(--green); display: none; }

        .uld-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .btn-uld { background: #374151; color: white; border: 1px solid var(--green); padding: 12px; font-size: 11px; cursor: pointer; border-radius: 6px; }
        .btn-uld.active { background: var(--green); color: black; font-weight: bold; }

        .voice-controls { display: flex; gap: 10px; margin-top: 10px; }
        .btn-mic { background: #374151; flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 8px; border-radius: 6px; border: 1px solid #4b5563; color: white; cursor: pointer; }
        .btn-mic.recording { background: var(--red); animation: pulse 1.5s infinite; }
        .btn-scan { background: var(--green); color: black; font-weight: bold; width: 140px; border: none; border-radius: 6px; cursor: pointer; }

        .warning-live { color: var(--red); background: rgba(239, 68, 68, 0.1); padding: 12px; border-radius: 6px; border: 1px solid var(--red); margin-top: 10px; display: none; font-weight: bold; font-size: 12px; }
        button.main-exec { background: var(--green); color: black; font-weight: 800; border: none; padding: 20px; width: 100%; cursor: pointer; border-radius: 8px; font-size: 18px; margin-top: 20px; text-transform: uppercase; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>🚀 AL CIELO: SMARTCARGO ADVISORY - MIA TERMINAL</header>

<div class="container">

    <div class="card">
        <h3>1. 📂 PROTOCOLO DE SOBRE (POUCH) - MIA</h3>
        <label>TIPO DE CARGA / COMMODITY</label>
        <select id="cargo_type" onchange="updatePouch()">
            <option value="GENERAL">GENERAL CARGO</option>
            <option value="DGR">DANGEROUS GOODS (DG)</option>
            <option value="PER">PERISHABLE (PER)</option>
            <option value="PHR">PHARMA</option>
            <option value="HUM">HUMAN REMAINS (HUM)</option>
            <option value="DRY">DRY ICE (CO2)</option>
        </select>
        
        <div id="pouch_content" style="margin-top: 15px;">
            </div>
    </div>

    <div class="card">
        <h3>2. 📦 AUDITORÍA DE PIEZAS E IMAGEN</h3>
        <div id="pieces_list"></div>
        <button onclick="addPieceRow()" style="background: transparent; color: var(--green); border: 1px dashed var(--green); padding: 10px; font-size: 13px; cursor: pointer; width: 100%; border-radius: 6px; margin-bottom: 15px;">+ AGREGAR PIEZA / PALLET</button>

        <label>IDENTIFICACIÓN DE ULD (POSICIÓN AVION)</label>
        <div class="uld-grid">
            <button class="btn-uld" onclick="selectULD(this, 'PMC')">PMC/P6P (LOWER/MAIN)</button>
            <button class="btn-uld" onclick="selectULD(this, 'PAG')">PAG/P1P (LOWER/MAIN)</button>
            <button class="btn-uld" onclick="selectULD(this, 'AKE')">AKE/LD3 (LOWER ONLY)</button>
        </div>
        <input type="hidden" id="uld_type" value="">
        <div id="uld_desc" style="font-size: 11px; color: var(--yellow); margin-top: 8px;"></div>

        <label>TIPO DE EMBALAJE / PACKAGING</label>
        <select id="packaging_type">
            <option value="">-- SELECCIONE --</option>
            <option value="PALLET_WD">PALLET DE MADERA (WOOD)</option>
            <option value="PALLET_PL">PALLET DE PLÁSTICO</option>
            <option value="BOXES">BOXES (CARTON)</option>
            <option value="CRATES">CRATES (WOODEN)</option>
            <option value="DRUMS">DRUMS (METAL/PLASTIC)</option>
            <option value="ENGINE">ENGINE STAND</option>
            <option value="SKIPS">SKIPS / METAL BOXES</option>
        </select>
    </div>

    <div class="card">
        <h3>3. 🎤 AURA SCAN: DICTADO CRÍTICO</h3>
        <div class="voice-controls">
            <button id="btn_mic" class="btn-mic" onclick="startVoice()">🎤 DICTAR</button>
            <button class="btn-scan" onclick="runMiniScan()">🔍 SCAN RÁPIDO</button>
        </div>
        <textarea id="input_texto" rows="2" placeholder="Dictado o detalles de daños/madera..."></textarea>
        <div id="critical_warning" class="warning-live"></div>
    </div>

    <button class="main-exec" onclick="executePreCheck()">VERIFICAR CUMPLIMIENTO FINAL</button>

    <div id="result_area" class="hidden" style="margin-top: 25px;">
        <div id="decision_box" style="padding: 20px; font-size: 22px; font-weight: 900; text-align: center; border-radius: 12px; margin-bottom: 20px;"></div>
        <div class="card" style="background: #000; border: 2px solid var(--green);">
            <h3 id="res_title">ORDENES DE ACCIÓN</h3>
            <div id="instructions_list" style="font-size: 14px;"></div>
        </div>
    </div>
</div>

<script>
    const pouchData = {
        "BASE": [
            {n: "AWB ORIGINAL", q: "TOP"},
            {n: "COMMERCIAL INVOICE", q: "REQ"},
            {n: "PACKING LIST", q: "REQ"},
            {n: "ID / RESP. SHIPPER", q: "REQ"}
        ],
        "GENERAL": [
            {n: "AWB (1+3 COPIAS)", q: "MIA-STD"},
            {n: "COMMERCIAL INVOICE", q: "1 ORIG + 2 COP"},
            {n: "PACKING LIST DETALLADO", q: "ORIG"},
            {n: "CARTA RESPONSABILIDAD", q: "FIRMA"}
        ],
        "DGR": [
            {n: "AWB ORIGINAL (1+4 COPIAS)", q: "DGR-STD"},
            {n: "SHIPPER DECLARATION", q: "3 ORIG B. ROJO"},
            {n: "MSDS (HOJA SEGURIDAD)", q: "REQ"},
            {n: "DG CHECKLIST", q: "AV-OK"}
        ],
        "PER": [
            {n: "AWB (1+3 COPIAS)", q: "PER-STD"},
            {n: "CERT. FITOSANITARIO/USDA", q: "ORIG"},
            {n: "TEMPERATURE LOG", q: "SI APLICA"},
            {n: "INVOICE + PACKING", q: "2 COP"}
        ],
        "PHR": [
            {n: "AWB (1+3 COPIAS)", q: "PHR-STD"},
            {n: "CERT. CALIDAD / LOTE", q: "REQ"},
            {n: "TEMPERATURE DECLARATION", q: "ORIG"},
            {n: "INVOICE / PACKING", q: "REQ"}
        ],
        "HUM": [
            {n: "AWB (1+3 COPIAS)", q: "HUM-STD"},
            {n: "CERT. DEFUNCIÓN", q: "ORIG"},
            {n: "EMBALMING CERTIFICATE", q: "ORIG"},
            {n: "FUNERAL HOME LETTER", q: "ORIG"}
        ],
        "DRY": [
            {n: "AWB (DRY ICE NOTATION)", q: "REQ"},
            {n: "DECLARACIÓN IATA CO2", q: "ORIG"},
            {n: "MARCAJE KG HIELO SECO", q: "VISIB"},
            {n: "MSDS", q: "SI ES DG/PHR"}
        ]
    };

    function updatePouch() {
        const type = document.getElementById("cargo_type").value;
        const container = document.getElementById("pouch_content");
        
        let html = `<b>BASE DOCUMENTAL UNIVERSAL:</b>`;
        html += pouchData["BASE"].map(item => `
            <div class="step-box base-doc"><span>${item.n}</span><span class="qty-badge">${item.q}</span></div>
        `).join("");

        html += `<b style="margin-top:10px; display:block;">REQUISITOS ESPECÍFICOS ${type}:</b>`;
        html += pouchData[type].map(item => `
            <div class="step-box"><span>${item.n}</span><span class="qty-badge">${item.q}</span></div>
        `).join("");
        
        container.innerHTML = html;
    }

    function addPieceRow() {
        const container = document.getElementById("pieces_list");
        const div = document.createElement("div");
        div.className = "piece-row";
        div.innerHTML = `
            <div class="grid-pieces">
                <input type="number" placeholder="L(in)" class="p-l" oninput="updatePiece(this)">
                <input type="number" placeholder="W(in)" class="p-w" oninput="updatePiece(this)">
                <input type="number" placeholder="H(in)" class="p-h" oninput="updatePiece(this)">
                <input type="number" placeholder="Kg" class="p-p">
                <input type="file" accept="image/*" onchange="preview(this)" style="display:none;" id="f_${Date.now()}">
                <button onclick="this.previousElementSibling.click()" style="background:var(--green); border:none; border-radius:4px; font-size:10px; cursor:pointer;">FOTO</button>
            </div>
            <span class="vol-display">Volumen: <span class="v-val">0</span> kgv</span>
            <img class="img-preview">
        `;
        container.appendChild(div);
    }

    function updatePiece(el) {
        const row = el.closest(".piece-row");
        const l = row.querySelector(".p-l").value || 0;
        const w = row.querySelector(".p-w").value || 0;
        const h = row.querySelector(".p-h").value || 0;
        const vol = Math.round((l * w * h) / 166);
        row.querySelector(".v-val").innerText = vol;
        row.querySelector(".p-h").style.border = h > 63 ? "2px solid var(--red)" : "1px solid #4b5563";
    }

    function preview(input) {
        const img = input.closest(".piece-row").querySelector(".img-preview");
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { img.src = e.target.result; img.style.display = "block"; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function selectULD(btn, type) {
        document.querySelectorAll('.btn-uld').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById("uld_type").value = type;
        const desc = document.getElementById("uld_desc");
        if(type==='AKE') desc.innerText = "AKE: Contenedor para Lower Deck (Bodega). Límite 63in altura.";
        else desc.innerText = `${type}: Pallet compatible con Main y Lower Deck. Revisar contorno según avión.`;
    }

    function startVoice() {
        const btn = document.getElementById("btn_mic");
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("No soportado");
        const rec = new Speech();
        rec.lang = 'es-ES';
        rec.onstart = () => btn.classList.add("recording");
        rec.onend = () => btn.classList.remove("recording");
        rec.onresult = e => { document.getElementById("input_texto").value = e.results[0][0].transcript; runMiniScan(); };
        rec.start();
    }

    function runMiniScan() {
        const t = document.getElementById("input_texto").value.toUpperCase();
        const warn = document.getElementById("critical_warning");
        let msg = "";
        if((t.includes("MADERA") || t.includes("PALLET")) && !t.includes("SELLO")) msg = "❌ ERROR: Madera sin sello ISPM15. RECHAZO USDA INMINENTE.";
        else if(t.includes("DAÑADO") || t.includes("MOJADO")) msg = "❌ ERROR: Empaque comprometido. Rechazo TSA/Avianca.";
        
        warn.innerText = msg; warn.style.display = msg ? "block" : "none";
    }

    async function executePreCheck() {
        const uld = document.getElementById("uld_type").value;
        const piecesCount = document.querySelectorAll(".piece-row").length;
        
        if(!uld || piecesCount === 0) {
            alert("ALERTA: Debe seleccionar ULD y agregar al menos una pieza para diagnosticar.");
            return;
        }

        const pieces = [];
        document.querySelectorAll(".piece-row").forEach(r => {
            pieces.push({
                l: parseFloat(r.querySelector(".p-l").value) || 0,
                w: parseFloat(r.querySelector(".p-w").value) || 0,
                h: parseFloat(r.querySelector(".p-h").value) || 0,
                p: parseFloat(r.querySelector(".p-p").value) || 0
            });
        });

        const res = await fetch("/precheck", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                cargo_type: document.getElementById("cargo_type").value,
                uld_type: uld,
                pieces: pieces,
                raw_text: document.getElementById("input_texto").value
            })
        });

        const data = await res.json();
        const results = document.getElementById("result_area");
        results.classList.remove("hidden");
        
        const dBox = document.getElementById("decision_box");
        dBox.innerText = data.status === "READY" ? "CARGA APTA PARA VUELO" : "CARGA EN HOLD / RECHAZADA";
        dBox.style.background = data.status === "READY" ? "var(--green)" : "var(--red)";
        dBox.style.color = data.status === "READY" ? "black" : "white";

        document.getElementById("instructions_list").innerHTML = data.instructions.map(ins => 
            `<div style="padding:10px; border-bottom:1px solid #333;"><b>ORDEN:</b> ${ins}</div>`
        ).join("") || "Documentación y mercancía verificada.";
        
        window.scrollTo(0, document.body.scrollHeight);
    }

    updatePouch();
    addPieceRow();
</script>
</body>
</html>
