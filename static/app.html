<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - ASESORÍA VIRTUAL</title>
    <style>
        :root { --primary: #00ffd5; --bg: #0b0f1a; --card: #1a2235; --text: #e0e0e0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .header { padding: 20px; background: #111a2b; text-align: center; border-bottom: 2px solid var(--primary); }
        .box { background: var(--card); padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #2d3748; }
        h3 { color: var(--primary); font-size: 0.9em; text-transform: uppercase; margin-top: 0; }
        select, input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #0b0f1a; color: white; border: 1px solid #3e4b5b; border-radius: 5px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--primary); color: #0b0f1a; margin-top: 10px; }
        .btn-add { background: #4a5568; color: white; }
        .status-card { padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; font-weight: bold; }
        .green { background: #064e3b; color: #6ee7b7; }
        .yellow { background: #451a03; color: #fcd34d; }
        .red { background: #450a0a; color: #fca5a5; }
        ul { text-align: left; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size:1.4em;">AL CIELO</h1>
    <small>SMART CARGO ADVISORY BY MAY ROGA</small>
</div>

<div class="box">
    <h3>1. PERFIL Y RUTA</h3>
    <label style="font-size:0.8em; color:#a0aec0;">ACTOR RESPONSABLE</label>
    <select id="actor">
        <option value="driver">CAMIONERO</option>
        <option value="forwarder">FORWARDER</option>
        <option value="owner">DUEÑO / SHIPPER</option>
    </select>
    <div class="grid">
        <select id="movement">
            <option value="local">LOCAL (MIA)</option>
            <option value="transfer">TRANSFER</option>
            <option value="comat">COMAT</option>
        </select>
        <select id="aircraft">
            <option value="pax">PASSENGER (PAX)</option>
            <option value="cao">CARGO ONLY (CAO)</option>
        </select>
    </div>
</div>

<div class="box">
    <h3>2. SEGMENTACIÓN DE CARGA</h3>
    <select id="cargo_type">
        <option value="gen">GENERAL CARGO</option>
        <option value="dg">DANGEROUS GOODS (DG)</option>
        <option value="per">PERISHABLES (PER)</option>
        <option value="avi">ANIMAL VIVO (AVI)</option>
        <option value="hum">HUMAN REMAINS (HUM)</option>
        <option value="pharma">PHARMA / MEDICAMENTOS</option>
        <option value="ice">DRY ICE ONLY</option>
    </select>
    <select id="packaging">
        <option value="pallet_wd">PALLET MADERA</option>
        <option value="metal">EMBALAJE METAL</option>
        <option value="drum">DRUMS / TAMBORES</option>
        <option value="crate">CRATE / HUACAL</option>
        <option value="box">CAJAS SUELTAS</option>
        <option value="uld">ULD / CONTENEDOR</option>
    </select>
</div>

<div class="box">
    <h3>3. MEDIDAS Y PESO</h3>
    <div class="grid">
        <input type="number" id="L" placeholder="L (cm)">
        <input type="number" id="W" placeholder="W (cm)">
        <input type="number" id="H" placeholder="H (cm)">
        <input type="number" id="Kg" placeholder="Kg">
    </div>
    <button class="btn-add" onclick="addPiece()">+ AGREGAR PIEZA</button>
    <div id="list" style="margin-top:10px; font-size:0.8em;"></div>
</div>

<div class="box">
    <button class="btn-main" onclick="send()">VERIFICAR CARGA</button>
    <div id="result"></div>
</div>

<script>
    let pieces = [];
    function addPiece() {
        const l=document.getElementById('L').value, w=document.getElementById('W').value, 
              h=document.getElementById('H').value, kg=document.getElementById('Kg').value;
        if(l && w && h && kg) {
            pieces.push({l:parseFloat(l), w:parseFloat(w), h:parseFloat(h), kg:parseFloat(kg)});
            document.getElementById('list').innerHTML = pieces.map((p,i)=>`Pz ${i+1}: ${p.l}x${p.w}x${p.h}cm - ${p.kg}kg`).join('<br>');
        }
    }

    async function send() {
        if(!pieces.length) return alert("Agregue piezas.");
        const payload = {
            actor: document.getElementById('actor').value,
            movement: document.getElementById('movement').value,
            cargo_type: document.getElementById('cargo_type').value,
            aircraft: document.getElementById('aircraft').value,
            packaging: document.getElementById('packaging').value,
            pieces: pieces,
            consol: "single"
        };
        const res = await fetch("/api/check", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(payload)
        });
        const r = await res.json();
        document.getElementById('result').innerHTML = `
            <div class="status-card ${r.level}">${r.status} (${r.score}%)</div>
            <p><strong>ERRORES:</strong></p><ul>${r.errors.map(e=>`<li>${e}</li>`).join('')}</ul>
            <p><strong>ASESORÍA:</strong></p><ul>${r.warnings.map(w=>`<li>${w}</li>`).join('')}</ul>
            <button onclick="window.print()" style="margin-top:10px; background:#4a5568; color:white;">PDF / IMPRIMIR</button>
        `;
    }
</script>
</body>
</html>
