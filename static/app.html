<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AL CIELO - AURA BY MAY ROGA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --avianca: #e11a22; --navy: #0a3d62; --dark: #1e272e; --gray: #f1f2f6; --success: #2ed573; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 15px; }
        .console { max-width: 1200px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); overflow: hidden; border: 1px solid #ccc; }
        
        .header { background: var(--navy); color: white; padding: 25px; border-bottom: 5px solid var(--avianca); }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
        
        .content { padding: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        h3 { color: var(--navy); border-bottom: 2px solid #eee; padding-bottom: 5px; font-size: 15px; text-transform: uppercase; }
        
        .card { background: #fff; border: 1.5px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        
        input, select, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; flex: 1; min-width: 120px; }
        label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        
        .piece-item { background: #f9f9f9; padding: 15px; border: 1px dashed #aaa; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .btn-add { background: var(--navy); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-exec { background: var(--avianca); color: white; border: none; padding: 25px; width: 100%; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-exec:hover { background: #b3151b; transform: scale(1.01); }

        .result-overlay { margin-top: 30px; display: none; padding: 20px; border-radius: 10px; }
        .alert-box { background: #fff5f5; border-left: 6px solid var(--avianca); padding: 15px; margin-bottom: 10px; font-size: 14px; }
        .solution-box { background: #f0fff4; border-left: 6px solid var(--success); padding: 15px; margin-bottom: 10px; font-size: 14px; }
        
        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; color: white; font-weight: bold; font-size: 12px; }
        @media (max-width: 800px) { .content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="console">
    <div class="header">
        <h1>AL CIELO - AURA BY MAY ROGA LLC</h1>
        <p>Especialista en Asesoría de Carga: IATA | TSA | CBP | AVIANCA</p>
    </div>

    <div class="content">
        <div>
            <div class="card">
                <h3>I. Auditoría del Pouch (Sobre)</h3>
                <div class="row">
                    <div style="flex:2">
                        <label>Master AWB (045-):</label>
                        <input type="text" id="awb" placeholder="045-00000000">
                    </div>
                    <div style="flex:1">
                        <label>Tipo de Guía:</label>
                        <select id="tipo_consolidado">
                            <option value="DIRECTA">DIRECTA</option>
                            <option value="CONSOLIDADA">CONSOLIDADA</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <label><input type="checkbox" id="pouch_inv"> Facturas Originales (3 Juegos)</label>
                    <label><input type="checkbox" id="pouch_house"> Manifiesto House (HAWB)</label>
                    <label><input type="checkbox" id="pouch_tach"> ¿Presenta Tachaduras?</label>
                </div>
            </div>

            <div class="card">
                <h3>II. Seguridad y Operación</h3>
                <div class="row">
                    <input type="text" id="id_chofer" placeholder="ID del Transportista">
                    <select id="shipper_status">
                        <option value="Known">Known Shipper (Seguro)</option>
                        <option value="Unknown">Unknown Shipper (Screening)</option>
                    </select>
                </div>
                <div class="row">
                    <select id="equipo">
                        <option value="PAX">Avión de Pasajeros (Belly)</option>
                        <option value="CARGO">Avión Carguero (Main Deck)</option>
                    </select>
                    <select id="naturaleza" onchange="checkNature()">
                        <option value="GEN">Carga General</option>
                        <option value="DGR">Mercancía Peligrosa (DGR)</option>
                        <option value="PER">Perecederos (PER)</option>
                        <option value="VAL">Valores (VAL)</option>
                    </select>
                </div>
                <div id="dgr_fields" style="display:none; border:1px solid var(--avianca); padding:10px;">
                    <label><input type="checkbox" id="dgd_roja"> DGD en Original con Bordes Rojos</label>
                </div>
            </div>
        </div>

        <div>
            <div class="card">
                <h3>III. Desglose de Carga (Pieza por Pieza)</h3>
                <div id="piezas-container"></div>
                <button class="btn-add" onclick="addPiece()">+ AGREGAR ITEM / BULTO</button>
            </div>

            <div class="card" style="background: #fff8e1;">
                <h3>IV. Pre-Chequeo de Muelle (Voz / Foto)</h3>
                <textarea id="prechequeo" rows="4" placeholder="Describa: Integridad de mallas, etiquetas visibles, daños, olores o humedad..."></textarea>
                <button class="btn-add" style="background: #ffa500; width:100%; margin-top:10px;" onclick="startVoice()">🎤 DICTAR INSPECCIÓN VISUAL</button>
            </div>

            <button class="btn-exec" onclick="auditar()">CERRAR ASESORÍA Y VALIDAR VUELO</button>
        </div>
    </div>

    <div id="resultado" class="result-overlay"></div>
</div>

<script>
let piezaIdx = 0;

function addPiece() {
    piezaIdx++;
    const div = document.createElement('div');
    div.className = 'piece-item';
    div.innerHTML = `
        <label>Pieza #${piezaIdx}</label>
        <div class="row">
            <input type="number" class="p_cant" placeholder="Cant" title="Cantidad">
            <input type="number" class="p_l" placeholder="L (in)" title="Largo">
            <input type="number" class="p_w" placeholder="W (in)" title="Ancho">
            <input type="number" class="p_h" placeholder="H (in)" title="Alto">
            <input type="number" class="p_real" placeholder="Peso Real Unitario (lb)">
        </div>
    `;
    document.getElementById('piezas-container').appendChild(div);
}

function checkNature() {
    const n = document.getElementById('naturaleza').value;
    document.getElementById('dgr_fields').style.display = (n === 'DGR') ? 'block' : 'none';
}

function startVoice() {
    const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    r.lang = 'es-ES';
    r.onresult = (e) => { document.getElementById('prechequeo').value += e.results[0][0].transcript + " "; };
    r.start();
}

async function auditar() {
    const piezas = [];
    document.querySelectorAll('.piece-item').forEach(p => {
        piezas.push({
            cant: p.querySelector('.p_cant').value || 1,
            l: p.querySelector('.p_l').value || 0,
            w: p.querySelector('.p_w').value || 0,
            h: p.querySelector('.p_h').value || 0,
            p_real: p.querySelector('.p_real').value || 0
        });
    });

    const data = {
        awb: document.getElementById('awb').value,
        tipo_consolidado: document.getElementById('tipo_consolidado').value,
        pouch: {
            facturas_originales: document.getElementById('pouch_inv').checked,
            manifest_house: document.getElementById('pouch_house').checked,
            tachaduras: document.getElementById('pouch_tach').checked
        },
        shipper_status: document.getElementById('shipper_status').value,
        equipo: document.getElementById('equipo').value,
        naturaleza: document.getElementById('naturaleza').value,
        dgd_roja: document.getElementById('dgd_roja').checked,
        piezas: piezas,
        prechequeo: document.getElementById('prechequeo').value
    };

    const res = await fetch('/api/auditoria_mortal', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    
    const out = await res.json();
    renderResult(out);
}

function renderResult(out) {
    const resBox = document.getElementById('resultado');
    resBox.style.display = 'block';
    resBox.style.background = (out.status.includes('HOLD')) ? '#fff5f5' : '#f0fff4';
    
    let html = `<h2 style="color:var(--navy); border-bottom:2px solid var(--avianca); padding-bottom:10px;">${out.status}</h2>`;
    html += `<p><strong>REVENUE INDEX:</strong> Peso Cobrable: ${out.chargeable} Lbs (${out.revenue_method}) | Peso Real Total: ${out.real} Lbs</p>`;
    
    if(out.alertas.length > 0) {
        out.alertas.forEach((a, i) => {
            html += `<div class="alert-box"><strong>DISCREPANCIA:</strong> ${a}</div>`;
            html += `<div class="solution-box"><strong>SOLUCIÓN ASESOR:</strong> ${out.soluciones[i]}</div>`;
        });
    } else {
        html += `<div class="solution-box" style="text-align:center;">Carga validada con éxito. Proceder al muelle de aceptación.</div>`;
    }
    
    html += `<button onclick="window.print()" class="btn-exec" style="margin-top:15px; font-size:14px; padding:15px;">IMPRIMIR REPORTE TÉCNICO DE ADMISIÓN</button>`;
    
    resBox.innerHTML = html;
    resBox.scrollIntoView({behavior: 'smooth'});
}

// Iniciar con una pieza por defecto
addPiece();
</script>
</body>
</html>
