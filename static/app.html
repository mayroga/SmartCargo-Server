<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SMARTCARGO SERVER PRO</title>

<style>
body{background:#0b1220;color:white;font-family:Arial}
.section{background:#111a2e;padding:15px;margin:10px;border-radius:10px}
.hidden{display:none}
.red{color:#ff4d4d}
.green{color:#4dff88}
.yellow{color:#ffd24d}
table{width:100%}
td,th{border:1px solid #333;padding:5px}
img{max-width:80px}
</style>
</head>

<body>

<h2>✈️ SMARTCARGO SERVER – REAL COUNTER LOGIC</h2>

<!-- ROL -->
<div class="section">
<h3>1. ROL OPERATIVO</h3>
<select id="rol" onchange="rolInfo()">
<option value="">Selecciona</option>
<option>SHIPPER</option>
<option>FORWARDER</option>
<option>WAREHOUSE</option>
<option>TRUCKER</option>
</select>
<div id="rol_help" class="yellow"></div>
</div>

<!-- TIPO -->
<div class="section">
<h3>2. TIPO DE CARGA</h3>
<select id="tipo" onchange="tipoInfo()">
<option>GENERAL</option>
<option>DGR</option>
<option>PER</option>
<option>VAL</option>
<option>HUM</option>
</select>

<div id="tipo_help"></div>
<div id="docs_live"></div>
</div>

<!-- PIEZAS -->
<div class="section">
<h3>3. AUDITORÍA FÍSICA</h3>

<table id="tabla">
<tr><th>CANT</th><th>L</th><th>W</th><th>H</th><th>PESO</th><th>FOTO</th></tr>
</table>

<button onclick="add()">+ PIEZA</button>
</div>

<!-- VALIDACIÓN -->
<div class="section">
<button onclick="validar()">VALIDAR (SIMULACIÓN COUNTER)</button>
<div id="resultado"></div>
</div>

<script>

// 🔵 ROL
function rolInfo(){
let r = rol.value;
let msg = "";

if(r==="SHIPPER") msg="Responsable de documentos originales.";
if(r==="FORWARDER") msg="Coordina AWB y consolidación.";
if(r==="WAREHOUSE") msg="Valida físico y discrepancias.";
if(r==="TRUCKER") msg="Solo entrega, mínima documentación.";

rol_help.innerHTML = msg;
}

// 🔵 TIPO
function tipoInfo(){

let t = tipo.value;

let docs = {
GENERAL:["AWB (1 original + 2 copias)", "Factura (3 copias)"],
DGR:["Shipper Declaration (3 originales)", "MSDS", "UN Packaging"],
PER:["Certificado sanitario", "Control temperatura"],
VAL:["Manifiesto VAL", "Custodia armada"],
HUM:["Acta defunción", "Permiso tránsito"]
};

let info = {
DGR:"⚠ Requiere especialista DG",
PER:"⚠ Control de temperatura obligatorio",
VAL:"⚠ Seguridad reforzada",
HUM:"⚠ Manejo prioritario"
};

docs_live.innerHTML = docs[t].map(d=>`<div class='yellow'>📄 ${d}</div>`).join("");
tipo_help.innerHTML = `<div class='yellow'>${info[t]||""}</div>`;
}

// 🔵 PIEZAS
function add(){
let tr = document.createElement("tr");

tr.innerHTML = `
<td><input class="cant"></td>
<td><input class="l" oninput="liveCheck(this)"></td>
<td><input class="w" oninput="liveCheck(this)"></td>
<td><input class="h" oninput="liveCheck(this)"></td>
<td><input class="peso" oninput="liveCheck(this)"></td>
<td><input type="file" onchange="preview(this)"></td>
`;

tabla.appendChild(tr);
}

// 🔵 FOTO
function preview(input){
let img = document.createElement("img");
img.src = URL.createObjectURL(input.files[0]);
input.parentNode.appendChild(img);
}

// 🔴 VALIDACIÓN EN TIEMPO REAL
function liveCheck(input){

let val = input.value;

if(val <= 0){
input.style.border="2px solid red";
}else{
input.style.border="2px solid green";
}
}

// 🔵 VALIDACIÓN FINAL
async function validar(){

let piezas=[];

document.querySelectorAll("#tabla tr").forEach((r,i)=>{
if(i===0)return;

piezas.push({
l:r.querySelector(".l").value,
w:r.querySelector(".w").value,
h:r.querySelector(".h").value,
peso:r.querySelector(".peso").value
});
});

let res = await fetch("/api/validar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
tipo:tipo.value,
piezas:piezas
})
});

let d = await res.json();

let html = `<h3>ESTADO: ${d.status}</h3>`;
html += `<p>PESO COBRABLE: ${d.peso_cobrable}</p>`;
html += `<p>AVIÓN: ${d.avion}</p>`;

html += "<h4>DOCUMENTOS:</h4>";
d.documentos.forEach(doc=>{
html += `<div class="yellow">${doc}</div>`;
});

html += "<h4>ALERTAS:</h4>";
d.alertas.forEach((a,i)=>{
html += `<div class="red">⚠ ${a}</div>`;
html += `<div>✔ SOLUCIÓN: ${d.soluciones[i]}</div>`;
});

if(d.alertas.length===0){
html += `<div class="green">✔ LISTO PARA COUNTER</div>`;
}

resultado.innerHTML = html;
}

</script>

</body>
</html>
