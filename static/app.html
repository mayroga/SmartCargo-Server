<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SMARTCARGO OS</title>

<style>
body { background:#0b1220; color:white; font-family:Arial; padding:20px; }
h2 { color:#00d4ff; }

.section { background:#111a2e; padding:15px; margin:10px 0; border-radius:10px; }
.card { background:#1a2742; padding:10px; margin-top:10px; border-radius:8px; }

input, select, textarea { width:100%; padding:8px; margin:5px 0; }
button { background:#00d4ff; border:none; padding:10px; cursor:pointer; width:100%; }

.step { border-left:3px solid #00d4ff; padding:5px; margin:5px 0; }
.red { color:#ff4d4d; }
.green { color:#4dff88; }

table { width:100%; border-collapse:collapse; }
td, th { border:1px solid #333; padding:5px; text-align:center; }

img { max-width:80px; margin-top:5px; }

.hidden { display:none; }
</style>
</head>

<body>

<h2>✈️ SMARTCARGO OS - Asesor Logístico Inteligente</h2>

<!-- DATOS -->
<div class="section">
<h3>📋 Datos Iniciales</h3>

<input id="name" placeholder="Nombre">
<input id="origin" placeholder="Origen">
<input id="destination" placeholder="Destino">

<button onclick="next1()">Continuar</button>
</div>

<!-- ROL -->
<div class="section hidden" id="step2">
<h3>👤 Rol</h3>

<select id="rol" onchange="rolInfo()">
<option>SHIPPER</option>
<option>FORWARDER</option>
<option>WAREHOUSE</option>
<option>TRUCKER</option>
<option>CONSIGNEE</option>
</select>

<div id="rol_text"></div>

<button onclick="next2()">Continuar</button>
</div>

<!-- CARGA -->
<div class="section hidden" id="step3">
<h3>📦 Tipo de Carga</h3>

<select id="tipo" onchange="docsAuto()">
<option>GENERAL</option>
<option>DGR</option>
<option>PER</option>
<option>VAL</option>
<option>HUM</option>
<option>AVI</option>
</select>

<div id="docs"></div>

<button onclick="next3()">Continuar</button>
</div>

<!-- AUDITORIA -->
<div class="section hidden" id="step4">
<h3>📦 Auditoría Física</h3>

<table id="tabla">
<tr>
<th>CANT</th><th>L</th><th>W</th><th>H</th><th>PESO</th><th>FOTO</th><th>VOL</th>
</tr>
</table>

<button onclick="add()">+ PIEZA</button>

<h3>🎤 Reporte</h3>
<textarea id="voz"></textarea>

<button onclick="next4()">Validar</button>
</div>

<!-- RESULTADO -->
<div class="section hidden" id="step5">
<h3>⚖️ Resultado</h3>

<div id="res"></div>
</div>

<script>

let piezas = [];

function next1(){
step2.classList.remove("hidden");
}

function next2(){
step3.classList.remove("hidden");
}

function next3(){
step4.classList.remove("hidden");
}

/* ROL INFO */
function rolInfo(){
let r = rol.value;
let txt = {
SHIPPER:"Dueño de carga",
FORWARDER:"Consolidador",
WAREHOUSE:"Inspector físico",
TRUCKER:"Transportista",
CONSIGNEE:"Receptor"
};
rol_text.innerHTML = txt[r];
}

/* DOCS AUTO */
function docsAuto(){
let t = tipo.value;

let docs = ["AWB","Factura"];

if(t==="DGR") docs.push("MSDS","DGR Declaration");
if(t==="PER") docs.push("Certificado sanitario");
if(t==="VAL") docs.push("Seguro");
if(t==="HUM") docs.push("Permisos legales");

docs.innerHTML = docs.map(d=>`<div class='step'>📄 ${d}</div>`).join("");
}

/* PIEZAS */
function add(){

let row = document.createElement("tr");

row.innerHTML = `
<td><input class="cant" value="1"></td>
<td><input class="l"></td>
<td><input class="w"></td>
<td><input class="h"></td>
<td><input class="peso"></td>
<td><input type="file" onchange="preview(this)"></td>
<td class="vol">0</td>
`;

tabla.appendChild(row);
}

/* FOTO */
function preview(input){
let file = input.files[0];
if(file){
let img = document.createElement("img");
img.src = URL.createObjectURL(file);
input.parentNode.appendChild(img);
}
}

/* VALIDACIÓN */
async function next4(){

let piezasData = [];

document.querySelectorAll("#tabla tr").forEach((tr,i)=>{

if(i===0) return;

let l = parseFloat(tr.querySelector(".l").value)||0;
let w = parseFloat(tr.querySelector(".w").value)||0;
let h = parseFloat(tr.querySelector(".h").value)||0;
let peso = parseFloat(tr.querySelector(".peso").value)||0;
let cant = parseInt(tr.querySelector(".cant").value)||1;

let vol = (l*w*h)/166;

tr.querySelector(".vol").innerText = vol.toFixed(2);

piezasData.push({l,w,h,peso,cant});
});

let resFetch = await fetch("/api/validar",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({piezas:piezasData})
});

let data = await resFetch.json();

let html = `
<div class="card">
<div class="${data.alertas.length?'red':'green'}">${data.status}</div>
<p>Peso Real: ${data.peso_real}</p>
<p>Peso Vol: ${data.peso_vol}</p>
<p>Peso Cobrable: ${data.peso_cobrable}</p>
</div>
`;

data.alertas.forEach((a,i)=>{
html += `
<div class="step red">⚠ ${a}</div>
<div>${data.explicaciones[i]}</div>
<div>⚖️ ${data.riesgos[i]}</div>
`;
});

res.innerHTML = html;
step5.classList.remove("hidden");
}

</script>

</body>
</html>
