<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AL CIELO - SmartCargo Advisory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0a3d62; --danger: #e11a22; --success: #27ae60; --light: #f4f6f8; }
        body { font-family: 'Inter', sans-serif; background: var(--light); margin:0; padding:15px; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--danger); padding-bottom: 10px; font-size: 22px; }
        .collapsible { background: var(--primary); color: white; cursor: pointer; padding: 12px; width: 100%; border: none; text-align: left; border-radius: 8px; margin-top: 10px; font-weight: 600; transition: 0.3s; }
        .content { padding: 15px; display: none; background: #fff; border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; }
        label { display: block; margin: 12px 0 5px; font-weight: 600; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        .tip { font-size: 12px; color: #666; font-style: italic; margin-top: 4px; }
        .btn-eval { background: var(--danger); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .checklist { display: grid; grid-template-columns: 1fr; gap: 8px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .checklist label { font-weight: 400; margin: 0; display: flex; align-items: center; gap: 10px; }
        .checklist input { width: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>AL CIELO - SmartCargo Advisory</h1>

    <button class="collapsible">I. IDENTIFICACIÓN Y ROL</button>
    <div class="content">
        <label>Rol:</label>
        <select id="rolUsuario">
            <option value="Forwarder">Forwarder</option>
            <option value="Chofer">Chofer / Camionero</option>
            <option value="Warehouse">Agente Warehouse</option>
            <option value="Counter">Counter Agent</option>
        </select>
        <label>AWB:</label>
        <input type="text" id="awb" placeholder="045-12345678">
        <p class="tip">Obligatorio: Formato 3 dígitos - 8 dígitos.</p>
    </div>

    <button class="collapsible">II. CARGA Y DOCUMENTOS</button>
    <div class="content">
        <label>Tipo de Carga (IATA):</label>
        <select id="codigoCarga">
            <option value="GEN">GEN - Carga General</option>
            <option value="PER">PER - Perecederos</option>
            <option value="DGR">DGR - Mercancía Peligrosa</option>
            <option value="AVI">AVI - Animales Vivos</option>
            <option value="VAL">VAL - Valores</option>
        </select>
        <div id="docsHint" class="tip" style="background:#eef; padding:10px; margin-top:10px; border-radius:5px;"></div>
    </div>

    <button class="collapsible">III. MEDIDAS Y PESO</button>
    <div class="content">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Piezas:</label><input type="number" id="piezas" value="1"></div>
            <div><label>Peso Real (kg):</label><input type="number" id="pesoTotal" oninput="calcular()"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
            <div><label>L (cm):</label><input type="number" id="largo" oninput="calcular()"></div>
            <div><label>W (cm):</label><input type="number" id="ancho" oninput="calcular()"></div>
            <div><label>H (cm):</label><input type="number" id="alto" oninput="calcular()"></div>
        </div>
        <label>Peso Volumétrico (kg):</label>
        <input type="text" id="pesoVolumetrico" readonly style="background:#eee">
    </div>

    <button class="collapsible">IV. CHECKLIST TÉCNICO</button>
    <div class="content">
        <div class="checklist">
            <label><input type="checkbox" id="chkDGR"> DGD firmada / MSDS</label>
            <label><input type="checkbox" id="chkPerecederos"> Certificado Fitosanitario</label>
            <label><input type="checkbox" id="chkAnimales"> Certificado Veterinario</label>
            <label><input type="checkbox" id="chkEmbalaje"> Fleje y Sello NIMF-15</label>
            <label><input type="checkbox" id="chkEtiquetas"> Etiquetas visibles (Fragile/Orientation)</label>
        </div>
    </div>

    <button class="btn-eval" onclick="evaluar()">ASESORAR: ¿VUELA?</button>
    <button class="collapsible" style="background:#64748b; margin-top:10px;" onclick="explicarDocs()">VOZ: DESGLOSE DE DOCUMENTOS</button>

    <div id="resultado" class="result-box"></div>
</div>

<script>
// Collapsibles
document.querySelectorAll(".collapsible").forEach(btn => {
    btn.onclick = function() {
        this.classList.toggle("active");
        let content = this.nextElementSibling;
        content.style.display = content.style.display === "block" ? "none" : "block";
    }
});

function calcular() {
    let l = +document.getElementById('largo').value || 0;
    let w = +document.getElementById('ancho').value || 0;
    let h = +document.getElementById('alto').value || 0;
    let vol = (l * w * h) / 6000; // Estándar IATA
    document.getElementById('pesoVolumetrico').value = vol.toFixed(2);
}

async function evaluar() {
    const resDiv = document.getElementById('resultado');
    resDiv.style.display = 'block';
    resDiv.style.background = '#f1f5f9';
    resDiv.innerHTML = "Consultando base de datos técnica...";

    const data = {
        awb: document.getElementById('awb').value,
        codigoCarga: document.getElementById('codigoCarga').value,
        piezas: document.getElementById('piezas').value,
        pesoTotal: document.getElementById('pesoTotal').value,
        alto: document.getElementById('alto').value,
        pesoVolumetrico: document.getElementById('pesoVolumetrico').value,
        chkDGR: document.getElementById('chkDGR').checked,
        chkPerecederos: document.getElementById('chkPerecederos').checked,
        chkAnimales: document.getElementById('chkAnimales').checked,
        chkEmbalaje: document.getElementById('chkEmbalaje').checked
    };

    try {
        const response = await fetch('/api/evaluar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const res = await response.json();
        
        let html = `<h2 style="color:${res.status === 'READY' ? 'var(--success)' : 'var(--danger)'}">${res.status}</h2>`;
        if(res.errores.length > 0) {
            html += "<ul>" + res.errores.map(e => `<li style="color:red"><b>RECHAZO:</b> ${e}</li>`).join('') + "</ul>";
            html += "<h3>ACCIONES CORRECTIVAS:</h3><ul>" + res.soluciones.map(s => `<li>${s}</li>`).join('') + "</ul>";
        } else {
            html += "<p>✅ Carga cumple con estándares. Proceder a pesaje y aceptación.</p>";
        }
        resDiv.style.background = res.status === 'READY' ? '#dff9fb' : '#fff5f5';
        resDiv.innerHTML = html;
        resDiv.scrollIntoView({behavior: 'smooth'});
    } catch(e) {
        resDiv.innerHTML = "❌ Error en el servidor de asesoría.";
    }
}

function explicarDocs() {
    const texto = "Recuerde: Air Waybill sin tachaduras, Factura con Incoterms claros y Packing List detallado. Si es madera, el sello NIMF-15 debe estar legible. Verifique peso real contra reserva.";
    const u = new SpeechSynthesisUtterance(texto);
    u.lang = 'es-ES';
    speechSynthesis.speak(u);
    alert(texto);
}
</script>
</body>
</html>
