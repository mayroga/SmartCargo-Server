<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SMART CARGO AI - PRECHECK SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#0b0f1a; color:#fff; margin:0; }
header { background:#111a2e; padding:15px; text-align:center; font-weight:bold; }
.container { padding:15px; max-width:1000px; margin:auto; }
.block { background:#111a2e; padding:15px; margin-top:15px; border-radius:10px; }
input, textarea { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none; }
button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:10px; background:#1f6feb; color:#fff; font-size:16px; }
.status-green{color:#00ff88;} .status-yellow{color:#ffcc00;} .status-red{color:#ff3b3b;}
.error{color:#ff3b3b;} .warn{color:#ffcc00;} .fix{color:#00ff88;}
.doc{background:#0f1626;padding:8px;margin:5px 0;border-left:3px solid #1f6feb;}
</style>
</head>

<body>

<header>🚀 SMART CARGO AI - SISTEMA DE PRECHEQUEO TOTAL</header>

<div class="container">

<div class="block">
<h3>📦 Cliente / Operación</h3>
<input id="shipper" placeholder="Shipper">
<input id="consignee" placeholder="Consignee">
<input id="awb" placeholder="AWB">
<input id="airline" placeholder="Aerolínea">
<input id="origin" placeholder="Origen">
<input id="destination" placeholder="Destino">
<input id="service" placeholder="Servicio (PAX/CARGO)">
<input id="date" type="date">
</div>

<div class="block">
<h3>📦 Mercancía</h3>
<textarea id="raw_text" placeholder="Describe TODO: DG, pharma, animales, etc"></textarea>
<input id="pieces" placeholder='[{"kg":100,"h":120},{"kg":200,"h":180}]'>
</div>

<div class="block">
<button onclick="submitData()">🚀 EJECUTAR PRECHECK TOTAL</button>
</div>

<div id="result" class="block"></div>

</div>

<script>
async function submitData(){

let pieces=[];
try{ pieces=JSON.parse(document.getElementById("pieces").value||"[]"); }
catch(e){ alert("JSON inválido"); return;}

const payload={
shipper:shipper.value,
consignee:consignee.value,
awb:awb.value,
airline:airline.value,
origin:origin.value,
destination:destination.value,
service:service.value,
date:date.value,
raw_text:raw_text.value,
pieces:pieces
};

const res=await fetch("/precheck",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
const data=await res.json();
render(data);
}

function render(d){

let s="status-green";
if(d.status==="RISK")s="status-yellow";
if(d.status==="REJECT")s="status-red";

let h="";

h+=`<h2>📊 RESULTADO FINAL</h2><p class="${s}">${d.status}</p><p>${d.driver_message}</p>`;

h+=`<div class="block"><h3>📦 RESUMEN</h3>
<p>AWB: ${d.summary.awb}</p>
<p>Ruta: ${d.summary.route}</p>
<p>Peso: ${d.summary.weight} kg</p>
</div>`;

h+=`<div class="block"><h3>🧠 CARGA</h3><p>${d.cargo_type_detected}</p></div>`;

h+=`<div class="block"><h3>❌ ERRORES</h3>`;
(d.errors||[]).forEach(e=>h+=`<p class="error">${e}</p>`); if(!d.errors.length)h+=`<p class="fix">Sin errores</p>`;
h+=`</div>`;

h+=`<div class="block"><h3>⚠️ RIESGOS</h3>`;
(d.warnings||[]).forEach(w=>h+=`<p class="warn">${w}</p>`); if(!d.warnings.length)h+=`<p class="fix">Sin riesgos</p>`;
h+=`</div>`;

h+=`<div class="block"><h3>🔧 SOLUCIONES</h3>`;
(d.fixes||[]).forEach(f=>h+=`<p class="fix">${f}</p>`);
h+=`</div>`;

h+=`<div class="block"><h3>📑 DOCUMENTOS</h3>`;
(d.required_docs||[]).forEach(x=>h+=`<div class="doc">${x}</div>`);
h+=`</div>`;

document.getElementById("result").innerHTML=h;
}
</script>

</body>
</html>
