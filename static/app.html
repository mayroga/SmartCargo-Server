<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO | SMARTCARGO ADVISORY</title>
    <style>
        :root { --avianca-red: #e11a22; --black: #000000; --gold: #d4a017; --gray: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ddd; margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: auto; background: white; border: 4px solid var(--black); box-shadow: 10px 10px 0px rgba(0,0,0,0.2); }
        
        /* Header Profesional */
        .header { background: var(--black); color: white; padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--avianca-red); }
        .header h1 { margin: 0; font-size: 28px; letter-spacing: 2px; }
        
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .section { border: 1px solid #ccc; padding: 20px; border-radius: 4px; background: white; }
        h3 { background: var(--black); color: white; padding: 10px; margin-top: 0; font-size: 16px; text-transform: uppercase; border-left: 10px solid var(--avianca-red); }

        /* Inputs y Tablas */
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; font-weight: bold; }
        input:focus { border-color: var(--avianca-red); outline: none; }
        
        .piece-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .piece-table th { background: #eee; padding: 10px; font-size: 12px; border: 1px solid #ccc; }
        .piece-row td { border: 1px solid #ccc; padding: 5px; }

        /* Botonera */
        .btn-group { padding: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .btn { padding: 20px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; text-transform: uppercase; transition: 0.3s; }
        .btn-red { background: var(--avianca-red); color: white; }
        .btn-black { background: var(--black); color: white; }
        .btn-gold { background: var(--gold); color: white; }
        .btn:hover { opacity: 0.8; transform: scale(0.98); }

        /* Resultados */
        .result-panel { display: none; padding: 25px; background: #fff; border: 5px solid var(--black); margin: 20px; }
        .alert-item { background: #fff1f1; border-left: 5px solid var(--avianca-red); padding: 15px; margin-bottom: 15px; }
        .law-item { background: #eef; border-left: 5px solid blue; padding: 10px; font-size: 13px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>AL CIELO | ASESORÍA SMARTCARGO</h1>
            <small>Estación: MIAMI FL (MIA) | Gateway: AVIANCA CARGO</small>
        </div>
        <button class="btn btn-black" onclick="location.reload()">BORRAR TODO</button>
    </div>

    <div class="main-grid">
        <div>
            <div class="section">
                <h3>I. Identificación de Carga y Seguridad TSA</h3>
                <input type="text" id="awb" placeholder="GUÍA AÉREA (045-XXXXXXXX)">
                <input type="text" id="descripcion_carga" placeholder="DESCRIPCIÓN COMERCIAL (Ej: Flores Frescas - Rosas)">
                <select id="known_shipper">
                    <option value="true">SHIPPER CONOCIDO (KNOWN SHIPPER)</option>
                    <option value="false">SHIPPER DESCONOCIDO (UNIDENTIFIED)</option>
                </select>
                <select id="naturaleza" onchange="actualizarChecks()">
                    <option value="GENERAL">CARGA GENERAL (GEN)</option>
                    <option value="DGR">MERCANCÍA PELIGROSA (DGR)</option>
                    <option value="PER">PERECEDEROS (PER)</option>
                    <option value="VAL">VALORES (VAL)</option>
                    <option value="HUM">RESTOS HUMANOS (HUM)</option>
                </select>
            </div>

            <div class="section" style="margin-top:20px;">
                <h3>II. Auditoría de Documentos (Pouch)</h3>
                <div id="check_area" style="background: #f9f9f9; padding: 15px; border: 1px dashed #999;">
                    </div>
                <textarea id="docs_texto" placeholder="Notas adicionales del Pouch..."></textarea>
            </div>
        </div>

        <div>
            <div class="section">
                <h3>III. Auditoría Física (Dim & Weight)</h3>
                <table class="piece-table">
                    <thead>
                        <tr>
                            <th>Cant</th><th>L</th><th>W</th><th>H</th><th>Peso (Lb)</th><th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="piezas_body"></tbody>
                </table>
                <button class="btn btn-black" style="width:100%; margin-top:10px;" onclick="addPiece()">+ AGREGAR PIEZAS</button>
            </div>

            <div class="section" style="margin-top:20px; background: #eef1f6;">
                <h3>IV. Reporte del Inspector (Voz/Texto)</h3>
                <textarea id="voz_texto" rows="5" placeholder="Reporte de daños, sellos, olores o discrepancias físicas..."></textarea>
                <button class="btn btn-gold" style="width:100%" onclick="toggleVoz()">🎤 ACTIVAR DICTADO TÉCNICO</button>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-black" onclick="generarPDF()">GENERAR REPORTE PDF</button>
        <button class="btn btn-red" onclick="procesar()">ASESORAR Y VALIDAR DESPACHO</button>
        <button class="btn btn-black">IMPRIMIR ETIQUETAS</button>
    </div>

    <div id="resultados" class="result-panel"></div>
</div>

<script>
let recognition;

function addPiece() {
    const tr = document.createElement('tr');
    tr.className = 'piece-row';
    tr.innerHTML = `
        <td><input type="number" class="p_cant" value="1"></td>
        <td><input type="number" class="p_l" placeholder="0"></td>
        <td><input type="number" class="p_w" placeholder="0"></td>
        <td><input type="number" class="p_h" placeholder="0"></td>
        <td><input type="number" class="p_real" placeholder="0"></td>
        <td><button onclick="this.parentElement.parentElement.remove()">❌</button></td>
    `;
    document.getElementById('piezas_body').appendChild(tr);
}

function actualizarChecks() {
    const nat = document.getElementById('naturaleza').value;
    const area = document.getElementById('check_area');
    const docs = {
        "GENERAL": ["Factura Original", "Packing List", "AWB Firmada"],
        "DGR": ["Shipper's Declaration", "MSDS", "Etiquetas de Riesgo"],
        "PER": ["Certificado Fitosanitario", "Instrucción de Hielo"],
        "VAL": ["Manifiesto VAL", "Custodia Armada"],
        "HUM": ["Permiso Tránsito", "Acta Defunción"]
    };
    area.innerHTML = docs[nat].map(d => `<label><input type="checkbox" class="doc_check" value="${d}"> ${d}</label><br>`).join('');
}

async function procesar() {
    const piezas = [];
    document.querySelectorAll('.piece-row').forEach(r => {
        piezas.push({
            cant: r.querySelector('.p_cant').value,
            l: r.querySelector('.p_l').value,
            w: r.querySelector('.p_w').value,
            h: r.querySelector('.p_h').value,
            p_real: r.querySelector('.p_real').value
        });
    });

    const payload = {
        awb: document.getElementById('awb').value,
        naturaleza: document.getElementById('naturaleza').value,
        known_shipper: document.getElementById('known_shipper').value === "true",
        descripcion_carga: document.getElementById('descripcion_carga').value,
        docs_texto: document.getElementById('docs_texto').value,
        docs_check: Array.from(document.querySelectorAll('.doc_check:checked')).map(c => c.value),
        piezas: piezas
    };

    const response = await fetch('/api/validar_carga', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    
    const data = await response.json();
    mostrarResultados(data);
}

function mostrarResultados(data) {
    const resDiv = document.getElementById('resultados');
    resDiv.style.display = 'block';
    let html = `<h2 style="color:var(--avianca-red)">ESTADO OPERATIVO: ${data.status}</h2>`;
    html += `<h3>EQUIPO RECOMENDADO: ${data.recomendacion_vuelo}</h3>`;
    html += `<p><strong>PESO COBRABLE TOTAL: ${data.p_cobrable} Lbs</strong></p><hr>`;
    
    data.alertas.forEach((alert, i) => {
        html += `
            <div class="alert-item">
                <strong>⚠️ ${alert}</strong><br>
                <small>${data.explicaciones[i]}</small>
                <div class="law-item">⚖️ Riesgo Legal: ${data.riesgos[i] || 'N/A'}</div>
            </div>
        `;
    });
    resDiv.innerHTML = html;
    resDiv.scrollIntoView();
}

function toggleVoz() {
    if (!recognition) {
        recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.continuous = true;
        recognition.onresult = (e) => {
            const text = e.results[e.results.length - 1][0].transcript;
            document.getElementById('voz_texto').value += text + " ";
        };
    }
    recognition.start();
}

// Inicialización
addPiece();
actualizarChecks();
</script>

</body>
</html>
