<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONTROL COUNTER PRO</title>
<style>
body { background:#0b1220; color:white; font-family:Arial; padding:15px;}
.section { background:#111a2e; padding:15px; margin-bottom:15px; border-radius:10px;}
button { padding:10px; margin-top:10px; width:100%; font-weight:bold;}
input { width:100%; padding:8px; margin-top:5px;}
.alert { color:red; font-weight:bold;}
.ok { color:lime; font-weight:bold;}
</style>
</head>

<body>

<h2>✈️ CONTROL DOCUMENTAL PRO</h2>

<div class="section">
<h3>1. CONTROL DE SOBRE (OBLIGATORIO)</h3>
<p>Orden correcto:</p>
<ol>
<li>AWB</li>
<li>Invoice</li>
<li>Packing List</li>
<li>ITN</li>
</ol>

<button onclick="confirmarOrden()">✔ DOCUMENTOS ORDENADOS</button>
<div id="estadoOrden"></div>
</div>

<div class="section">
<h3>2. VALIDACIÓN DOCUMENTAL</h3>

<label>AWB Piezas</label>
<input id="awb_piezas" type="number">

<label>Packing List Piezas</label>
<input id="packing_piezas" type="number">

<label>Valor AWB</label>
<input id="awb_valor" type="number">

<label>Valor Invoice</label>
<input id="invoice_valor" type="number">

<label>Peso AWB</label>
<input id="awb_peso" type="number">

<label>ITN</label>
<input id="itn">
</div>

<div class="section">
<h3>3. CARGA</h3>

<label>Descripción</label>
<input id="texto">

<button onclick="add()">+ PIEZA</button>
<div id="piezas"></div>
</div>

<button onclick="validar()">VALIDAR OPERACIÓN</button>

<div class="section" id="resultado"></div>

<script>
let ordenOK = false;

function confirmarOrden(){
    ordenOK = true;
    document.getElementById("estadoOrden").innerHTML = "✅ LISTO PARA VALIDAR";
}

function add(){
    const div = document.createElement("div");
    div.innerHTML = `
        L:<input class="l">
        W:<input class="w">
        H:<input class="h">
        KG:<input class="p">
    `;
    document.getElementById("piezas").appendChild(div);
}

async function validar(){

    if(!ordenOK){
        alert("❌ PRIMERO ORGANICE DOCUMENTOS");
        return;
    }

    let piezas = [];
    document.querySelectorAll("#piezas div").forEach(d=>{
        piezas.push({
            l: d.querySelector(".l").value,
            w: d.querySelector(".w").value,
            h: d.querySelector(".h").value,
            peso: d.querySelector(".p").value
        })
    });

    const res = await fetch("/api/validar",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            awb_piezas: Number(document.getElementById("awb_piezas").value),
            packing_piezas: Number(document.getElementById("packing_piezas").value),
            awb_valor: Number(document.getElementById("awb_valor").value),
            invoice_valor: Number(document.getElementById("invoice_valor").value),
            awb_peso: Number(document.getElementById("awb_peso").value),
            itn: document.getElementById("itn").value,
            texto: document.getElementById("texto").value,
            piezas: piezas
        })
    });

    const d = await res.json();

    let html = `<h3>${d.estado}</h3>`;
    html += `<p>Peso cobrable: ${d.peso_cobrable}</p>`;

    if(d.alertas.length){
        html += "<div class='alert'>ERRORES:<br>" + d.alertas.join("<br>") + "</div>";
    }

    if(d.soluciones.length){
        html += "<div>Soluciones:<br>" + d.soluciones.join("<br>") + "</div>";
    }

    html += "<div>Acción:<br>" + d.acciones.join("<br>") + "</div>";

    document.getElementById("resultado").innerHTML = html;
}
</script>

</body>
</html>
