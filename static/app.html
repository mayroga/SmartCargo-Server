<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AURA BY MAY ROGA | SMARTCARGO ADVISORY</title>
    <style>
        :root { --red: #e11a22; --black: #050505; --gray: #1a1a1a; --gold: #d4a017; --white: #f5f5f5; }
        body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); margin: 0; }
        
        /* CORTINAS INTELIGENTES - EFECTO PREMIUM */
        #curtains { position: fixed; width: 100%; height: 100vh; display: flex; z-index: 9999; transition: 1.5s cubic-bezier(0.8, 0, 0.2, 1); }
        .curtain { width: 50%; height: 100%; background: var(--black); display: flex; align-items: center; border: 1px solid #222; }
        .left-c { justify-content: flex-end; padding-right: 50px; }
        .right-c { justify-content: flex-start; padding-left: 50px; }
        .logo-trigger { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 180px; height: 180px; background: var(--red); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 8px solid var(--black); box-shadow: 0 0 80px rgba(225,26,34,0.6); z-index: 10000; transition: 0.5s; }
        .logo-trigger h1 { font-size: 20px; margin: 0; letter-spacing: 4px; font-weight: 900; }
        .opened #curtains { transform: scale(1.1); opacity: 0; pointer-events: none; }

        /* DASHBOARD DEL ASESOR */
        .app-grid { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; padding: 20px; height: 100vh; box-sizing: border-box; }
        .panel { background: var(--gray); border-radius: 10px; padding: 20px; border-top: 5px solid var(--red); overflow-y: auto; }
        h2 { font-size: 14px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-red { background: var(--red); color: white; }
        .btn-gold { background: var(--gold); color: black; }

        /* TABLAS TÉCNICAS */
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #888; padding-bottom: 10px; }
        td { padding: 5px 0; }
        .piece-row input { margin: 0; padding: 8px; }

        /* CARDS DE SOLUCIÓN */
        .sol-card { background: var(--white); color: #000; padding: 15px; border-radius: 5px; border-left: 8px solid #2ecc71; margin-bottom: 15px; }
        .sol-card.critical { border-left-color: var(--red); }
        .action-tag { display: block; margin-top: 8px; font-weight: 800; color: var(--red); text-transform: uppercase; font-size: 11px; }

        /* CONTROLES FLOTANTES */
        .floating-footer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 50px; border: 1px solid var(--red); }
    </style>
</head>
<body>

    <div id="curtains">
        <div class="curtain left-c"><h2>AURA BY</h2></div>
        <div class="logo-trigger" onclick="document.body.classList.add('opened')">
            <h1>AL CIELO</h1>
            <small>START</small>
        </div>
        <div class="curtain right-c"><h2>MAY ROGA</h2></div>
    </div>

    <div class="app-grid">
        <div class="panel">
            <h2>I. Datos de Reserva (Miami MIA)</h2>
            <label>Master AWB / Guía Madre</label>
            <input type="text" id="awb" placeholder="045-12345678">
            
            <label>Tipo de Equipo Reservado</label>
            <select id="tipo_vuelo">
                <option value="PAX">Bellies (PAX - 63" Max)</option>
                <option value="CAO">Freighter (CAO - Carguero)</option>
            </select>

            <label>Naturaleza de Carga</label>
            <select id="naturaleza" onchange="dibujarPouch()">
                <option value="GEN">General (GEN)</option>
                <option value="DGR">Mercancía Peligrosa (DGR)</option>
                <option value="PER">Perecederos (PER)</option>
                <option value="VAL">Valor (VAL)</option>
            </select>

            <div id="pouch_checks">
                </div>
        </div>

        <div class="panel">
            <h2>II. Asesoría Física y Reporte</h2>
            <table id="tabla_piezas">
                <thead>
                    <tr><th>CANT</th><th>L (in)</th><th>W (in)</th><th>H (in)</th><th>PESO (lb)</th></tr>
                </thead>
                <tbody id="body_piezas"></tbody>
            </table>
            <button class="btn" style="background:#333; color:var(--gold); margin-top:10px;" onclick="addPiece()">+ AGREGAR ESTIBA / PIEZA</button>
            
            <h2 style="margin-top:30px;">III. Hallazgos del Asesor</h2>
            <textarea id="reporte" rows="5" placeholder="Dictado de voz o notas sobre el estado físico de la carga..."></textarea>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn btn-gold" onclick="voz()">🎤 DICTAR REPORTE</button>
                <button class="btn btn-gold">📸 ADJUNTAR (3 MAX)</button>
            </div>
        </div>

        <div class="panel" id="panel_resultados">
            <h2>IV. Soluciones SmartCargo</h2>
            <div id="output_status" style="margin-bottom:20px;">
                <p style="color:#666; text-align:center;">Esperando validación de muelle...</p>
            </div>
            <div id="output_soluciones"></div>
        </div>
    </div>

    <div class="floating-footer">
        <button class="btn btn-red" style="width:250px;" onclick="asesorar()">SOLUCIONAR DESPACHO</button>
        <button class="mini-btn" style="background:var(--gold); border:none; padding:10px 20px; border-radius:20px;" onclick="window.print()">GENERAR PDF</button>
        <button class="mini-btn" style="background:#444; color:white; border:none; padding:10px 20px; border-radius:20px;" onclick="location.reload()">BORRAR</button>
    </div>

    <script>
        function addPiece() {
            const tr = document.createElement('tr');
            tr.className = 'piece-row';
            tr.innerHTML = `
                <td><input type="number" class="p_cant" value="1"></td>
                <td><input type="number" class="p_l" value="0"></td>
                <td><input type="number" class="p_w" value="0"></td>
                <td><input type="number" class="p_h" value="0"></td>
                <td><input type="number" class="p_real" value="0"></td>
            `;
            document.getElementById('body_piezas').appendChild(tr);
        }

        function dibujarPouch() {
            const nat = document.getElementById('naturaleza').value;
            const docs = {
                "GEN": ["INVOICE", "PACKING LIST"],
                "DGR": ["DGD", "MSDS", "CHECKLIST", "LOI"],
                "PER": ["PHITO", "SANITARY", "IMPORT PERMIT"],
                "VAL": ["SECURITY SEALS", "VAL MANIFEST"]
            };
            let html = "<h3>POUCH DOCUMENTAL</h3>";
            docs[nat].forEach(d => {
                html += `<label style="display:block; font-size:11px; margin-bottom:5px;">
                            <input type="checkbox" class="pouch_val" value="${d}"> ${d}
                         </label>`;
            });
            document.getElementById('pouch_checks').innerHTML = html;
        }

        async function asesorar() {
            const piezas = Array.from(document.querySelectorAll('.piece-row')).map(r => ({
                cant: r.querySelector('.p_cant').value,
                l: r.querySelector('.p_l').value,
                w: r.querySelector('.p_w').value,
                h: r.querySelector('.p_h').value,
                p_real: r.querySelector('.p_real').value
            }));

            const pouch = Array.from(document.querySelectorAll('.pouch_val:checked')).map(c => c.value);

            const res = await fetch('/api/asesorar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    awb: document.getElementById('awb').value,
                    tipo_vuelo: document.getElementById('tipo_vuelo').value,
                    naturaleza: document.getElementById('naturaleza').value,
                    piezas: piezas,
                    pouch: pouch
                })
            });

            const data = await res.json();
            
            document.getElementById('output_status').innerHTML = `
                <div style="background:var(--red); padding:15px; border-radius:5px; text-align:center;">
                    <h3 style="margin:0">${data.status}</h3>
                    <p style="margin:5px 0 0 0">PESO COBRABLE: ${data.p_cobrable} LBS</p>
                    <small>EQUIPO RECOMENDADO: ${data.equipo_sugerido}</small>
                </div>
            `;

            let solHtml = "";
            data.soluciones.forEach((s, i) => {
                solHtml += `
                    <div class="sol-card critical">
                        <b>⚠️ ${s}</b>
                        <span class="action-tag">RESOLUCIÓN: ${data.acciones[i]}</span>
                    </div>
                `;
            });

            if(data.soluciones.length === 0) {
                solHtml = `<div class="sol-card">✅ CARGA LISTA PARA VOLAR. No se detectan discrepancias en Pouch ni Dimensiones.</div>`;
            }
            document.getElementById('output_soluciones').innerHTML = solHtml;
        }

        function voz() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-ES';
            recognition.onresult = (event) => {
                document.getElementById('reporte').value += event.results[0][0].transcript;
            };
            recognition.start();
        }

        addPiece();
        dibujarPouch();
    </script>
</body>
</html>
