<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMARTCARGO Validation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:0;}
#app{width:95%;max-width:900px;background:#111827;border-radius:20px;padding:20px;box-shadow:0 20px 40px rgba(0,0,0,0.6);display:flex;flex-direction:column;}
h1{font-size:24px;text-align:center;margin-bottom:10px;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
label{margin-top:10px;font-weight:600;}
input, select{width:100%;padding:8px;margin-top:4px;border-radius:8px;border:none;font-size:14px;}
button{padding:12px;margin-top:15px;border:none;border-radius:10px;background:#2563eb;color:white;font-weight:600;cursor:pointer;transition:all 0.2s;}
button:hover{background:#3b82f6;}
.phase{margin-top:15px;background:#1e293b;padding:10px;border-radius:12px;cursor:pointer;}
.phase-content{display:none;padding:10px;margin-top:5px;background:#0f172a;border-radius:8px;}
.status{font-weight:bold;margin-left:10px;}
.ok{color:green;}
.warning{color:orange;}
.error{color:red;}
#result{margin-top:20px;padding:15px;border-radius:12px;background:#1e293b;white-space:pre-line;font-size:14px;}
</style>
</head>
<body>
<div id="app">
<h1>SMARTCARGO Validation</h1>

<!-- Campos completos -->
<label>MAWB:</label><input type="text" id="mawb" placeholder="Número de guía master">
<label>HAWB:</label><input type="text" id="hawb" placeholder="Número de guía house">
<label>Aerolínea:</label><input type="text" id="airline" placeholder="Ej: Avianca">
<label>Número de vuelo:</label><input type="text" id="flight_number">
<label>Fecha de vuelo:</label><input type="date" id="flight_date">
<label>Origen:</label><input type="text" id="origin">
<label>Destino:</label><input type="text" id="destination">
<label>Rol del operador:</label><input type="text" id="role" placeholder="Ej: Agente de carga">

<label>Tipo de carga:</label>
<select id="cargo_type">
<option value="GENERAL">GENERAL</option>
<option value="DGR">DGR</option>
<option value="PER">PER</option>
<option value="AVI">AVI</option>
<option value="HUM">HUM</option>
<option value="VAL">VAL</option>
<option value="PHR">PHR</option>
<option value="FSH">FSH</option>
<option value="ELD">ELD</option>
<option value="BAT">BAT</option>
<option value="PRT">PRT</option>
<option value="MED">MED</option>
<option value="FTZ">FTZ</option>
<option value="AGR">AGR</option>
<option value="REF">REF</option>
<option value="CMM">CMM</option>
<option value="PAX">PAX</option>
<option value="CTR">CTR</option>
<option value="TMP">TMP</option>
<option value="HAZ">HAZ</option>
</select>

<label>Número de piezas:</label><input type="number" id="pieces" value="1" min="1">
<label>Largo (m):</label><input type="number" id="length" value="0.5" step="0.01">
<label>Ancho (m):</label><input type="number" id="width" value="0.5" step="0.01">
<label>Alto (m):</label><input type="number" id="height" value="0.5" step="0.01">
<label>Peso bruto (kg):</label><input type="number" id="gross_weight" value="1" min="0.1" step="0.1">
<label>Volumen (m³):</label><input type="number" id="volume" value="0.125" step="0.001" readonly>
<label>Documentos presentes (separados por coma):</label><input type="text" id="documents" placeholder="invoice, packing_list">
<label>Known Shipper:</label><select id="known_shipper"><option value="true">Sí</option><option value="false">No</option></select>
<label>Screening:</label><select id="screening"><option value="xray">X-Ray</option><option value="manual">Manual</option></select>
<label>Regulated Agent:</label><select id="regulated_agent"><option value="true">Sí</option><option value="false">No</option></select>

<!-- Fases Avianca -->
<div id="phases-container"></div>

<button id="validateBtn">Validar Carga</button>
<div id="result"></div>

<script>
// Cálculo de volumen automático
['length','width','height'].forEach(id=>{
  document.getElementById(id).addEventListener('input', ()=>{
    const l=parseFloat(document.getElementById('length').value);
    const w=parseFloat(document.getElementById('width').value);
    const h=parseFloat(document.getElementById('height').value);
    const vol=(l*w*h).toFixed(3);
    document.getElementById('volume').value=vol;
  });
});

// Crear placeholders de fases
for(let i=1;i<=8;i++){
  const container=document.getElementById('phases-container');
  const phaseDiv=document.createElement('div');
  phaseDiv.className='phase';
  phaseDiv.dataset.phase=i;
  phaseDiv.textContent=`Fase ${i}`;
  const contentDiv=document.createElement('div');
  contentDiv.className='phase-content';
  contentDiv.id=`phase${i}`;
  container.appendChild(phaseDiv);
  container.appendChild(contentDiv);
}

// Toggle fases
document.querySelectorAll('.phase').forEach(p=>{
  p.addEventListener('click', ()=>{
    const content=p.nextElementSibling;
    content.style.display=content.style.display==='block'?'none':'block';
  });
});

// Validación con backend
document.getElementById('validateBtn').addEventListener('click',()=>{
  const data={
    mawb: document.getElementById('mawb').value.trim(),
    hawb: document.getElementById('hawb').value.trim(),
    airline: document.getElementById('airline').value.trim(),
    flight_number: document.getElementById('flight_number').value.trim(),
    flight_date: document.getElementById('flight_date').value,
    origin: document.getElementById('origin').value.trim(),
    destination: document.getElementById('destination').value.trim(),
    cargo_type: document.getElementById('cargo_type').value,
    pieces: parseInt(document.getElementById('pieces').value),
    length: parseFloat(document.getElementById('length').value),
    width: parseFloat(document.getElementById('width').value),
    height: parseFloat(document.getElementById('height').value),
    volume: parseFloat(document.getElementById('volume').value),
    gross_weight: parseFloat(document.getElementById('gross_weight').value),
    documents: document.getElementById('documents').value.split(',').map(d=>d.trim()).filter(d=>d),
    security:{
      known_shipper: document.getElementById('known_shipper').value==="true",
      screening: document.getElementById('screening').value,
      regulated_agent: document.getElementById('regulated_agent').value==="true"
    },
    role: document.getElementById('role').value
  };

  fetch("/validate_shipment",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  })
  .then(r=>r.json())
  .then(res=>{
    // Resultado global
    let txt=`${res.status==="GREEN"?"✅ Verde":"❌ Rojo"}\n`;
    if(res.errors.length>0) txt+="Errores:\n• "+res.errors.join("\n• ")+"\n";
    if(res.corrections.length>0) txt+="Correcciones sugeridas:\n• "+res.corrections.join("\n• ")+"\n";
    txt+=`Trazabilidad: ${res.role} @ ${res.timestamp}`;
    document.getElementById('result').innerText=txt;

    // Mostrar fases completas
    if(res.phases){
      Object.keys(res.phases).forEach(pid=>{
        document.getElementById(pid).innerHTML=res.phases[pid].length>0 ? res.phases[pid].join("<br>") : "Sin alertas";
      });
    }
  })
  .catch(e=>{
    document.getElementById('result').innerText='❌ Error al conectar con el servidor';
    console.error(e);
  });
});
</script>
</div>
</body>
</html>
