<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AL CIELO - SmartCargo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root { --primary: #0a3d62; --danger: #eb4d4b; --success: #27ae60; }
    body { font-family: 'Inter', sans-serif; background:#f4f6f8; margin:0; padding:20px; }
    .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    h1 { color: var(--primary); text-align: center; font-size: 24px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
    .section { margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; overflow: hidden; }
    .header { background: var(--primary); color: white; padding: 10px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
    .body { padding: 15px; display: none; }
    .active .body { display: block; }
    label { display: block; font-weight: 600; margin-top: 10px; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
    th { background: #eee; padding: 8px; border: 1px solid #ddd; }
    td { padding: 5px; border: 1px solid #ddd; text-align: center; }
    .btn { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    .btn-main { background: var(--primary); color: white; }
    .btn-voice { background: #686de0; color: white; width: auto; padding: 5px 15px; font-size: 12px; }
    .lang-bar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 10px; }
    .lang-btn { cursor: pointer; border: 1px solid var(--primary); padding: 5px 10px; border-radius: 3px; font-size: 12px; }
    .selected-lang { background: var(--primary); color: white; }
</style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <div id="btn-es" class="lang-btn selected-lang" onclick="changeLang('es')">ESPAÑOL</div>
        <div id="btn-en" class="lang-btn" onclick="changeLang('en')">ENGLISH</div>
    </div>

    <h1 id="txt-title">AL CIELO - SmartCargo Advisory</h1>

    <div class="section active">
        <div class="header" onclick="toggle(this)">I. <span id="txt-sec1">IDENTIFICACIÓN</span> <span>▼</span></div>
        <div class="body">
            <label id="lbl-awb">Número de Guía (AWB):</label>
            <input type="text" id="awb" placeholder="045-12345678">
            <label id="lbl-obs">Notas / Copiar Texto (Email/PDF):</label>
            <textarea id="notas" rows="3" placeholder="Pegue aquí información del cliente..."></textarea>
            <button class="btn btn-voice" onclick="startDictation('notas')">🎤 <span id="txt-voice">Dictar por Voz</span></button>
        </div>
    </div>

    <div class="section">
        <div class="header" onclick="toggle(this)">II. <span id="txt-sec2">NATURALEZA DE CARGA</span> <span>▼</span></div>
        <div class="body">
            <p id="txt-multiselect" style="font-size: 12px; color: #666;">Seleccione todas las que apliquen:</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <label><input type="checkbox" class="tipo-carga" value="GEN"> GEN (General)</label>
                <label><input type="checkbox" class="tipo-carga" value="PER"> PER (Perecedero)</label>
                <label><input type="checkbox" class="tipo-carga" value="DGR"> DGR (Peligrosa)</label>
                <label><input type="checkbox" class="tipo-carga" value="ICE"> DRY ICE</label>
                <label><input type="checkbox" class="tipo-carga" value="HUM"> HUM (Restos)</label>
                <label><input type="checkbox" class="tipo-carga" value="VAL"> VAL (Valores)</label>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="header" onclick="toggle(this)">III. <span id="txt-sec3">DETALLE Y FOTOS</span> <span>▼</span></div>
        <div class="body">
            <table id="tablaBultos">
                <thead>
                    <tr>
                        <th>Cant.</th>
                        <th>L(cm)</th>
                        <th>W(cm)</th>
                        <th>H(cm)</th>
                        <th>Kg/u</th>
                        <th>Foto</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="number" class="p-cant" style="width:40px" value="1"></td>
                        <td><input type="number" class="p-l" style="width:40px"></td>
                        <td><input type="number" class="p-w" style="width:40px"></td>
                        <td><input type="number" class="p-h" style="width:40px"></td>
                        <td><input type="number" class="p-p" style="width:40px"></td>
                        <td><input type="file" class="p-foto" accept="image/*" capture="environment" style="width:80px"></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn" style="background:#27ae60; color:white;" onclick="addRow()">+ Partida</button>
        </div>
    </div>

    <div class="section">
        <div class="header" onclick="toggle(this)">IV. <span id="txt-sec4">EMBALAJE / ULD</span> <span>▼</span></div>
        <div class="body">
            <label id="lbl-pallet">Tipo de Pallet/Contenedor:</label>
            <select id="tipoPallet">
                <option value="Wood">Pallet Madera (Wood)</option>
                <option value="Plastic">Pallet Plástico (Plastic)</option>
                <option value="Metal">Pallet Metal</option>
                <option value="Bagazo">Bagazo (Eco)</option>
                <option value="PMC">PMC Pallet</option>
                <option value="PAG">PAG Pallet</option>
                <option value="Crate">Crate (Huacal)</option>
                <option value="Skip">Skip</option>
            </select>
        </div>
    </div>

    <button class="btn btn-main" id="btn-eval" onclick="evaluar()">GENERAR ASESORÍA TÉCNICA</button>
    <button class="btn" style="background:var(--danger); color:white;" onclick="location.reload()">BORRAR TODO</button>

    <div id="resultado" style="margin-top:20px; display:none;"></div>
</div>

<script>
let currentLang = 'es';

const translations = {
    es: {
        title: "AL CIELO - SmartCargo Advisory",
        sec1: "IDENTIFICACIÓN",
        sec2: "NATURALEZA DE CARGA",
        sec3: "DETALLE Y FOTOS",
        sec4: "EMBALAJE / ULD",
        voice: "Dictar por Voz",
        eval: "GENERAR ASESORÍA TÉCNICA",
        awb: "Número de Guía (AWB):",
        obs: "Notas / Copiar Texto (Email/PDF):"
    },
    en: {
        title: "AL CIELO - SmartCargo Advisory",
        sec1: "IDENTIFICATION",
        sec2: "NATURE OF CARGO",
        sec3: "DETAILS AND PHOTOS",
        sec4: "PACKAGING / ULD",
        voice: "Voice Dictation",
        eval: "GENERATE TECHNICAL ADVISORY",
        awb: "AWB Number:",
        obs: "Notes / Copy Text (Email/PDF):"
    }
};

function changeLang(l) {
    currentLang = l;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected-lang'));
    document.getElementById(`btn-${l}`).classList.add('selected-lang');
    
    document.getElementById('txt-title').innerText = translations[l].title;
    document.getElementById('txt-sec1').innerText = translations[l].sec1;
    document.getElementById('txt-sec2').innerText = translations[l].sec2;
    document.getElementById('txt-sec3').innerText = translations[l].sec3;
    document.getElementById('txt-sec4').innerText = translations[l].sec4;
    document.getElementById('txt-voice').innerText = translations[l].voice;
    document.getElementById('btn-eval').innerText = translations[l].eval;
    document.getElementById('lbl-awb').innerText = translations[l].awb;
    document.getElementById('lbl-obs').innerText = translations[l].obs;
}

function toggle(el) { el.parentElement.classList.toggle('active'); }

function addRow() {
    const row = `<tr>
        <td><input type="number" class="p-cant" style="width:40px" value="1"></td>
        <td><input type="number" class="p-l" style="width:40px"></td>
        <td><input type="number" class="p-w" style="width:40px"></td>
        <td><input type="number" class="p-h" style="width:40px"></td>
        <td><input type="number" class="p-p" style="width:40px"></td>
        <td><input type="file" class="p-foto" accept="image/*" capture="environment" style="width:80px"></td>
    </tr>`;
    document.querySelector('#tablaBultos tbody').insertAdjacentHTML('beforeend', row);
}

function startDictation(id) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("Voz no soportada en este navegador.");
    const recognition = new SpeechRecognition();
    recognition.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
    recognition.onresult = (event) => {
        document.getElementById(id).value += event.results[0][0].transcript;
    };
    recognition.start();
}

async function evaluar() {
    const resDiv = document.getElementById('resultado');
    resDiv.style.display = 'block';
    resDiv.innerHTML = "Procesando...";

    const bultos = [];
    const formData = new FormData();
    
    document.querySelectorAll('#tablaBultos tbody tr').forEach(tr => {
        bultos.push({
            cant: tr.querySelector('.p-cant').value,
            l: tr.querySelector('.p-l').value,
            w: tr.querySelector('.p-w').value,
            h: tr.querySelector('.p-h').value,
            p: tr.querySelector('.p-p').value
        });
        const foto = tr.querySelector('.p-foto').files[0];
        if(foto) formData.append("fotos", foto);
    });

    const payload = {
        lang: currentLang,
        awb: document.getElementById('awb').value,
        tipos_carga: Array.from(document.querySelectorAll('.tipo-carga:checked')).map(c => c.value),
        detalle_bultos: bultos,
        chk: { dgr: true } // Ejemplo
    };

    formData.append("data", JSON.stringify(payload));

    const response = await fetch('/api/evaluar', { method: 'POST', body: formData });
    const result = await response.json();

    let html = `<div style="padding:15px; background:#fff; border:2px solid #0a3d62; border-radius:8px;">`;
    html += `<h3>REPORTE: ${result.status}</h3>`;
    html += `<p>Vuelo: ${result.vuelo} | Peso: ${result.peso_total}</p>`;
    if(result.alertas.length > 0) html += `<ul style="color:red">${result.alertas.map(a => `<li>${a}</li>`).join('')}</ul>`;
    html += `<p><strong>${result.instruccion}</strong></p></div>`;
    resDiv.innerHTML = html;
}
</script>
</body>
</html>
