<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AL CIELO - Counter Specialist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --avianca: #e11a22; --dark: #0a3d62; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin:0; padding:10px; }
        .app-card { max-width: 900px; margin: auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .top-banner { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .lang-btn { background: none; border: 1px solid white; color: white; padding: 5px 15px; cursor: pointer; border-radius: 4px; }
        .section { border-bottom: 1px solid #eee; padding: 20px; }
        .section-title { font-weight: bold; color: var(--dark); border-left: 5px solid var(--avianca); padding-left: 10px; margin-bottom: 15px; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        
        .btn-voice { background: #4b6cb7; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-top: 5px; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-main { background: var(--avianca); color: white; border: none; padding: 20px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        .photo-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .photo-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; }
        
        .doc-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f1f5f9; padding: 15px; border-radius: 8px; }
        .doc-item { font-size: 13px; display: flex; align-items: center; gap: 10px; }
        
        .result-panel { padding: 20px; background: #0f172a; color: white; display: none; }
        .ready { color: #4ade80; } .action { color: #fbbf24; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="top-banner">
        <div style="float: right;">
            <button class="lang-btn" onclick="setLang('es')">ES</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
        <h2 id="app-title">AL CIELO - AGENTE DE COUNTER</h2>
    </div>

    <div class="section">
        <div class="section-title" id="t-sec1">I. Recepción de Datos</div>
        <label id="l-awb">Número de Guía (AWB):</label>
        <input type="text" id="awb" placeholder="045-XXXXXXXX">
        
        <label style="margin-top:15px;" id="l-dictado">Copiar Texto / Dictado de Voz:</label>
        <textarea id="dictado" rows="4" placeholder="Hable o pegue el contenido del packing list aquí..."></textarea>
        <button class="btn-voice" onclick="startVoice()">🎤 <span id="b-voice">Iniciar Dictado</span></button>
    </div>

    <div class="section">
        <div class="section-title" id="t-sec2">II. Checklist de Documentos</div>
        <div class="doc-list">
            <div class="doc-item"><input type="checkbox" class="doc-chk" id="d-id"> ID / Pasaporte</div>
            <div class="doc-item"><input type="checkbox" class="doc-chk" id="d-permiso"> Permisos Export/Import</div>
            <div class="doc-item"><input type="checkbox" class="doc-chk" id="d-sli"> SLI / Carta Instrucción</div>
            <div class="doc-item"><input type="checkbox" class="doc-chk" id="d-inv"> Factura Comercial</div>
            <div class="doc-item"><input type="checkbox" class="doc-chk" id="d-pk"> Packing List</div>
            <div class="doc-item"><input type="checkbox" class="doc-chk" id="d-dgr"> MSDS / DGD (Si aplica)</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title" id="t-sec3">III. Detalle de Carga y Evidencia</div>
        <table id="tablaCarga" style="width:100%; border-collapse: collapse;">
            <thead>
                <tr style="font-size:12px; color:#64748b;">
                    <th>Piezas</th><th>L</th><th>W</th><th>H</th><th>KG</th><th>FOTO</th>
                </tr>
            </thead>
            <tbody id="bodyCarga">
                <tr>
                    <td><input type="number" class="c-piezas" value="1"></td>
                    <td><input type="number" class="c-l"></td>
                    <td><input type="number" class="c-w"></td>
                    <td><input type="number" class="c-h"></td>
                    <td><input type="number" class="c-kg"></td>
                    <td><input type="file" class="c-foto" accept="image/*" capture="environment" onchange="preview(this)"></td>
                </tr>
            </tbody>
        </table>
        <div class="photo-preview" id="previews"></div>
        <button class="btn-add" onclick="addRow()">+ AGREGAR PARTIDA</button>
    </div>

    <div class="section">
        <div class="section-title" id="t-sec4">IV. Tipo de Estiba</div>
        <select id="tipoPallet">
            <option value="Wood">Pallet Madera (NIMF-15)</option>
            <option value="Plastic">Pallet Plástico</option>
            <option value="Metal">Pallet Metal</option>
            <option value="PMC">PMC Pallet</option>
            <option value="PAG">PAG Pallet</option>
            <option value="Crate">Crate / Huacal</option>
            <option value="Skip">Skip / Otros</option>
        </select>
        <div style="margin-top:10px;">
            <label><input type="checkbox" id="chkFumigado"> Sello de Fumigación Visible</label>
        </div>
    </div>

    <button class="btn-main" onclick="evaluar()">Grito Final: ¿VUELA?</button>
    
    <div id="result" class="result-panel"></div>
</div>

<script>
let currentLang = 'es';

function setLang(l) {
    currentLang = l;
    const t = {
        es: { title: "AL CIELO - AGENTE DE COUNTER", sec1: "I. Recepción de Datos", voice: "Iniciar Dictado", main: "Grito Final: ¿VUELA?" },
        en: { title: "AL CIELO - COUNTER AGENT", sec1: "I. Data Reception", voice: "Start Dictation", main: "Final Call: FLY?" }
    };
    document.getElementById('app-title').innerText = t[l].title;
    document.getElementById('b-voice').innerText = t[l].voice;
}

function addRow() {
    const row = `<tr>
        <td><input type="number" class="c-piezas" value="1"></td>
        <td><input type="number" class="c-l"></td>
        <td><input type="number" class="c-w"></td>
        <td><input type="number" class="c-h"></td>
        <td><input type="number" class="c-kg"></td>
        <td><input type="file" class="c-foto" accept="image/*" capture="environment" onchange="preview(this)"></td>
    </tr>`;
    document.getElementById('bodyCarga').insertAdjacentHTML('beforeend', row);
}

function preview(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = `<img src="${e.target.result}">`;
            document.getElementById('previews').insertAdjacentHTML('beforeend', img);
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function startVoice() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
    recognition.onresult = e => { document.getElementById('dictado').value += e.results[0][0].transcript; };
    recognition.start();
}

async function evaluar() {
    const resDiv = document.getElementById('result');
    resDiv.style.display = 'block';
    resDiv.innerHTML = "Analizando condiciones de aeronavegabilidad...";

    const bultos = [];
    const formData = new FormData();
    document.querySelectorAll('#bodyCarga tr').forEach(tr => {
        bultos.push({
            cant: tr.querySelector('.c-piezas').value,
            l: tr.querySelector('.c-l').value,
            w: tr.querySelector('.c-w').value,
            h: tr.querySelector('.c-h').value,
            p: tr.querySelector('.c-kg').value
        });
        const f = tr.querySelector('.c-foto').files[0];
        if(f) formData.append("fotos", f);
    });

    const payload = {
        lang: currentLang,
        awb: document.getElementById('awb').value,
        detalle_bultos: bultos,
        tipo_pallet: document.getElementById('tipoPallet').value,
        docs: {
            id: document.getElementById('d-id').checked,
            inv: document.getElementById('d-inv').checked,
            pk: document.getElementById('d-pk').checked
        },
        chk: { fumigado: document.getElementById('chkFumigado').checked }
    };

    formData.append("data", JSON.stringify(payload));
    const res = await fetch('/api/evaluar', { method: 'POST', body: formData });
    const data = await res.json();

    let html = `<h2>${data.status}</h2>`;
    html += `<p>Tipo de Aeronave: ${data.vuelo}</p>`;
    html += `<ul>${data.recomendaciones.map(r => `<li>${r}</li>`).join('')}</ul>`;
    if(data.fotos.length > 0) {
        html += `<div class="photo-preview">${data.fotos.map(f => `<img src="${f}">`).join('')}</div>`;
    }
    html += `<button class="btn-main" onclick="window.print()" style="margin-top:20px; background:#27ae60;">IMPRIMIR REPORTE PDF</button>`;
    resDiv.innerHTML = html;
}
</script>
</body>
</html>
