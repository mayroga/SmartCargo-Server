<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AURA - SmartCargo Advisory System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --avianca-red: #e11a22; --navy: #0a3d62; --gold: #fbc02d; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .app-container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); border-top: 8px solid var(--avianca-red); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .btn-reset { background: #636e72; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        h3 { background: var(--navy); color: white; padding: 10px 15px; border-radius: 5px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
        
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 13px; color: var(--navy); }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #dcdde1; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        /* Tipos de Carga Chips */
        .nature-box { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .chip { padding: 10px 15px; border: 2px solid #dcdde1; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s; background: white; }
        .chip.active { background: var(--avianca-red); color: white; border-color: var(--avianca-red); }

        /* Consola de Resultados */
        .result-panel { margin-top: 30px; padding: 25px; border-radius: 12px; border: 2px solid #eee; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th { background: var(--navy); color: white; padding: 12px; text-align: left; border: 1px solid #ddd; }
        td { padding: 12px; border: 1px solid #ddd; vertical-align: top; }

        .btn-main { background: var(--navy); color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { background: #002b4d; transform: translateY(-2px); }
        
        .voice-box { background: #fffde7; border: 1px dashed var(--gold); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .btn-mic { background: var(--avianca-red); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }

        @media print { .no-print { display: none !important; } .result-panel { display: block !important; border: none; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 style="color: var(--navy); margin: 0; font-size: 24px;">AURA - SmartCargo Advisory</h1>
        <button class="btn-reset no-print" onclick="location.reload()">🗑️ BORRAR SESIÓN</button>
    </div>

    <h3>I. Control de Acceso y Seguridad TSA</h3>
    <div class="grid">
        <div><label>Master AWB (045-):</label><input type="text" id="awb" placeholder="045-00000000"></div>
        <div><label>ID Portador (Driver/Agent):</label><input type="text" id="idChofer" placeholder="ID / Licencia"></div>
        <div><label>TSA Status:</label>
            <select id="shipperStatus">
                <option value="Known">Known Shipper (Seguro)</option>
                <option value="Unknown">Unknown Shipper (Requiere Screening)</option>
            </select>
        </div>
    </div>

    <h3>II. Naturaleza de Mercancía (IMP Codes)</h3>
    <div class="nature-box" id="natureBox">
        <div class="chip" onclick="sel(this, 'GEN')">GEN (General)</div>
        <div class="chip" onclick="sel(this, 'DGR')">DGR (Peligrosa)</div>
        <div class="chip" onclick="sel(this, 'PER')">PER (Perecederos)</div>
        <div class="chip" onclick="sel(this, 'AVI')">AVI (Animales)</div>
        <div class="chip" onclick="sel(this, 'VAL')">VAL (Valores)</div>
        <div class="chip" onclick="sel(this, 'HUM')">HUM (Restos Humanos)</div>
        <div class="chip" onclick="sel(this, 'PHR')">PHR (Farma)</div>
    </div>

    <h3>III. Auditoría Física (Weight & Balance)</h3>
    <div class="grid">
        <div><label>Peso Real (Lbs):</label><input type="number" id="pesoReal" placeholder="0.0"></div>
        <div><label>Dimensiones (L x W x H in):</label>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="L" placeholder="L">
                <input type="number" id="W" placeholder="W">
                <input type="number" id="H" placeholder="H">
            </div>
        </div>
        <div><label>Tipo de ULD / Box:</label>
            <select id="uld">
                <option value="LD3">LD3 (Container Belly)</option>
                <option value="PMC">PMC (Pallet 96x125)</option>
                <option value="PAG">PAG (Pallet 88x125)</option>
                <option value="LOOSE">Loose Cargo (Cajas)</option>
                <option value="CRATE">Wooden Crate (Huacal)</option>
                <option value="SKID">Skid / EuroPallet</option>
            </select>
        </div>
    </div>

    <div class="grid">
        <div><label>Embalaje Material:</label>
            <select id="tipoEmpaque">
                <option value="CARTON">Cartón Corrugado</option>
                <option value="WOOD">Madera (Madera Sólida)</option>
                <option value="PLASTIC">Plástico / Film</option>
                <option value="METAL">Metal / Drums</option>
            </select>
        </div>
        <div style="padding-top: 30px;">
            <label><input type="checkbox" id="chkNIMF"> Sello NIMF-15 / ISPM15 Visible</label>
            <label><input type="checkbox" id="chkDGR"> DGD Original Firmada</label>
        </div>
    </div>

    <div class="voice-box">
        <label>IV. Pre-Chequeo Técnico de Muelle (Voz / Dictado):</label>
        <textarea id="prechequeo" rows="4" placeholder="Interpretar estado: golpes, etiquetas, humedad, integridad del precinto..."></textarea>
        <button class="btn-mic no-print" onclick="startVoice()">🎤 INICIAR DICTADO DE INSPECCIÓN</button>
    </div>

    <button class="btn-main no-print" onclick="procesar()">GENERAR ASESORÍA TÉCNICA DE DESPACHO</button>

    <div id="resultado" class="result-panel"></div>
</div>

<script>
let codes = [];
function sel(el, c) { el.classList.toggle('active'); if(codes.includes(c)) codes=codes.filter(x=>x!==c); else codes.push(c); }

function startVoice() {
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'es-ES';
    rec.onresult = (e) => { document.getElementById('prechequeo').value += e.results[0][0].transcript + ". "; };
    rec.start();
}

async function procesar() {
    const resDiv = document.getElementById('resultado');
    resDiv.style.display = 'block';
    resDiv.innerHTML = "Analizando bajo normativa IATA/Avianca...";

    const payload = {
        awb: document.getElementById('awb').value,
        idChofer: document.getElementById('idChofer').value,
        shipperStatus: document.getElementById('shipperStatus').value,
        codigos: codes,
        pesoReal: document.getElementById('pesoReal').value,
        length: document.getElementById('L').value,
        width: document.getElementById('W').value,
        height: document.getElementById('H').value,
        uld: document.getElementById('uld').value,
        tipoEmpaque: document.getElementById('tipoEmpaque').value,
        chkNIMF: document.getElementById('chkNIMF').checked,
        chkDGR: document.getElementById('chkDGR').checked,
        prechequeo: document.getElementById('prechequeo').value
    };

    const resp = await fetch('/api/evaluar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    
    const data = await resp.json();
    
    let html = `<h2 style="color:var(--navy); text-align:center; border-bottom: 3px solid var(--avianca-red); padding-bottom:10px;">REPORTE DE ASESORÍA TÉCNICA SMARTCARGO</h2>`;
    html += `<p><strong>ESTADO DE CARGA:</strong> <span style="color:white; background:${data.errores.length ? 'red' : 'green'}; padding:5px 10px; border-radius:5px;">${data.status}</span></p>`;
    html += `<p><strong>PESO COBRABLE (Chargeable Weight):</strong> ${data.chargeable_weight} Lbs</p>`;
    
    html += `<table>
                <tr><th>DISCREPANCIAS / RIESGOS</th><th>SOLUCIONES TÉCNICAS (COUNTER ADVISORY)</th></tr>`;
    
    const maxRows = Math.max(data.errores.length, data.soluciones.length);
    if(maxRows === 0) {
        html += `<tr><td colspan="2" style="text-align:center;">Carga cumple con estándares operativos para vuelo inmediato.</td></tr>`;
    } else {
        for(let i=0; i<maxRows; i++) {
            html += `<tr>
                <td style="color:red; font-weight:bold;">${data.errores[i] || '✔ Cumplido'}</td>
                <td>${data.soluciones[i] || '-'}</td>
            </tr>`;
        }
    }
    html += `</table>`;
    
    if(data.notas_finales) {
        html += `<div style="margin-top:20px; background:#eee; padding:15px; border-left:5px solid var(--navy);">
                    <strong>OBSERVACIONES DE INSPECCIÓN:</strong><br>${data.notas_finales}
                 </div>`;
    }

    html += `<button onclick="window.print()" class="btn-main no-print" style="margin-top:20px; background:var(--avianca-red);">🖨️ IMPRIMIR REPORTE PARA ADUANA / MANIFIESTO</button>`;
    
    resDiv.innerHTML = html;
}
</script>
</body>
</html>
