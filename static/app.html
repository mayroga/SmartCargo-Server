<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SMARTCARGO SERVER PRO FINAL</title>

<style>
body{background:#0b1220;color:white;font-family:Arial}
.section{background:#111a2e;padding:15px;margin:10px;border-radius:10px}
.red{color:#ff4d4d}
.green{color:#4dff88}
.yellow{color:#ffd24d}
input,textarea,select{width:100%;padding:8px;margin:5px}
button{padding:10px;background:#00d4ff;border:none}
table{width:100%}
td,th{border:1px solid #333;padding:5px}
img{max-width:80px}
.hidden{display:none}
</style>

</head>
<body>

<h2>✈️ SMARTCARGO SERVER – REAL COUNTER LOGIC</h2>

<!-- INPUT INTELIGENTE -->
<div class="section">
<h3>🧠 CAPTURA INTELIGENTE (TIPO WHATSAPP)</h3>

<textarea id="input_texto" rows="5" placeholder="Pegue, escriba o dicte toda la información de la carga..."></textarea>
<button onclick="activarVoz()">🎤 Dictar</button>

<div id="live_feedback" class="yellow"></div>
</div>

<!-- ROL -->
<div class="section">
<h3>👤 ROL</h3>
<select id="rol">
<option value="">Selecciona</option>
<option>SHIPPER</option>
<option>FORWARDER</option>
<option>WAREHOUSE</option>
<option>TRUCKER</option>
</select>
</div>

<!-- TIPO -->
<div class="section">
<h3>📦 TIPO DE CARGA</h3>
<select id="tipo">
<option>GENERAL</option>
<option>DGR</option>
<option>PER</option>
<option>VAL</option>
<option>HUM</option>
<option>AVI</option>
<option>MED</option>
<option>ICE</option>
</select>
</div>

<!-- PIEZAS -->
<div class="section">
<h3>📦 AUDITORÍA FÍSICA</h3>

<table id="tabla">
<tr><th>CANT</th><th>L</th><th>W</th><th>H</th><th>PESO</th><th>FOTO</th></tr>
</table>

<button onclick="add()">+ PIEZA</button>
</div>

<!-- VALIDACIÓN -->
<div class="section">
<button onclick="validar()">VALIDAR COUNTER</button>
<div id="resultado"></div>
</div>

<script>

let recognition;

// 🎤 VOZ CONTINUA
function activarVoz(){
recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang="es-ES";
recognition.continuous=true;

recognition.onresult = (e)=>{
input_texto.value += e.results[e.results.length-1][0].transcript + " ";
analizarTexto();
};

recognition.start();
}

// 🔴 ANÁLISIS EN TIEMPO REAL
function analizarTexto(){
let t = input_texto.value.toUpperCase();

let msg="";

if(t.includes("DGR") || t.includes("CORROSIVO")){
msg += "⚠ Detectado posible DGR → Requiere declaración DG<br>";
}

if(t.includes("FRIO") || t.includes("TEMPERATURA")){
msg += "⚠ Detectado PER → Control temperatura<br>";
}

live_feedback.innerHTML = msg;
}

// ➕ PIEZAS
function add(){
let tr = document.createElement("tr");

tr.innerHTML = `
<td><input class="cant"></td>
<td><input class="l" oninput="validarCampo(this)"></td>
<td><input class="w" oninput="validarCampo(this)"></td>
<td><input class="h" oninput="validarCampo(this)"></td>
<td><input class="peso" oninput="validarCampo(this)"></td>
<td><input type="file" onchange="preview(this)"></td>
`;

tabla.appendChild(tr);
}

// 📷 FOTO
function preview(input){
let img = document.createElement("img");
img.src = URL.createObjectURL(input.files[0]);
input.parentNode.appendChild(img);
}

// VALIDACIÓN CAMPO
function validarCampo(i){
if(i.value<=0){
i.style.border="2px solid red";
}else{
i.style.border="2px solid green";
}
}

// VALIDAR
async function validar(){

let piezas=[];

document.querySelectorAll("#tabla tr").forEach((r,i)=>{
if(i===0)return;

piezas.push({
l:r.querySelector(".l").value,
w:r.querySelector(".w").value,
h:r.querySelector(".h").value,
peso:r.querySelector(".peso").value,
foto:r.querySelector("input[type=file]").files.length>0
});
});

let res = await fetch("/api/validar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
tipo:tipo.value,
piezas:piezas,
input_texto:input_texto.value
})
});

let d = await res.json();

let html = `<h3>ESTADO: ${d.status}</h3>`;
html += `<p>PESO COBRABLE: ${d.peso_cobrable}</p>`;
html += `<p>AVIÓN: ${d.avion}</p>`;

html += "<h4>DOCUMENTOS:</h4>";
d.documentos.forEach(doc=>{
html += `<div class="yellow">${doc}</div>`;
});

html += "<h4>ALERTAS Y SOLUCIONES:</h4>";
d.alertas.forEach((a,i)=>{
html += `<div class="red">⚠ ${a}</div>`;
html += `<div>✔ ${d.soluciones[i]}</div>`;
html += `<div class="yellow">${d.explicaciones[i]}</div>`;
});

if(d.alertas.length===0){
html += `<div class="green">✔ LISTO PARA VOLAR</div>`;
}

resultado.innerHTML = html;
}

</script>

</body>
</html>
