<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMARTCARGO SIMULATION ENGINE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1f;
    color: white;
}

.header {
    padding: 20px;
    text-align: center;
    background: #111a33;
    font-size: 22px;
    font-weight: bold;
    color: #00ffd5;
}

.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.card {
    background: #141c2f;
    padding: 15px;
    border-radius: 12px;
}

label {
    font-size: 12px;
    color: #aaa;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
    background: #0b1020;
    border: 1px solid #333;
    color: white;
}

button {
    width: 100%;
    padding: 15px;
    background: #00ffd5;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    padding: 20px;
    border-radius: 10px;
}

.green { background: #00c853; }
.yellow { background: #ffeb3b; color: black; }
.orange { background: #ff9800; }
.red { background: #f44336; }

pre {
    white-space: pre-wrap;
}

.panel {
    margin-top: 20px;
    background: #111a33;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="header">
SMARTCARGO SIMULATION ENGINE v2 - PRE COUNTER DECISION SYSTEM
</div>

<div class="container">

<div class="grid">

    <div class="card">
        <h3>DG SIMULATION</h3>
        <select id="dg">
            <option value="no">NO</option>
            <option value="yes">YES</option>
        </select>

        <label>UN Number</label>
        <input id="un_number">

        <label>MSDS</label>
        <select id="msds">
            <option value="true">YES</option>
            <option value="">NO</option>
        </select>

        <label>Shipper Declaration</label>
        <select id="shippers_declaration">
            <option value="true">YES</option>
            <option value="">NO</option>
        </select>
    </div>

    <div class="card">
        <h3>CARGO FLOW</h3>

        <label>Consolidated</label>
        <select id="consolidated">
            <option value="no">NO</option>
            <option value="yes">YES</option>
        </select>

        <label>Unitary</label>
        <select id="unitary">
            <option value="no">NO</option>
            <option value="yes">YES</option>
        </select>

        <label>Special</label>
        <select id="special">
            <option value="no">NO</option>
            <option value="yes">YES</option>
        </select>

        <label>General</label>
        <select id="general">
            <option value="yes">YES</option>
            <option value="no">NO</option>
        </select>
    </div>

    <div class="card">
        <h3>OPS SIMULATION</h3>

        <label>Aircraft</label>
        <select id="aircraft">
            <option value="cargo">CARGO</option>
            <option value="passenger">PASSENGER</option>
        </select>

        <label>Movement</label>
        <select id="movement">
            <option value="local">LOCAL</option>
            <option value="transfer">TRANSFER</option>
            <option value="comat">COMAT</option>
        </select>

        <label>Packaging</label>
        <select id="packaging">
            <option value="type_a">TYPE A</option>
            <option value="type_b">TYPE B</option>
        </select>
    </div>

</div>

<button onclick="runSimulation()">RUN SIMULATION ENGINE</button>

<div id="result" class="result"></div>

<div class="panel">
    <h3>SIMULATION LOG OUTPUT</h3>
    <pre id="log"></pre>
</div>

</div>

<script>
async function runSimulation() {

    const data = {
        dg: document.getElementById("dg").value,
        un_number: document.getElementById("un_number").value,
        msds: document.getElementById("msds").value,
        shippers_declaration: document.getElementById("shippers_declaration").value,
        consolidated: document.getElementById("consolidated").value,
        unitary: document.getElementById("unitary").value,
        special: document.getElementById("special").value,
        general: document.getElementById("general").value,
        aircraft: document.getElementById("aircraft").value,
        movement: document.getElementById("movement").value,
        packaging: document.getElementById("packaging").value
    };

    const res = await fetch("/api/simulate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    const box = document.getElementById("result");
    box.className = "result " + result.level;

    box.innerHTML = `
        <h2>STATUS: ${result.status}</h2>
        <h3>SCORE: ${result.score}</h3>
        <h3>RULES TRIGGERED:</h3>
        <pre>${JSON.stringify(result.triggered_rules, null, 2)}</pre>
    `;

    document.getElementById("log").innerText =
        JSON.stringify(result, null, 2);
}
</script>

</body>
</html>
