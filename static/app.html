<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SMART CARGO OS - Unified Core</title>

<style>
body { font-family: Arial; background:#0b1220; color:white; margin:0; padding:20px; }

h2 { color:#00d4ff; }

.container { max-width:1400px; margin:auto; }

.section, .panel {
    background:#111a2e;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

.card { background:#1a2742; padding:10px; border-radius:8px; margin-top:10px; }

input, select, textarea {
    width:100%;
    padding:8px;
    margin:5px 0;
}

button {
    padding:10px;
    background:#00d4ff;
    border:none;
    cursor:pointer;
    margin-top:10px;
    width:100%;
}

.hidden { display:none; }

.step { border-left:3px solid #00d4ff; padding:5px; margin:5px 0; }

.red { color:#ff4d4d; }
.green { color:#4dff88; }
.yellow { color:#ffd24d; }

table { width:100%; border-collapse:collapse; }
td, th { border:1px solid #333; padding:5px; text-align:center; }
</style>
</head>

<body>

<div class="container">

<h2>✈️ SMART CARGO OS - Unified Advisory + Audit + AWB Engine</h2>

<!-- ===================== -->
<!-- 1. DATOS INICIALES -->
<!-- ===================== -->
<div class="section">
<h3>📋 Datos Iniciales</h3>

<input id="name" placeholder="Nombre">
<input id="phone" placeholder="Teléfono">
<input id="email" placeholder="Email">
<input id="origin" placeholder="Origen">
<input id="destination" placeholder="Destino">

<button onclick="goRole()">Continuar</button>
</div>

<!-- ===================== -->
<!-- 2. ROL -->
<!-- ===================== -->
<div class="section hidden" id="roleBox">
<h3>👤 Rol Operativo</h3>

<select id="role" onchange="roleLogic()">
<option>SHIPPER</option>
<option>FORWARDER</option>
<option>WAREHOUSE</option>
<option>TRUCKER</option>
<option>CONSIGNEE</option>
</select>

<div id="roleHelp"></div>

<button onclick="goCargo()">Siguiente</button>
</div>

<!-- ===================== -->
<!-- 3. TIPO CARGA -->
<!-- ===================== -->
<div class="section hidden" id="cargoBox">
<h3>📦 Tipo de Carga</h3>

<select id="type" onchange="docRules()">
<option>GENERAL</option>
<option>DGR</option>
<option>PERECEDERO</option>
<option>VALIOSO</option>
<option>HUMANO</option>
<option>ANIMALES</option>
</select>

<div id="docsPreview"></div>

<button onclick="goAudit()">Continuar Auditoría</button>
</div>

<!-- ===================== -->
<!-- 4. AUDITORÍA FÍSICA -->
<!-- ===================== -->
<div class="section hidden" id="auditBox">
<h3>📦 Auditoría Física (Pieza por Pieza)</h3>

<table id="table">
<tr>
<th>CANT</th><th>L</th><th>W</th><th>H</th><th>PESO</th><th>FOTO</th>
</tr>
</table>

<button onclick="addPiece()">+ AGREGAR PIEZA</button>

<h3>🎤 Reporte Inspector</h3>
<textarea id="report"></textarea>
<button onclick="dictation()">🎤 Dictado Técnico</button>

<button onclick="goValidation()">Continuar Validación</button>
</div>

<!-- ===================== -->
<!-- 5. VALIDACIÓN -->
<!-- ===================== -->
<div class="section hidden" id="validationBox">
<h3>⚖️ VALIDACIÓN OPERATIVA</h3>

<button onclick="validate()">VALIDAR DESPACHO</button>

<div id="validationResult"></div>
<div id="riskEngine"></div>
</div>

<!-- ===================== -->
<!-- 6. PROCESO EN VIVO -->
<!-- ===================== -->
<div class="section hidden" id="processBox">
<h3>🧠 PROCESAMIENTO EN VIVO</h3>
<div id="flow"></div>
</div>

<!-- ===================== -->
<!-- 7. AWB FINAL -->
<!-- ===================== -->
<div class="section hidden" id="awbBox">
<h3>✈️ AWB FINAL</h3>
<div id="awb"></div>
</div>

</div>

<script>

let state = {};
let pieces = [];

/* ===================== */
/* FLOW CONTROL */
/* ===================== */

function goRole(){
state.name = name.value;
state.phone = phone.value;
state.email = email.value;
state.origin = origin.value;
state.destination = destination.value;

roleBox.classList.remove("hidden");
}

function goCargo(){
state.role = role.value;
cargoBox.classList.remove("hidden");
}

function goAudit(){
state.type = type.value;
auditBox.classList.remove("hidden");
}

function goValidation(){
validationBox.classList.remove("hidden");
}

/* ===================== */
/* ROLE LOGIC */
/* ===================== */

function roleLogic(){

let r = role.value;

let msg = {
SHIPPER:"Dueño de carga - control total documental",
FORWARDER:"Consolidador - alta carga regulatoria",
WAREHOUSE:"Inspección física prioritaria",
TRUCKER:"Solo transporte - validación reducida",
CONSIGNEE:"Receptor final - verificación documental"
};

roleHelp.innerHTML = msg[r];
}

/* ===================== */
/* DOC RULES */
/* ===================== */

function docRules(){

let t = type.value;

let base = ["AWB", "Factura Comercial"];
let extra = [];

if(t==="DGR") extra = ["MSDS", "IATA DGR", "UN Packaging"];
if(t==="PERECEDERO") extra = ["Cert Temp", "Cold Chain Log"];
if(t==="VALIOSO") extra = ["Seguro", "Custodia"];
if(t==="HUMANO") extra = ["Autorización Legal"];

docsPreview.innerHTML =
"<div class='card'>" + base.concat(extra).map(d=>`<div class='step'>📄 ${d}</div>`).join("") + "</div>";
}

/* ===================== */
/* PIEZAS */
/* ===================== */

function addPiece(){

pieces.push({
cant:1,
l:200,
w:200,
h:280,
peso:8000,
foto:"dg.jpg"
});

renderTable();
}

function renderTable(){

table.innerHTML = `
<tr>
<th>CANT</th><th>L</th><th>W</th><th>H</th><th>PESO</th><th>FOTO</th>
</tr>` +

pieces.map(p=>`
<tr>
<td>${p.cant}</td>
<td>${p.l}</td>
<td>${p.w}</td>
<td>${p.h}</td>
<td>${p.peso}</td>
<td>${p.foto}</td>
</tr>
`).join("");
}

/* ===================== */
/* DICTADO */
/* ===================== */

function dictation(){
report.value =
"Sellos intactos. olor químico leve. posible DG. sin fugas visibles.";
}

/* ===================== */
/* VALIDACIÓN + RIESGO ENGINE */
/* ===================== */

function validate(){

let risk = [];
let total = 0;

pieces.forEach((p,i)=>{
total += p.peso;

if(p.h > 240){
risk.push(`EXCESO ALTURA PIEZA ${i+1}`);
}
});

if(!state.awbPrefix) state.awbPrefix="000";

if(state.awbPrefix !== "045"){
risk.push("PREFIJO AWB INVÁLIDO (debe iniciar 045)");
}

risk.push("FALTA DOCUMENTO: AWB");
risk.push("FALTA DOCUMENTO: FACTURA");
risk.push("FALTA DOCUMENTO: UN PACKAGING");

let status = risk.length ? "RECHAZADO" : "APROBADO";

validationResult.innerHTML = `
<div class="card">
<div class="${risk.length?'red':'green'}">ESTADO: ${status}</div>
<div>PESO TOTAL: ${(total*8.43).toFixed(2)} LB</div>
</div>
`;

riskEngine.innerHTML = risk.map(r=>`<div class="step red">⚠ ${r}</div>`).join("");

if(risk.length === 0) runProcess();
}

/* ===================== */
/* PROCESS SIMULATION */
/* ===================== */

function runProcess(){

processBox.classList.remove("hidden");

let steps = [
"Recibiendo datos",
"Validando física",
"Comparando peso",
"Revisando documentos",
"Aplicando reglas IATA",
"Generando AWB"
];

let i=0;

let interval = setInterval(()=>{

flow.innerHTML += `<div class='step green'>${steps[i]}</div>`;
i++;

if(i>=steps.length){
clearInterval(interval);
generateAWB();
}

},700);
}

/* ===================== */
/* AWB FINAL */
/* ===================== */

function generateAWB(){

awbBox.classList.remove("hidden");

let awb = "045-" + Math.floor(Math.random()*99999999);

awb.innerHTML = `
<div class="card">
<h3>✈️ ${awb}</h3>
<p>Cliente: ${state.name}</p>
<p>Ruta: ${state.origin} → ${state.destination}</p>
<p>Tipo: ${state.type}</p>
<p>Rol: ${state.role}</p>
<p class="green">✔ CARGA PROCESADA</p>
</div>
`;
}

</script>

</body>
</html>
