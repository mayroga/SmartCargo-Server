<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - AURA BY MAY ROGA</title>
    <style>
        :root { --blue: #00d4ff; --bg: #0b1220; --panel: #111a2e; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; }
        .section { background: var(--panel); padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #1e2a44; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2, h3 { color: var(--blue); text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #070d19; border: 1px solid #334466; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: var(--blue); color: #0b1220; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        .grid-header { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 10px; font-weight: bold; color: var(--blue); font-size: 12px; margin-bottom: 5px; }
        .piece-row { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #2a3a5a; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 10px; }
        .hidden { display: none; }
        .alert-box { border-left: 6px solid #ff4d4d; background: rgba(255,77,77,0.1); padding: 20px; border-radius: 8px; }
        .success-box { border-left: 6px solid #4dff88; background: rgba(77,255,136,0.1); padding: 20px; border-radius: 8px; }
        .btn-delete { background: #ff4d4d; color: white; width: auto; padding: 10px 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <h2>✈️ AL CIELO</h2>
        <button class="btn-delete" onclick="location.reload()">BORRAR TODO</button>
    </div>

    <div class="section">
        <h3>📋 Datos del Envío</h3>
        <input id="awb" placeholder="Número de Guía (ej: 729-3126250)">
        <select id="tipo">
            <option value="GENERAL">CARGA GENERAL</option>
            <option value="PHARMA">PHARMA / COLD CHAIN</option>
            <option value="DGR">MERCANCÍA PELIGROSA (DGR)</option>
            <option value="PER">PERECEDEROS</option>
        </select>
        <button onclick="document.getElementById('auditBox').classList.remove('hidden')">INICIAR ASESORÍA FÍSICA</button>
    </div>

    <div class="section hidden" id="auditBox">
        <h3>📦 Auditoría de Piezas (Manual)</h3>
        <div class="grid-header">
            <span>CANT</span><span>LARGO(in)</span><span>ANCHO(in)</span><span>ALTO(in)</span><span>PESO(kg)</span>
        </div>
        <div id="listaPiezas"></div>
        <button style="background:#1a2742; color:var(--blue); margin-top:10px;" onclick="addPiece()">+ AGREGAR PIEZA</button>
        
        <h3 style="margin-top:30px;">🎤 Reporte del Inspector</h3>
        <textarea id="obs" rows="3" placeholder="Indique si hay daños visibles, fugas o falta de sellos..."></textarea>
        <button onclick="enviarValidacion()">EJECUTAR PRE-CHEQUEO FINAL</button>
    </div>

    <div class="section hidden" id="resultBox">
        <div id="statusContainer"></div>
        <div id="alertasLista" style="margin-top:20px;"></div>
        <button style="margin-top:20px; background:#4dff88" onclick="window.print()">GENERAR PDF PARA WHATSAPP</button>
    </div>
</div>

<script>
    let piezas = [];

    function addPiece() {
        const p = { cant: 1, l: 0, w: 0, h: 0, peso: 0 };
        piezas.push(p);
        render();
    }

    function render() {
        const container = document.getElementById("listaPiezas");
        container.innerHTML = piezas.map((p, i) => `
            <div class="piece-row">
                <div class="grid-inputs">
                    <input type="number" value="${p.cant}" onchange="update(${i},'cant',this.value)">
                    <input type="number" placeholder="L" onchange="update(${i},'l',this.value)">
                    <input type="number" placeholder="W" onchange="update(${i},'w',this.value)">
                    <input type="number" placeholder="H" onchange="update(${i},'h',this.value)">
                    <input type="number" placeholder="KG" onchange="update(${i},'peso',this.value)">
                </div>
                <div style="margin-top:10px">
                    <label style="font-size:12px; color:var(--blue)">SUBIR FOTO / CÁMARA:</label>
                    <input type="file" accept="image/*" capture="environment">
                </div>
            </div>
        `).join("");
    }

    function update(i, k, v) { piezas[i][k] = v; }

    async function enviarValidacion() {
        const data = {
            awb: document.getElementById("awb").value,
            naturaleza: document.getElementById("tipo").value,
            piezas: piezas,
            observaciones: document.getElementById("obs").value
        };

        const res = await fetch('/api/validar_precheck', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        const result = await res.json();
        mostrar(result);
    }

    function mostrar(res) {
        document.getElementById("resultBox").classList.remove("hidden");
        const isOk = res.status === "READY TO FLY";
        
        document.getElementById("statusContainer").innerHTML = `
            <div class="${isOk ? 'success-box' : 'alert-box'}">
                <h1 style="margin:0">${res.status}</h1>
                <p style="font-size:20px">Peso Cobrable: <strong>${res.p_cobrable} KG</strong></p>
            </div>
        `;

        let html = "";
        res.alertas.forEach((a, i) => {
            html += `
                <div style="border-bottom: 1px solid #334466; padding: 10px 0;">
                    <strong style="color:#ff4d4d">⚠ ${a}</strong><br>
                    <small>${res.explicaciones[i]}</small><br>
                    <em style="color:var(--blue)">Riesgo: ${res.riesgos[i]}</em>
                </div>
            `;
        });
        document.getElementById("alertasLista").innerHTML = html || "✅ Carga verificada sin discrepancias.";
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
