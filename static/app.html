<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AL CIELO | SMARTCARGO SERVER</title>
    <style>
        :root { --red: #e11a22; --black: #1a1a1a; --gray: #f4f4f4; --gold: #d4a017; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--gray); margin: 0; padding: 10px; font-weight: bold; }
        .app-container { max-width: 1400px; margin: auto; background: white; border: 3px solid var(--black); padding: 20px; }
        .header { background: var(--black); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .section { border: 2px solid #ccc; padding: 15px; margin-bottom: 15px; }
        h3 { background: var(--red); color: white; padding: 8px; margin: -15px -15px 15px -15px; text-transform: uppercase; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid var(--black); box-sizing: border-box; font-weight: bold; }
        .btn { padding: 15px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .btn-red { background: var(--red); color: white; width: 100%; font-size: 20px; border: 2px solid var(--black); }
        .btn-black { background: var(--black); color: white; }
        .piece-table { width: 100%; border-collapse: collapse; }
        .piece-table th { background: #eee; border: 1px solid #000; font-size: 12px; padding: 5px; }
        .piece-table td { border: 1px solid #000; padding: 2px; }
        .result-box { display: none; border: 5px solid var(--red); padding: 20px; margin-top: 20px; background: #fff1f1; }
        .alert-card { border-left: 10px solid var(--red); background: white; padding: 10px; margin-bottom: 10px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div>
            <span style="font-size: 24px;">AL CIELO | SMARTCARGO ADVISORY</span><br>
            <small>ESTACIÓN: MIAMI (MIA) | GATEWAY: AVIANCA CARGO</small>
        </div>
        <button class="btn btn-red" style="width: auto; font-size: 14px;" onclick="location.reload()">BORRAR TODO (RESET)</button>
    </div>

    <div class="grid">
        <div>
            <div class="section">
                <h3>I. Viabilidad y Seguridad TSA</h3>
                <input type="text" id="awb" placeholder="AWB (045-XXXXXXXX)">
                <select id="known_shipper">
                    <option value="true">KNOWN SHIPPER (CONOCIDO)</option>
                    <option value="false">UNKNOWN SHIPPER (DESCONOCIDO - REQUIERE SCREENING)</option>
                </select>
                <select id="naturaleza" onchange="actualizarChecks()">
                    <option value="GENERAL">CARGA GENERAL (GEN)</option>
                    <option value="DGR">DANGEROUS GOODS (DGR)</option>
                    <option value="PER">PERECEDEROS (PER)</option>
                    <option value="VAL">VALORES (VAL)</option>
                    <option value="HUM">RESTOS HUMANOS (HUM)</option>
                </select>
                <textarea id="docs_texto" placeholder="Escriba aquí los documentos físicos que tiene en mano (Ej: Factura, Packing List...)"></textarea>
                <div id="check_area" style="font-size: 12px; background: #ffffcc; padding: 10px;"></div>
            </div>
        </div>

        <div>
            <div class="section">
                <h3>II. Auditoría Física (Pieza por Pieza)</h3>
                <table class="piece-table">
                    <thead>
                        <tr>
                            <th>CANT</th><th>L</th><th>W</th><th>H</th><th>PESO (LB)</th><th>FOTO/FILE</th>
                        </tr>
                    </thead>
                    <tbody id="piezas_body"></tbody>
                </table>
                <button class="btn btn-black" onclick="addPiece()">+ AGREGAR PIEZA / PALLET</button>
            </div>

            <div class="section" style="background: #eef;">
                <h3>III. Reporte del Inspector (Voz/Dictado)</h3>
                <textarea id="voz_texto" rows="5" placeholder="Reporte daños, sellos, olores, discrepancias físicas..."></textarea>
                <button class="btn btn-black" style="width: 100%; background: var(--gold);" onclick="toggleVoz()">🎤 ACTIVAR DICTADO TÉCNICO</button>
            </div>
        </div>
    </div>

    <button class="btn btn-red" onclick="procesar()">VALIDAR Y ASESORAR DESPACHO</button>

    <div id="resultados" class="result-box"></div>
</div>

<script>
let recognition;

function addPiece() {
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td><input type="number" class="p_cant" value="1" style="width:50px"></td>
        <td><input type="number" class="p_l" placeholder="L" style="width:50px"></td>
        <td><input type="number" class="p_w" placeholder="W" style="width:50px"></td>
        <td><input type="number" class="p_h" placeholder="H" style="width:50px"></td>
        <td><input type="number" class="p_real" placeholder="Lb" style="width:60px"></td>
        <td><input type="file" accept="image/*" style="font-size:9px; width:100px"></td>
    `;
    document.getElementById('piezas_body').appendChild(tr);
}

function actualizarChecks() {
    const nat = document.getElementById('naturaleza').value;
    const area = document.getElementById('check_area');
    const docs = {
        "GENERAL": ["Factura Original", "Packing List", "AWB Firmado"],
        "DGR": ["Shipper's Declaration", "MSDS", "Etiqueta Riesgo"],
        "PER": ["Certificado Fitosanitario", "Factura"],
        "VAL": ["Manifiesto VAL", "Custodia Armada"],
        "HUM": ["Acta Defunción", "Permiso Tránsito"]
    };
    area.innerHTML = "<strong>REQ. MÍNIMOS:</strong><br>" + docs[nat].map(d => `<label><input type="checkbox" class="doc_check" value="${d}"> ${d}</label> `).join('');
}

function toggleVoz() {
    if (!recognition) {
        recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.continuous = true;
        recognition.onresult = (e) => {
            document.getElementById('voz_texto').value += e.results[e.results.length - 1][0].transcript + " ";
        };
    }
    recognition.start();
}

async function procesar() {
    const piezas = [];
    document.querySelectorAll('#piezas_body tr').forEach(tr => {
        piezas.push({
            cant: tr.querySelector('.p_cant').value,
            l: tr.querySelector('.p_l').value,
            w: tr.querySelector('.p_w').value,
            h: tr.querySelector('.p_h').value,
            p_real: tr.querySelector('.p_real').value
        });
    });

    const payload = {
        awb: document.getElementById('awb').value,
        known_shipper: document.getElementById('known_shipper').value === "true",
        naturaleza: document.getElementById('naturaleza').value,
        docs_texto: document.getElementById('docs_texto').value,
        docs_check: Array.from(document.querySelectorAll('.doc_check:checked')).map(c => c.value),
        piezas: piezas,
        reporte_voz: document.getElementById('voz_texto').value
    };

    const res = await fetch('/api/validar_carga', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    const data = await res.json();
    
    const div = document.getElementById('resultados');
    div.style.display = 'block';
    let h = `<h1 style="color:var(--red)">ESTADO: ${data.status}</h1>`;
    h += `<h2>PESO COBRABLE: ${data.p_cobrable} LBS</h2><hr>`;
    
    data.alertas.forEach((alert, i) => {
        h += `<div class="alert-card">
                <div style="font-size:18px">⚠️ ${alert}</div>
                <p>${data.explicaciones[i]}</p>
                <div style="color:blue">⚖️ RIESGO: ${data.riesgos[i]}</div>
              </div>`;
    });
    div.innerHTML = h;
    div.scrollIntoView();
}

addPiece();
actualizarChecks();
</script>
</body>
</html>
