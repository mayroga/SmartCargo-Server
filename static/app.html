<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AL CIELO - SmartCargo Advisory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0a3d62; --danger: #eb4d4b; --success: #27ae60; --light: #f4f6f8; --avianca: #e11a22; }
        body { font-family: 'Inter', sans-serif; background: var(--light); margin:0; padding:20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 4px solid var(--avianca); padding-bottom: 10px; text-transform: uppercase; margin-top: 0; }
        .lang-bar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 15px; }
        .lang-btn { cursor: pointer; border: 2px solid var(--primary); padding: 6px 15px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .selected-lang { background: var(--primary); color: white; }
        .section { margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .header { background: #f8f9fa; padding: 12px 15px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .body { padding: 20px; display: none; }
        .active .body { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--primary); color: white; padding: 10px; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; text-transform: uppercase; }
        .btn-main { background: var(--avianca); color: white; font-size: 16px; }
        .alert-card { background: #fff5f5; border-left: 5px solid var(--danger); padding: 10px; margin-top: 10px; }
        .solucion-card { background: #f0fdf4; border-left: 5px solid var(--success); padding: 10px; margin-top: 5px; font-size: 14px; }
        .photo-preview img { width: 80px; height: 80px; object-fit: cover; margin-right: 5px; border-radius: 5px; }
        @media print { .btn, .lang-bar, input[type="file"] { display: none !important; } .body { display: block !important; } }
    </style>
</head>
<body>
<div class="container">
    <div class="lang-bar">
        <div id="btn-es" class="lang-btn selected-lang" onclick="changeLang('es')">ESPAÑOL</div>
        <div id="btn-en" class="lang-btn" onclick="changeLang('en')">ENGLISH</div>
    </div>
    <h1 id="txt-title">AL CIELO - SmartCargo Advisory</h1>

    <div class="section active">
        <div class="header" onclick="toggle(this)">I. <span id="txt-sec1">IDENTIFICACIÓN</span> <span>▼</span></div>
        <div class="body">
            <label>Guía (AWB):</label><input type="text" id="awb" placeholder="045-XXXXXXXX">
            <label>Dictado / Texto:</label><textarea id="dictado" rows="4"></textarea>
            <button class="btn" style="background:#4b6cb7; color:white; width:auto; padding:8px 15px;" onclick="startVoice()">🎤 <span id="txt-voice">Dictar</span></button>
        </div>
    </div>

    <div class="section">
        <div class="header" onclick="toggle(this)">II. <span id="txt-sec2">DOCUMENTACIÓN</span> <span>▼</span></div>
        <div class="body">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <label><input type="checkbox" id="d-man"> Manifiesto</label>
                <label><input type="checkbox" id="d-inv"> Factura</label>
                <label><input type="checkbox" id="d-pk"> Packing List</label>
                <label><input type="checkbox" id="d-msds"> MSDS/DGD</label>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="header" onclick="toggle(this)">III. <span id="txt-sec3">MEDIDAS</span> <span>▼</span></div>
        <div class="body">
            <table id="tablaBultos">
                <thead><tr><th>Cant.</th><th>L</th><th>W</th><th>H</th><th>Kg/u</th><th>Foto</th></tr></thead>
                <tbody id="bodyBultos">
                    <tr>
                        <td><input type="number" class="p-cant" value="1"></td>
                        <td><input type="number" class="p-l"></td>
                        <td><input type="number" class="p-w"></td>
                        <td><input type="number" class="p-h"></td>
                        <td><input type="number" class="p-p"></td>
                        <td><input type="file" class="p-foto" accept="image/*" capture="environment"></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn" style="background:var(--success); color:white; width:auto;" onclick="addRow()">+ Partida</button>
        </div>
    </div>

    <div class="section">
        <div class="header" onclick="toggle(this)">IV. <span id="txt-sec4">EMBALAJE</span> <span>▼</span></div>
        <div class="body">
            <select id="tipoPallet">
                <option value="Wood">Pallet Madera (NIMF-15)</option>
                <option value="Plastic">Pallet Plástico</option>
                <option value="PMC">PMC (Main Deck)</option>
            </select>
            <label style="margin-top:10px;"><input type="checkbox" id="chkFumi"> Sello Fumigación Visible</label>
        </div>
    </div>

    <button class="btn btn-main" id="btn-eval" onclick="evaluar()">DIAGNOSTICAR: ¿VUELA?</button>
    <button class="btn" style="background:#64748b; color:white;" onclick="location.reload()">BORRAR DATOS</button>

    <div id="resultado" style="margin-top:20px; display:none;"></div>
</div>

<script>
let currentLang = 'es';
const translations = {
    es: { title: "AL CIELO - SmartCargo Advisory", sec1: "IDENTIFICACIÓN", voice: "Dictar", eval: "DIAGNOSTICAR: ¿VUELA?", loading: "Analizando carga..." },
    en: { title: "AL CIELO - Advisory", sec1: "IDENTIFICATION", voice: "Dictate", eval: "DIAGNOSE: FLY?", loading: "Analyzing cargo..." }
};

function changeLang(l) {
    currentLang = l;
    document.getElementById('txt-title').innerText = translations[l].title;
    document.getElementById('btn-eval').innerText = translations[l].eval;
}

function toggle(el) { el.parentElement.classList.toggle('active'); }

function addRow() {
    const row = `<tr><td><input type="number" class="p-cant" value="1"></td><td><input type="number" class="p-l"></td><td><input type="number" class="p-w"></td><td><input type="number" class="p-h"></td><td><input type="number" class="p-p"></td><td><input type="file" class="p-foto" accept="image/*"></td></tr>`;
    document.getElementById('bodyBultos').insertAdjacentHTML('beforeend', row);
}

function startVoice() {
    const sr = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    sr.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
    sr.onresult = (e) => { document.getElementById('dictado').value += " " + e.results[0][0].transcript; };
    sr.start();
}

async function evaluar() {
    const resDiv = document.getElementById('resultado');
    resDiv.style.display = 'block';
    resDiv.innerHTML = translations[currentLang].loading;

    const bultos = [];
    const formData = new FormData();
    document.querySelectorAll('#bodyBultos tr').forEach(tr => {
        bultos.push({
            cant: tr.querySelector('.p-cant').value, l: tr.querySelector('.p-l').value,
            w: tr.querySelector('.p-w').value, h: tr.querySelector('.p-h').value, p: tr.querySelector('.p-p').value
        });
        const f = tr.querySelector('.p-foto').files[0];
        if(f) formData.append("fotos", f);
    });

    const payload = {
        awb: document.getElementById('awb').value, dictado: document.getElementById('dictado').value,
        tipo_pallet: document.getElementById('tipoPallet').value, detalle_bultos: bultos,
        docs: { msds: document.getElementById('d-msds').checked },
        chk: { fumigado: document.getElementById('chkFumi').checked }
    };
    formData.append("data", JSON.stringify(payload));

    const res = await fetch('/api/evaluar', { method: 'POST', body: formData });
    const json = await res.json();

    let html = `<h2 style="color:${json.status.includes('RECHAZADO') ? 'var(--danger)' : 'var(--success)'}">${json.status}</h2>${json.tabla}`;
    json.alertas.forEach((a, i) => {
        html += `<div class="alert-card"><strong>AVISO:</strong> ${a}</div>`;
        html += `<div class="solucion-card"><strong>ASERSORÍA:</strong> ${json.soluciones[i]}</div>`;
    });
    if(json.fotos.length > 0) {
        html += `<div class="photo-preview" style="margin-top:10px;">${json.fotos.map(f => `<img src="${f}">`).join('')}</div>`;
    }
    html += `<button class="btn" style="background:var(--success); color:white; margin-top:15px;" onclick="window.print()">GENERAR PDF REPORTE</button>`;
    resDiv.innerHTML = html;
}
</script>
</body>
</html>
