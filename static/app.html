<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - SmartCargo Advisory</title>
    <style>
        :root { --green: #22c55e; --red: #ef4444; --yellow: #facc15; --bg: #0b0f14; --card: #1f2937; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #ffffff; margin: 0; padding-bottom: 50px; }
        header { background: #111827; padding: 25px; font-size: 22px; font-weight: 900; border-bottom: 4px solid var(--green); text-align: center; letter-spacing: 2px; }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        
        /* Ventanas Inteligentes (Cards Estrictas) */
        .window { background: var(--card); padding: 25px; margin-bottom: 25px; border-radius: 15px; border: 1px solid #374151; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h3 { margin-top: 0; color: var(--green); font-size: 16px; text-transform: uppercase; border-bottom: 2px solid #374151; padding-bottom: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* Sistema de Medidas Dual */
        .unit-switch { display: flex; gap: 10px; margin-bottom: 15px; background: #111827; padding: 5px; border-radius: 8px; width: fit-content; }
        .unit-btn { background: transparent; color: #9ca3af; border: none; padding: 8px 15px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .unit-btn.active { background: var(--green); color: black; }

        /* Tabla de Piezas Maestra */
        .piece-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .piece-table th { text-align: left; font-size: 11px; color: #9ca3af; padding: 10px; text-transform: uppercase; border-bottom: 1px solid #4b5563; }
        .piece-row td { padding: 10px; border-bottom: 1px solid #374151; }
        .input-table { width: 100%; background: #111827; color: white; border: 1px solid #4b5563; padding: 10px; border-radius: 5px; font-size: 14px; text-align: center; }

        /* Estilo de Botones */
        .btn-main { background: var(--green); color: black; font-weight: 900; border: none; padding: 20px; width: 100%; cursor: pointer; border-radius: 10px; font-size: 18px; text-transform: uppercase; transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4); }
        .btn-sec { background: #374151; color: white; border: 1px solid var(--green); padding: 12px; cursor: pointer; border-radius: 8px; font-size: 12px; }
        .btn-sec.active { background: var(--green); color: black; font-weight: bold; }

        /* Alertas de Asesoría */
        .advice-box { background: rgba(0,0,0,0.4); border-left: 5px solid var(--green); padding: 15px; margin-top: 20px; display: none; }
        .status-badge { display: inline-block; padding: 10px 20px; border-radius: 50px; font-weight: 800; margin-bottom: 15px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>AL CIELO: ASESORÍA PROFESIONAL DE CARGA</header>

<div class="container">

    <div class="window">
        <h3>👤 QUIÉN REPORTA LA CARGA</h3>
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
            <button class="btn-sec" onclick="setRole(this, 'SHIPPER')">DUEÑO CARGA</button>
            <button class="btn-sec" onclick="setRole(this, 'FORWARDER')">AGENCIA</button>
            <button class="btn-sec active" onclick="setRole(this, 'TRUCKER')">CHOFER</button>
            <button class="btn-sec" onclick="setRole(this, 'WAREHOUSE')">BODEGA</button>
        </div>
        <input type="hidden" id="user_role" value="TRUCKER">
    </div>

    <div class="window">
        <h3>📦 DETALLE DE MEDIDAS Y CANTIDAD</h3>
        <div class="unit-switch">
            <button class="unit-btn active" id="btn_in" onclick="setUnits('IN')">PULGADAS (IN)</button>
            <button class="unit-btn" id="btn_cm" onclick="setUnits('CM')">CENTÍMETROS (CM)</button>
        </div>
        
        <table class="piece-table">
            <thead>
                <tr>
                    <th style="width: 15%;">CANTIDAD</th>
                    <th style="width: 20%;">LARGO</th>
                    <th style="width: 20%;">ANCHO</th>
                    <th style="width: 20%;">ALTO</th>
                    <th style="width: 25%;">PESO (KG)</th>
                </tr>
            </thead>
            <tbody id="pieces_body">
                </tbody>
        </table>
        <button onclick="addRow()" style="margin-top:15px; background:transparent; color:var(--green); border:1px dashed var(--green); padding:10px; width:100%; cursor:pointer; border-radius:8px;">+ AÑADIR OTRO GRUPO DE PIEZAS</button>
    </div>

    <div class="window">
        <h3>🎤 REVISIÓN VISUAL Y ESTADO</h3>
        <p style="font-size: 12px; color: #9ca3af;">Si ve algo roto, mojado o madera sin sello, dígalo aquí:</p>
        <textarea id="input_texto" rows="3" placeholder="Ejemplo: El pallet es de madera y no tiene el sello de fumigación..."></textarea>
        <button id="btn_mic" class="btn-sec" onclick="startVoice()" style="width:100%; margin-top:10px; display:flex; align-items:center; justify-content:center; gap:10px;">
            <span>🎤 PRESIONE PARA HABLAR</span>
        </button>
    </div>

    <button class="btn-main" onclick="processAdvisory()">REVISAR CARGA AHORA</button>

    <div id="result_area" class="hidden" style="margin-top: 30px;">
        <div class="window" style="border: 2px solid var(--green);">
            <div id="status_display" class="status-badge"></div>
            <div id="master_instructions" style="line-height: 1.8; font-size: 15px;"></div>
            <div id="summary_footer" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #4b5563; color: var(--yellow); font-weight: bold;"></div>
        </div>
    </div>
</div>

<script>
    let currentUnits = 'IN';

    function setUnits(unit) {
        currentUnits = unit;
        document.getElementById('btn_in').classList.toggle('active', unit === 'IN');
        document.getElementById('btn_cm').classList.toggle('active', unit === 'CM');
    }

    function setRole(btn, role) {
        document.querySelectorAll('.btn-sec').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById("user_role").value = role;
    }

    function addRow() {
        const body = document.getElementById("pieces_body");
        const tr = document.createElement("tr");
        tr.className = "piece-row";
        tr.innerHTML = `
            <td><input type="number" class="input-table p-qty" value="1"></td>
            <td><input type="number" class="input-table p-l" placeholder="0"></td>
            <td><input type="number" class="input-table p-w" placeholder="0"></td>
            <td><input type="number" class="input-table p-h" placeholder="0"></td>
            <td><input type="number" class="input-table p-p" placeholder="0"></td>
        `;
        body.appendChild(tr);
    }

    function startVoice() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Su teléfono no soporta dictado de voz.");
        const rec = new Speech();
        rec.lang = 'es-ES';
        rec.onresult = e => { document.getElementById("input_texto").value = e.results[0][0].transcript; };
        rec.start();
    }

    async function processAdvisory() {
        const rows = document.querySelectorAll(".piece-row");
        const pieces = [];
        
        rows.forEach(r => {
            let l = parseFloat(r.querySelector(".p-l").value) || 0;
            let w = parseFloat(r.querySelector(".p-w").value) || 0;
            let h = parseFloat(r.querySelector(".p-h").value) || 0;
            let qty = parseInt(r.querySelector(".p-qty").value) || 1;

            // Conversión inmediata a Pulgadas para el Backend de Avianca
            if(currentUnits === 'CM') {
                l = l / 2.54; w = w / 2.54; h = h / 2.54;
            }

            for(let i=0; i<qty; i++) {
                pieces.push({
                    l: l, w: w, h: h,
                    p: parseFloat(r.querySelector(".p-p").value) || 0,
                    packaging: "GENERAL"
                });
            }
        });

        const res = await fetch("/precheck", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                user_role: document.getElementById("user_role").value,
                cargo_type: "GENERAL",
                pieces: pieces,
                raw_text: document.getElementById("input_texto").value
            })
        });

        const data = await res.json();
        const area = document.getElementById("result_area");
        area.classList.remove("hidden");

        const status = document.getElementById("status_display");
        status.innerText = data.status === "READY" ? "CARGA LISTA PARA DESPACHO" : "ACCIONES REQUERIDAS";
        status.style.background = data.status === "READY" ? var(--green) : (data.status === "HOLD" ? var(--yellow) : var(--red));
        status.style.color = "black";

        document.getElementById("master_instructions").innerHTML = data.instructions.map(i => `<div>✅ ${i}</div>`).join("");
        document.getElementById("summary_footer").innerText = `PESO TOTAL A PAGAR: ${data.chargeable_weight} KG`;
        
        window.scrollTo(0, document.body.scrollHeight);
    }

    // Inicializar
    addRow();
</script>

</body>
</html>
