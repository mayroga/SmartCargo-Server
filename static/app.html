<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMARTGOSERVER Validation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
#app{width:95%;max-width:900px;background:#111827;border-radius:20px;padding:20px}
input,select{width:100%;padding:8px;margin-top:4px;border-radius:8px;border:none}
button{padding:12px;margin-top:15px;border:none;border-radius:10px;background:#2563eb;color:white;font-weight:600}
.phase{margin-top:10px;background:#1e293b;padding:10px;border-radius:10px;cursor:pointer}
.phase-content{display:none;padding:10px;background:#0f172a;margin-top:5px;border-radius:8px}
#result{margin-top:15px;background:#1e293b;padding:10px;border-radius:10px;white-space:pre-line}
</style>
</head>
<body>

<div id="app">

<h1>SMARTGOSERVER Validation</h1>

<label>MAWB</label>
<input id="mawb">

<label>HAWB</label>
<input id="hawb">

<label>Aerolínea</label>
<input id="airline">

<label>Vuelo</label>
<input id="flight_number">

<label>Fecha</label>
<input type="date" id="flight_date">

<label>Origen</label>
<input id="origin">

<label>Destino</label>
<input id="destination">

<label>Rol</label>
<input id="role">

<label>Tipo carga</label>
<select id="cargo_type">
<option value="GENERAL">GENERAL</option>
<option value="DGR">DGR</option>
<option value="PER">PER</option>
<option value="AVI">AVI</option>
<option value="HUM">HUM</option>
<option value="VAL">VAL</option>
<option value="PHR">PHR</option>
<option value="FSH">FSH</option>
<option value="ELD">ELD</option>
<option value="BAT">BAT</option>
<option value="PRT">PRT</option>
<option value="MED">MED</option>
<option value="FTZ">FTZ</option>
<option value="AGR">AGR</option>
<option value="REF">REF</option>
<option value="CMM">CMM</option>
<option value="PAX">PAX</option>
<option value="CTR">CTR</option>
<option value="TMP">TMP</option>
<option value="HAZ">HAZ</option>
</select>

<label>Piezas</label>
<input type="number" id="pieces">

<label>Peso total kg</label>
<input type="number" id="gross_weight">

<label>Largo m</label>
<input type="number" id="length">

<label>Ancho m</label>
<input type="number" id="width">

<label>Alto m</label>
<input type="number" id="height">

<label>Volumen</label>
<input id="volume">

<h3>Pieza más crítica</h3>

<label>Altura máxima pulgadas</label>
<input id="tallest_piece">

<label>Ancho máximo pulgadas</label>
<input id="widest_piece">

<label>Largo máximo pulgadas</label>
<input id="longest_piece">

<label>Peso pieza kg</label>
<input id="heaviest_piece">

<label>UN Numbers</label>
<input id="un_numbers" placeholder="UN3480, UN1845">

<label>Documentos</label>
<input id="documents">

<label>Known Shipper</label>
<select id="known_shipper">
<option value="true">Sí</option>
<option value="false">No</option>
</select>

<label>Screening</label>
<select id="screening">
<option value="xray">Xray</option>
<option value="manual">Manual</option>
</select>

<label>Regulated Agent</label>
<select id="regulated_agent">
<option value="true">Sí</option>
<option value="false">No</option>
</select>

<div id="phases"></div>

<button id="validateBtn">Validar</button>

<div id="result"></div>

</div>

<script>

for(let i=1;i<=8;i++){

let p=document.createElement("div")
p.className="phase"
p.innerText="Fase "+i

let c=document.createElement("div")
c.className="phase-content"
c.id="phase"+i

p.onclick=()=>{

c.style.display=c.style.display==="block"?"none":"block"

}

document.getElementById("phases").appendChild(p)
document.getElementById("phases").appendChild(c)

}

document.getElementById("validateBtn").onclick=()=>{

const data={

mawb:mawb.value,
hawb:hawb.value,
airline:airline.value,
flight_number:flight_number.value,
flight_date:flight_date.value,
origin:origin.value,
destination:destination.value,
cargo_type:cargo_type.value,
pieces:parseInt(pieces.value),
gross_weight:parseFloat(gross_weight.value),
length:parseFloat(length.value),
width:parseFloat(width.value),
height:parseFloat(height.value),
volume:parseFloat(volume.value),
tallest_piece:parseFloat(tallest_piece.value),
widest_piece:parseFloat(widest_piece.value),
longest_piece:parseFloat(longest_piece.value),
heaviest_piece:parseFloat(heaviest_piece.value),
un_numbers:un_numbers.value.split(",").map(x=>x.trim()),
documents:documents.value.split(",").map(x=>x.trim()),
security:{
known_shipper:known_shipper.value==="true",
screening:screening.value,
regulated_agent:regulated_agent.value==="true"
},
role:role.value

}

fetch("/validate_shipment",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)

})

.then(r=>r.json())
.then(res=>{

let txt=res.status==="GREEN"?"GREEN ✅":"RED ❌"

if(res.errors.length) txt+="\n"+res.errors.join("\n")
if(res.corrections.length) txt+="\n"+res.corrections.join("\n")

result.innerText=txt

for(let i=1;i<=8;i++){

let p="phase"+i

document.getElementById(p).innerHTML=res.phases[p].join("<br>")||"Sin alertas"

}

})

}

</script>

</body>
</html>
