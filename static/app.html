<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Smart Cargo - PreCheck System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    header {
      background: #111a2e;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
      max-width: 900px;
      margin: auto;
    }

    textarea, input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #1f6feb;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 10px;
      width: 100%;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    .block {
      background: #111a2e;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    .status-green { color: #00ff88; font-weight: bold; }
    .status-yellow { color: #ffcc00; font-weight: bold; }
    .status-red { color: #ff3b3b; font-weight: bold; }

    .doc {
      padding: 8px;
      border-left: 3px solid #1f6feb;
      margin: 5px 0;
      background: #0f1626;
    }

    .error { color: #ff3b3b; }
    .warn { color: #ffcc00; }
    .fix { color: #00ff88; }

    h3 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<header>🚀 SMART CARGO - PRECHECK SYSTEM</header>

<div class="container">

  <!-- DATOS CLIENTE -->
  <div class="block">
    <h3>📦 Datos del Cliente / Operación</h3>

    <input id="shipper" placeholder="Shipper / Exportador">
    <input id="consignee" placeholder="Consignatario / Importador">
    <input id="awb" placeholder="Número AWB">
    <input id="airline" placeholder="Aerolínea">
    <input id="origin" placeholder="Origen">
    <input id="destination" placeholder="Destino">
    <input id="service" placeholder="Servicio (PAX / CARGO / PRIORITY)">
    <input id="date" type="date">
  </div>

  <!-- DATOS MERCANCÍA -->
  <div class="block">
    <h3>📦 Datos de la Mercancía</h3>

    <textarea id="raw_text" placeholder="Describe la carga completa: tipo, contenido, si es DG, perecedero, pharma, dry ice, animales, etc."></textarea>

    <input id="pieces" placeholder='Piezas JSON [{"kg":100,"h":120},{"kg":200,"h":170}]'>
  </div>

  <!-- CAPTURA -->
  <div class="block">
    <h3>🎤 Captura Inteligente</h3>

    <button onclick="startMic()">🎤 Activar Micrófono</button>
    <button onclick="submitData()">🚀 Ejecutar PreCheck</button>
  </div>

  <!-- RESULTADOS -->
  <div id="result" class="block"></div>

</div>

<script>
async function submitData() {

  let pieces = [];

  try {
    pieces = JSON.parse(document.getElementById("pieces").value || "[]");
  } catch (e) {
    alert("Formato de piezas inválido. Usa JSON correcto.");
    return;
  }

  const payload = {
    user_role: "driver",
    cargo_type: "AUTO",
    raw_text: document.getElementById("raw_text").value,
    destination: document.getElementById("destination").value,
    pieces: pieces
  };

  const res = await fetch("/precheck", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  renderResult(data);
}

function renderResult(data) {

  let html = "";

  let statusClass = "status-green";
  if (data.status === "RISK") statusClass = "status-yellow";
  if (data.status === "REJECT") statusClass = "status-red";

  // RESULTADO FINAL
  html += `<h2>📊 Resultado de Vuelo</h2>`;
  html += `<p class="${statusClass}">${data.status}</p>`;
  html += `<p>${data.driver_message || ""}</p>`;

  // CLASIFICACIÓN
  html += `<div class="block">
    <h3>🧠 Clasificación de Carga</h3>
    <p>${data.cargo_type_detected}</p>
  </div>`;

  // ERRORES
  html += `<div class="block">
    <h3>❌ Errores Críticos</h3>`;

  if ((data.errors || []).length === 0) {
    html += `<p class="fix">Sin errores críticos</p>`;
  } else {
    (data.errors || []).forEach(e => {
      html += `<p class="error">${e}</p>`;
    });
  }

  html += `</div>`;

  // ADVERTENCIAS
  html += `<div class="block">
    <h3>⚠️ Riesgos Operativos</h3>`;

  if ((data.warnings || []).length === 0) {
    html += `<p class="fix">Sin riesgos detectados</p>`;
  } else {
    (data.warnings || []).forEach(w => {
      html += `<p class="warn">${w}</p>`;
    });
  }

  html += `</div>`;

  // SOLUCIONES
  html += `<div class="block">
    <h3>🔧 Soluciones Directas</h3>`;

  (data.fixes || []).forEach(f => {
    html += `<p class="fix">${f}</p>`;
  });

  html += `</div>`;

  // DOCUMENTOS
  html += `<div class="block">
    <h3>📑 Documentos Requeridos</h3>`;

  (data.required_docs || []).forEach(d => {
    html += `<div class="doc">${d}</div>`;
  });

  html += `</div>`;

  // CHECKLIST FINAL
  html += `<div class="block">
    <h3>🧾 Checklist para Counter</h3>
    <p>1. Presentar AWB</p>
    <p>2. Entregar documentos requeridos en orden</p>
    <p>3. Confirmar peso y piezas</p>
    <p>4. Responder preguntas del agente según tipo de carga</p>
  </div>`;

  document.getElementById("result").innerHTML = html;
}

// MIC (BASE SIMPLE)
function startMic() {
  alert("Micrófono en desarrollo: integrar Web Speech API para captura continua sin cortes.");
}
</script>

</body>
</html>
