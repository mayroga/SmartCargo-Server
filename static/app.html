<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - SmartCargo Advisory MIA</title>
    <style>
        :root { --green: #22c55e; --red: #ef4444; --yellow: #facc15; --bg: #0b0f14; --card: #1f2937; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #ffffff; margin: 0; padding: 0; padding-bottom: 50px; }
        header { background: #111827; padding: 20px; font-size: 20px; font-weight: bold; border-bottom: 3px solid var(--green); text-align: center; letter-spacing: 1px; }
        .container { padding: 15px; max-width: 850px; margin: auto; }
        .card { background: var(--card); padding: 20px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #374151; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h3 { margin-top: 0; color: var(--green); font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #374151; padding-bottom: 10px; margin-bottom: 15px; }
        
        .step-box { background: #111827; padding: 10px; border-left: 4px solid var(--green); margin-bottom: 6px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .qty-badge { background: var(--green); color: black; font-weight: bold; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 11px; color: #9ca3af; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #111827; color: white; border: 1px solid #4b5563; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        
        .piece-row { background: #111827; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .grid-pieces { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .dims-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .vol-display { color: var(--yellow); font-size: 12px; font-weight: bold; margin-top: 8px; display: block; }

        .uld-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .btn-uld { background: #374151; color: white; border: 1px solid var(--green); padding: 10px; font-size: 10px; cursor: pointer; border-radius: 6px; }
        .btn-uld.active { background: var(--green); color: black; font-weight: bold; }

        .role-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .btn-role { background: #1f2937; color: #9ca3af; border: 1px solid #4b5563; padding: 8px; font-size: 10px; cursor: pointer; border-radius: 4px; }
        .btn-role.active { border-color: var(--yellow); color: var(--yellow); font-weight: bold; }

        .btn-mic { background: #374151; color: white; border: 1px solid #4b5563; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-mic.recording { background: var(--red); animation: pulse 1.5s infinite; }
        
        .warning-live { color: var(--red); background: rgba(239, 68, 68, 0.1); padding: 12px; border-radius: 6px; border: 1px solid var(--red); margin-top: 10px; display: none; font-weight: bold; font-size: 12px; }
        button.main-exec { background: var(--green); color: black; font-weight: 800; border: none; padding: 20px; width: 100%; cursor: pointer; border-radius: 8px; font-size: 18px; margin-top: 20px; text-transform: uppercase; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>🚀 AL CIELO: SMARTCARGO ADVISORY - MIA TERMINAL</header>

<div class="container">
    <div class="card">
        <h3>0. 👤 ROL DEL ACTOR LOGÍSTICO</h3>
        <div class="role-grid">
            <button class="btn-role" onclick="selectRole(this, 'SHIPPER')">SHIPPER</button>
            <button class="btn-role" onclick="selectRole(this, 'FORWARDER')">FORWARDER</button>
            <button class="btn-role active" onclick="selectRole(this, 'TRUCKER')">TRUCKER</button>
            <button class="btn-role" onclick="selectRole(this, 'WAREHOUSE')">WAREHOUSE</button>
        </div>
        <input type="hidden" id="user_role" value="TRUCKER">
    </div>

    <div class="card">
        <h3>1. 📂 POUCH DOCUMENTAL (AVIANCA MIA)</h3>
        <label>COMMODITY</label>
        <select id="cargo_type" onchange="updatePouch()">
            <option value="GENERAL">GENERAL CARGO</option>
            <option value="DGR">DANGEROUS GOODS</option>
            <option value="PER">PERISHABLE</option>
            <option value="PHR">PHARMA</option>
            <option value="HUM">HUMAN REMAINS</option>
            <option value="DRY">DRY ICE</option>
        </select>
        <div id="pouch_content" style="margin-top: 15px;"></div>
    </div>

    <div class="card">
        <h3>2. 📦 AUDITORÍA DE CARGA Y ALTURAS</h3>
        <div id="pieces_list"></div>
        <button onclick="addPieceRow()" style="background: transparent; color: var(--green); border: 1px dashed var(--green); padding: 10px; width: 100%; cursor: pointer; border-radius: 6px; margin-bottom: 15px;">+ AÑADIR PIEZA / PALLET</button>

        <label>TIPO DE UNIDAD (ULD O SUELTA)</label>
        <div class="uld-grid">
            <button class="btn-uld" onclick="selectULD(this, 'PMC')">PMC</button>
            <button class="btn-uld" onclick="selectULD(this, 'PAG')">PAG</button>
            <button class="btn-uld" onclick="selectULD(this, 'AKE')">AKE</button>
            <button class="btn-uld active" onclick="selectULD(this, 'NONE')">SUELTA (LOOSE)</button>
        </div>
        <input type="hidden" id="uld_type" value="NONE">
    </div>

    <div class="card">
        <h3>3. 🎤 AURA SCAN: ESTADO DE LA CARGA</h3>
        <button id="btn_mic" class="btn-mic" onclick="startVoice()">🎤 DICTAR DAÑOS O FALTANTES</button>
        <textarea id="input_texto" rows="2" placeholder="Ej: Pallet de madera sin sello, caja mojada..."></textarea>
        <div id="critical_warning" class="warning-live"></div>
    </div>

    <button class="main-exec" onclick="executePreCheck()">VERIFICAR CUMPLIMIENTO</button>

    <div id="result_area" class="hidden" style="margin-top: 25px;">
        <div id="decision_box" style="padding: 20px; font-size: 22px; font-weight: 900; text-align: center; border-radius: 12px; margin-bottom: 20px;"></div>
        <div class="card" style="background: #000; border: 2px solid var(--green);">
            <h3 style="color: var(--green);">RESOLUCIÓN TÉCNICA</h3>
            <div id="instructions_list"></div>
            <div id="weight_summary" style="margin-top: 15px; color: var(--yellow); font-weight: bold;"></div>
        </div>
    </div>
</div>

<script>
    function selectRole(btn, role) {
        document.querySelectorAll('.btn-role').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById("user_role").value = role;
    }

    function selectULD(btn, type) {
        document.querySelectorAll('.btn-uld').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById("uld_type").value = type;
    }

    function addPieceRow() {
        const container = document.getElementById("pieces_list");
        const div = document.createElement("div");
        div.className = "piece-row";
        div.innerHTML = `
            <div class="grid-pieces">
                <select class="p-type">
                    <option value="pallet_wd">PALLET MADERA</option>
                    <option value="pallet_pl">PALLET PLASTICO</option>
                    <option value="boxes">BOXES</option>
                    <option value="drums">DRUMS</option>
                    <option value="engine">ENGINE STAND</option>
                </select>
                <input type="number" placeholder="Kg" class="p-p">
            </div>
            <div class="dims-grid">
                <input type="number" placeholder="L(in)" class="p-l" oninput="updatePiece(this)">
                <input type="number" placeholder="W(in)" class="p-w" oninput="updatePiece(this)">
                <input type="number" placeholder="H(in)" class="p-h" oninput="updatePiece(this)">
                <span class="vol-display"><span class="v-val">0</span> kgv</span>
            </div>
        `;
        container.appendChild(div);
    }

    function updatePiece(el) {
        const row = el.closest(".piece-row");
        const l = row.querySelector(".p-l").value || 0;
        const w = row.querySelector(".p-w").value || 0;
        const h = row.querySelector(".p-h").value || 0;
        row.querySelector(".v-val").innerText = Math.round((l * w * h) / 166);
    }

    function startVoice() {
        const btn = document.getElementById("btn_mic");
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Voz no soportada");
        const rec = new Speech();
        rec.lang = 'es-ES';
        rec.onstart = () => btn.classList.add("recording");
        rec.onend = () => btn.classList.remove("recording");
        rec.onresult = e => {
            document.getElementById("input_texto").value = e.results[0][0].transcript;
            runMiniScan();
        };
        rec.start();
    }

    function runMiniScan() {
        const t = document.getElementById("input_texto").value.toUpperCase();
        const warn = document.getElementById("critical_warning");
        let msg = "";
        if((t.includes("MADERA") || t.includes("PALLET")) && !t.includes("SELLO")) msg = "❌ ALERTA: Madera sin sello ISPM15 detectada.";
        warn.innerText = msg; warn.style.display = msg ? "block" : "none";
    }

    async function executePreCheck() {
        const pieces = [];
        document.querySelectorAll(".piece-row").forEach(r => {
            pieces.push({
                l: parseFloat(r.querySelector(".p-l").value) || 0,
                w: parseFloat(r.querySelector(".p-w").value) || 0,
                h: parseFloat(r.querySelector(".p-h").value) || 0,
                p: parseFloat(r.querySelector(".p-p").value) || 0,
                packaging: r.querySelector(".p-type").value
            });
        });

        if (pieces.length === 0) return alert("Ingrese al menos una pieza.");

        const res = await fetch("/precheck", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                user_role: document.getElementById("user_role").value,
                cargo_type: document.getElementById("cargo_type").value,
                uld_type: document.getElementById("uld_type").value,
                pieces: pieces,
                raw_text: document.getElementById("input_texto").value
            })
        });

        const data = await res.json();
        document.getElementById("result_area").classList.remove("hidden");
        const dBox = document.getElementById("decision_box");
        dBox.innerText = data.status === "READY" ? "APTO PARA COUNTER" : "HOLD / RECHAZO TÉCNICO";
        dBox.style.background = data.status === "READY" ? "var(--green)" : "var(--red)";
        dBox.style.color = data.status === "READY" ? "black" : "white";

        document.getElementById("instructions_list").innerHTML = data.instructions.map(ins => 
            `<div style="padding:8px; border-bottom:1px solid #333;">💡 ${ins}</div>`
        ).join("");

        document.getElementById("weight_summary").innerText = `PESO TASABLE: ${data.chargeable_weight} KG`;
        window.scrollTo(0, document.body.scrollHeight);
    }

    const pouchData = {
        "GENERAL": ["AWB (1+3)", "Comm. Invoice", "Packing List", "Shipper ID"],
        "DGR": ["AWB (1+4)", "3 Shipper's Dec (Red)", "MSDS", "DG Checklist"],
        "PER": ["AWB", "USDA / Fitonasanitario", "Temp Log"],
        "PHR": ["AWB", "Quality Cert", "Temp Declaration"],
        "HUM": ["AWB", "Death Cert", "Embalming Cert", "Funeral Home Auth"],
        "DRY": ["AWB (Notation)", "IATA CO2 Dec", "KG Labeling"]
    };

    function updatePouch() {
        const type = document.getElementById("cargo_type").value;
        document.getElementById("pouch_content").innerHTML = pouchData[type].map(d => `
            <div class="step-box"><span>${d}</span><span class="qty-badge">REQ</span></div>
        `).join("");
    }

    updatePouch(); addPieceRow();
</script>
</body>
</html>
