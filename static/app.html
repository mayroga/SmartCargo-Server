<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AL CIELO - SmartCargo Advisory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0a3d62; --danger: #e11a22; --success: #27ae60; --light: #f4f6f8; }
        body { font-family: 'Inter', sans-serif; background: var(--light); margin:0; padding:10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--danger); margin-bottom: 20px; }
        .lang-btn { padding: 10px 20px; cursor: pointer; border: 2px solid var(--primary); border-radius: 25px; font-weight: bold; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: white; }

        h3 { background: #0a3d6222; padding: 12px; border-left: 5px solid var(--primary); color: var(--primary); font-size: 17px; }
        .grid-input { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }

        /* Chips para Selección Múltiple */
        .nature-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .chip { padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; font-size: 12px; background: white; }
        .chip.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* Galería de Fotos */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin: 15px 0; }
        .photo-item { position: relative; width: 100px; height: 100px; border-radius: 8px; overflow: hidden; border: 2px solid #ddd; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Dictado por Voz */
        .voice-section { background: #fffde7; padding: 15px; border-radius: 10px; border: 1px solid #fff59d; margin-bottom: 20px; }
        .btn-mic { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        
        .btn-eval { background: var(--primary); color: white; border: none; padding: 20px; width: 100%; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .result-box { display: none; padding: 25px; border-radius: 12px; border-left: 10px solid; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h1 id="t-title">AL CIELO</h1>
        <div class="lang-bar">
            <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ESPAÑOL</button>
            <button class="lang-btn" id="btn-en" onclick="setLang('en')">ENGLISH</button>
        </div>
    </div>

    <h3 id="t-sec1">I. Identificación de Operación</h3>
    <div class="grid-input">
        <div><label id="l-role">Rol:</label>
            <select id="rolUsuario">
                <option value="Forwarder">Forwarder</option>
                <option value="Driver">Driver / Chofer</option>
                <option value="Counter">Counter Agent</option>
            </select>
        </div>
        <div><label id="l-id-driver">ID Chofer / Licencia:</label><input type="text" id="idChofer" placeholder="ID Number"></div>
        <div><label id="l-awb">AWB (Avianca 045):</label><input type="text" id="awb" placeholder="045-00000000"></div>
    </div>

    <h3 id="t-sec2">II. Naturaleza IATA (Multiselección)</h3>
    <div class="nature-chips" id="natureContainer">
        <div class="chip" onclick="toggleNature(this, 'GEN')">GEN</div>
        <div class="chip" onclick="toggleNature(this, 'PER')">PER</div>
        <div class="chip" onclick="toggleNature(this, 'DGR')">DGR</div>
        <div class="chip" onclick="toggleNature(this, 'AVI')">AVI</div>
        <div class="chip" onclick="toggleNature(this, 'HUM')">HUM</div>
        <div class="chip" onclick="toggleNature(this, 'VAL')">VAL</div>
        <div class="chip" onclick="toggleNature(this, 'VUN')">VUN</div>
    </div>

    <h3 id="t-sec3">III. Equipo y Soporte (ULD/Packaging)</h3>
    <label id="l-uld">Sugerencia de Equipo:</label>
    <select id="uldSugerido">
        <option value="PMC">PMC Pallet (125"x96")</option>
        <option value="PAG">PAG Pallet (125"x88")</option>
        <option value="LD3">LD3 Container (AKE)</option>
        <option value="SKIPS">SKIPS</option>
        <option value="CRATE">CRATE / Huacal</option>
        <option value="DRUMS">DRUMS / Tambores</option>
    </select>

    <h3 id="t-sec4">IV. Evidencia Visual</h3>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="previewImages()">
    <div class="photo-grid" id="photoPreview"></div>

    <div class="voice-section">
        <label id="l-precheck">V. Pre-Chequeo Técnico (Voz/Texto):</label>
        <textarea id="notaVoz" rows="3" placeholder="Hable o escriba observaciones del bulto/documentos..."></textarea>
        <button class="btn-mic" onclick="startDictation()" id="btn-dictar">🎤 DICTAR ASESORÍA</button>
    </div>

    <div class="grid-input">
        <label><input type="checkbox" id="chkDGR"> DGD / Borde Rojo OK</label>
        <label><input type="checkbox" id="chkEmbalaje" checked> Embalaje/Madera NIMF-15</label>
        <label><input type="checkbox" id="chkFacturas"> Facturas / Permisos Visibles</label>
    </div>

    <button class="btn-eval" onclick="evaluar()" id="btn-final">GENERAR ASESORÍA TÉCNICA</button>
    
    <div id="resultado" class="result-box"></div>
</div>

<script>
let currentLang = 'es';
let selectedNatures = [];

const dictionary = {
    es: {
        title: "AL CIELO - SmartCargo Advisory",
        sec1: "I. Identificación de Operación",
        sec2: "II. Naturaleza IATA (Multiselección)",
        sec3: "III. Equipo y Soporte (ULD/Packaging)",
        sec4: "IV. Evidencia Visual",
        role: "Rol:", awb: "AWB (Avianca 045):", driver: "ID Chofer / Licencia:",
        uld: "Sugerencia de Equipo:", precheck: "V. Pre-Chequeo Técnico:",
        btnDictar: "🎤 DICTAR ASESORÍA", btnFinal: "GENERAR ASESORÍA TÉCNICA",
        wait: "Procesando asesoría..."
    },
    en: {
        title: "AL CIELO - SmartCargo Advisory",
        sec1: "I. Operation ID",
        sec2: "II. IATA Nature (Multi-select)",
        sec3: "III. Equipment & Support (ULD/Packaging)",
        sec4: "IV. Visual Evidence",
        role: "Role:", awb: "AWB (Avianca 045):", driver: "Driver ID / License:",
        uld: "Equipment Suggestion:", precheck: "V. Technical Pre-Check:",
        btnDictar: "🎤 START DICTATION", btnFinal: "GENERATE TECHNICAL ADVISORY",
        wait: "Processing advisory..."
    }
};

function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + lang).classList.add('active');
    
    const d = dictionary[lang];
    document.getElementById('t-title').innerText = d.title;
    document.getElementById('t-sec1').innerText = d.sec1;
    document.getElementById('t-sec2').innerText = d.sec2;
    document.getElementById('t-sec3').innerText = d.sec3;
    document.getElementById('t-sec4').innerText = d.sec4;
    document.getElementById('l-role').innerText = d.role;
    document.getElementById('l-awb').innerText = d.awb;
    document.getElementById('l-id-driver').innerText = d.driver;
    document.getElementById('l-uld').innerText = d.uld;
    document.getElementById('l-precheck').innerText = d.precheck;
    document.getElementById('btn-dictar').innerText = d.btnDictar;
    document.getElementById('btn-final').innerText = d.btnFinal;
}

function toggleNature(el, code) {
    el.classList.toggle('selected');
    if(selectedNatures.includes(code)) {
        selectedNatures = selectedNatures.filter(n => n !== code);
    } else {
        selectedNatures.push(code);
    }
}

function previewImages() {
    const preview = document.getElementById('photoPreview');
    preview.innerHTML = "";
    const files = document.getElementById('fileInput').files;
    Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.innerHTML += `<div class="photo-item"><img src="${e.target.result}"></div>`;
        };
        reader.readAsDataURL(file);
    });
}

function startDictation() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("Navegador no soporta voz");
    const rec = new SpeechRecognition();
    rec.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
    rec.onresult = (e) => { document.getElementById('notaVoz').value += e.results[0][0].transcript; };
    rec.start();
}

async function evaluar() {
    const resDiv = document.getElementById('resultado');
    resDiv.style.display = 'block';
    resDiv.innerHTML = dictionary[currentLang].wait;

    const payload = {
        awb: document.getElementById('awb').value,
        codigos: selectedNatures,
        chkDGR: document.getElementById('chkDGR').checked,
        chkEmbalaje: document.getElementById('chkEmbalaje').checked,
        nota_voz: document.getElementById('notaVoz').value
    };

    const response = await fetch('/api/evaluar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    
    const res = await response.json();
    let html = `<h2>${res.status}</h2>`;
    if(res.nota_tecnica) html += `<p><strong>Pre-check:</strong> ${res.nota_tecnica}</p>`;
    html += `<ul>` + res.errores.map(e => `<li style="color:red">❌ ${e}</li>`).join('') + `</ul>`;
    html += `<h3>ACCIONES DE ESPECIALISTA:</h3><ul>` + res.soluciones.map(s => `<li>✅ ${s}</li>`).join('') + `</ul>`;
    
    resDiv.innerHTML = html;
    resDiv.style.borderColor = res.errores.length > 0 ? 'var(--danger)' : 'var(--success)';
    resDiv.style.background = res.errores.length > 0 ? '#fff5f5' : '#f0fff4';
    
    speechSynthesis.speak(new SpeechSynthesisUtterance(res.status));
}
</script>
</body>
</html>
