<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - PRE-CHECK ADVISORY</title>
    <style>
        :root { --blue: #00d4ff; --dark: #0b1220; --panel: #111a2e; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; }
        .section { background: var(--panel); padding: 20px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #1e2a44; }
        h2, h3 { color: var(--blue); margin-top: 0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #070d19; border: 1px solid #334466; color: white; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--blue); color: #0b1220; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .grid-piezas { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 5px; background: #070d19; padding: 10px; border-radius: 5px; margin-top: 5px; }
        .piece-row { border-bottom: 1px solid #334466; padding: 10px 0; }
        .hidden { display: none; }
        .alert-card { background: rgba(255, 77, 77, 0.1); border-left: 5px solid #ff4d4d; padding: 15px; margin: 10px 0; }
        .success-card { background: rgba(77, 255, 136, 0.1); border-left: 5px solid #4dff88; padding: 15px; margin: 10px 0; }
        .file-input { background: #1a2742; padding: 10px; border: 1px dashed var(--blue); text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>✈️ AL CIELO: Pre-Check Advisory</h2>
    <p>Asegure su carga antes de llegar al Warehouse.</p>

    <div class="section">
        <h3>📄 Datos del AWB</h3>
        <input id="awb" placeholder="Número de AWB (ej: 729-3126250)">
        <select id="tipo">
            <option value="GENERAL">Carga General</option>
            <option value="PHARMA">Pharma / Cold Chain</option>
            <option value="DGR">Dangerous Goods</option>
        </select>
        <button onclick="document.getElementById('auditSection').classList.remove('hidden')">Iniciar Auditoría Física</button>
    </div>

    <div class="section hidden" id="auditSection">
        <h3>📦 Auditoría Pieza por Pieza</h3>
        <div id="listaPiezas"></div>
        <button style="background:#1a2742; color:var(--blue); border:1px solid var(--blue)" onclick="addPiece()">+ AGREGAR PIEZA MANUAL</button>
        
        <h3 style="margin-top:20px;">🎤 Estado de la Carga</h3>
        <textarea id="obs" placeholder="Describa si hay daños, olores o sellos rotos..."></textarea>
        <button onclick="procesarEnvio()">VALIDAR ANTES DEL COUNTER</button>
    </div>

    <div class="section hidden" id="resultSection">
        <div id="finalStatus"></div>
        <div id="detalles"></div>
        <button onclick="window.print()">Generar Reporte PDF</button>
        <button style="background:gray" onclick="location.reload()">Borrar Todo</button>
    </div>
</div>

<script>
    let piezas = [];

    function addPiece() {
        const id = Date.now();
        piezas.push({ id, cant: 1, l: 0, w: 0, h: 0, peso: 0 });
        renderPiezas();
    }

    function renderPiezas() {
        const container = document.getElementById("listaPiezas");
        container.innerHTML = piezas.map((p, index) => `
            <div class="piece-row">
                <strong>Pieza #${index + 1}</strong>
                <div class="grid-piezas">
                    <input type="number" placeholder="Cant" onchange="update(${index}, 'cant', this.value)" value="${p.cant}">
                    <input type="number" placeholder="L(in)" onchange="update(${index}, 'l', this.value)" value="${p.l}">
                    <input type="number" placeholder="W(in)" onchange="update(${index}, 'w', this.value)" value="${p.w}">
                    <input type="number" placeholder="H(in)" onchange="update(${index}, 'h', this.value)" value="${p.h}">
                    <input type="number" placeholder="Peso(kg)" onchange="update(${index}, 'peso', this.value)" value="${p.peso}">
                </div>
                <div style="margin-top:5px">
                    <input type="file" accept="image/*" capture="environment" class="file-input">
                </div>
            </div>
        `).join("");
    }

    function update(index, key, val) {
        piezas[index][key] = val;
    }

    async function procesarEnvio() {
        const payload = {
            awb: document.getElementById("awb").value,
            naturaleza: document.getElementById("tipo").value,
            piezas: piezas,
            observaciones: document.getElementById("obs").value
        };

        const response = await fetch('/api/validar_precheck', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        const res = await response.json();
        mostrarResultados(res);
    }

    function mostrarResultados(res) {
        const section = document.getElementById("resultSection");
        section.classList.remove("hidden");
        
        const isOk = res.status === "READY TO FLY";
        document.getElementById("finalStatus").innerHTML = `
            <div class="${isOk ? 'success-card' : 'alert-card'}">
                <h2>ESTADO: ${res.status}</h2>
                <p>Peso Cobrable Estimado: <strong>${res.peso_cobrable} KG</strong></p>
            </div>
        `;

        let html = "<h4>Hallazgos de la Asesoría:</h4>";
        if(res.alertas.length === 0) {
            html += "<p>✅ Todo parece estar en orden para la entrega.</p>";
        } else {
            res.alertas.forEach((a, i) => {
                html += `
                    <div style="margin-bottom:10px; border-bottom:1px solid #334466">
                        <span style="color:#ff4d4d">⚠ ${a}</span><br>
                        <small>${res.explicaciones[i]}</small><br>
                        <strong style="font-size:12px; color:var(--blue)">RIESGO: ${res.riesgos[i]}</strong>
                    </div>
                `;
            });
        }
        document.getElementById("detalles").innerHTML = html;
        section.scrollIntoView();
    }
</script>

</body>
</html>
