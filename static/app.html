<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PRE COUNTER CARGO CHECK</title>

<style>
body {font-family:Arial;background:#0b0f1a;color:white;margin:0;}
.header {padding:15px;background:#111a2b;text-align:center;font-weight:bold;}
.box {background:#1a2235;padding:10px;margin:10px;border-radius:10px;}
input,select,textarea {width:100%;padding:10px;margin-top:5px;}
button {width:100%;padding:15px;background:#00ffd5;font-weight:bold;}
.green{background:#00c853;padding:10px;}
.yellow{background:#ffeb3b;color:black;padding:10px;}
.red{background:#f44336;padding:10px;}
</style>
</head>

<body>

<div class="header">
PRE COUNTER CARGO CHECK (SHIPPER / DRIVER / FORWARDER)
</div>

<div class="box">

<h3>DATOS GENERALES</h3>

<select id="dg">
<option value="no">NO DG</option>
<option value="yes">DG</option>
</select>

<select id="msds">
<option value="yes">MSDS SI</option>
<option value="no">MSDS NO</option>
</select>

<select id="shippers_declaration">
<option value="yes">DECLARACION SI</option>
<option value="no">NO</option>
</select>

<select id="aircraft">
<option value="cargo">CARGO</option>
<option value="passenger">PASAJEROS</option>
</select>

<select id="movement">
<option value="local">LOCAL</option>
<option value="transfer">TRANSFER</option>
<option value="comat">COMAT</option>
</select>

<select id="special">
<option value="no">NORMAL</option>
<option value="yes">ESPECIAL</option>
</select>

</div>

<div class="box">
<h3>PIEZA (UNA POR UNA)</h3>

<input id="length" placeholder="Largo cm">
<input id="width" placeholder="Ancho cm">
<input id="height" placeholder="Alto cm">
<input id="weight" placeholder="Peso kg">

<button onclick="addPiece()">AGREGAR PIEZA</button>

<div id="pieces"></div>
</div>

<div class="box">
<h3>VOZ A TEXTO</h3>
<button onclick="startVoice()">🎤 HABLAR</button>
<textarea id="voiceText"></textarea>
</div>

<button onclick="send()">VERIFICAR TODO</button>

<div id="result"></div>

<script>

let pieces = [];

function addPiece(){
pieces.push({
length:length.value,
width:width.value,
height:height.value,
weight:weight.value
});

document.getElementById("pieces").innerHTML =
JSON.stringify(pieces,null,2);
}

function startVoice(){
let r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
r.lang = "es-ES";
r.onresult = e => voiceText.value = e.results[0][0].transcript;
r.start();
}

async function send(){

const data = {
dg: dg.value,
msds: msds.value,
shippers_declaration: shippers_declaration.value,
aircraft: aircraft.value,
movement: movement.value,
special: special.value,
pieces: pieces
};

const res = await fetch("/api/check",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

const r = await res.json();

document.getElementById("result").innerHTML = `
<h2>${r.status}</h2>
<div class="${r.level}">SCORE: ${r.score}</div>

<h3>ERRORS</h3>
<pre>${JSON.stringify(r.errors,null,2)}</pre>

<h3>WARNINGS</h3>
<pre>${JSON.stringify(r.warnings,null,2)}</pre>

<h3>TOTAL WEIGHT</h3>
${r.total_weight}

<h3>TOTAL VOLUME</h3>
${r.total_volume}
`;
}
</script>

</body>
</html>
