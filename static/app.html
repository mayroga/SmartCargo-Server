<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SMARTCARGO SERVER PRO</title>

<style>
body { font-family: Arial; background:#0b1220; color:white; }
.section { background:#111a2e; padding:15px; margin:10px; border-radius:10px; }
.hidden { display:none; }
.red { color:#ff4d4d; }
.green { color:#4dff88; }
table { width:100%; }
td,th { border:1px solid #333; padding:5px; }
img { max-width:80px; }
</style>
</head>

<body>

<h2>✈️ SMARTCARGO SERVER (PRE-CHECK REAL)</h2>

<!-- CORTINA 1 -->
<div class="section">
<h3>1. Datos Iniciales</h3>
<input id="origen" placeholder="Origen">
<input id="destino" placeholder="Destino">
<button onclick="next(2)">Continuar</button>
</div>

<!-- CORTINA 2 -->
<div class="section hidden" id="step2">
<h3>2. Rol</h3>
<select id="rol">
<option>SHIPPER</option>
<option>FORWARDER</option>
<option>WAREHOUSE</option>
<option>TRUCKER</option>
</select>
<button onclick="next(3)">Continuar</button>
</div>

<!-- CORTINA 3 -->
<div class="section hidden" id="step3">
<h3>3. Tipo de carga</h3>
<select id="tipo">
<option>GENERAL</option>
<option>DGR</option>
<option>PER</option>
<option>VAL</option>
</select>
<button onclick="next(4)">Continuar</button>
</div>

<!-- CORTINA 4 -->
<div class="section hidden" id="step4">
<h3>4. Embalaje</h3>
<select id="embalaje">
<option>CAJA</option>
<option>PALLET</option>
<option>TAMBOR</option>
<option>CRATE</option>
</select>

<select id="pallet">
<option>LOOSE</option>
<option>PMC</option>
<option>PAG</option>
</select>

<button onclick="next(5)">Continuar</button>
</div>

<!-- PIEZAS -->
<div class="section hidden" id="step5">
<h3>5. Auditoría Física</h3>

<table id="tabla">
<tr><th>CANT</th><th>L</th><th>W</th><th>H</th><th>PESO</th><th>FOTO</th></tr>
</table>

<button onclick="add()">+ PIEZA</button>
<button onclick="validar()">VALIDAR</button>
</div>

<!-- RESULTADO -->
<div class="section hidden" id="result"></div>

<script>

function next(n){
document.getElementById("step"+n).classList.remove("hidden");
}

function add(){
let row = document.createElement("tr");

row.innerHTML = `
<td><input class="cant"></td>
<td><input class="l"></td>
<td><input class="w"></td>
<td><input class="h"></td>
<td><input class="peso"></td>
<td><input type="file" onchange="preview(this)"></td>
`;

tabla.appendChild(row);
}

function preview(input){
let img = document.createElement("img");
img.src = URL.createObjectURL(input.files[0]);
input.parentNode.appendChild(img);
}

async function validar(){

let piezas = [];

document.querySelectorAll("#tabla tr").forEach((r,i)=>{
if(i===0)return;

piezas.push({
l:r.querySelector(".l").value,
w:r.querySelector(".w").value,
h:r.querySelector(".h").value,
peso:r.querySelector(".peso").value
});
});

let res = await fetch("/api/validar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
tipo:tipo.value,
piezas:piezas
})
});

let d = await res.json();

let html = `<h3>ESTADO: ${d.status}</h3>`;
html += `<p>PESO COBRABLE: ${d.peso_cobrable}</p>`;
html += `<p>TIPO AVIÓN: ${d.tipo_avion}</p>`;

d.alertas.forEach((a,i)=>{
html += `<div class="red">⚠ ${a}</div>`;
html += `<div>✔ SOLUCIÓN: ${d.soluciones[i]}</div>`;
});

if(d.alertas.length===0){
html += `<div class="green">✔ LISTO PARA COUNTER</div>`;
}

result.innerHTML = html;
result.classList.remove("hidden");
}

</script>

</body>
</html>
