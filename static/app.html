<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Avianca Cargo Validator</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f2f5; margin:0; padding:0; }
h2 { background: #111827; color: white; padding: 10px; cursor: pointer; margin:0; }
.section { padding: 15px; border-bottom: 1px solid #ccc; display:none; }
.ok { color: green; font-weight:bold; }
.alert { color: orange; font-weight:bold; }
.error { color: red; font-weight:bold; }
button { padding: 10px 20px; margin: 10px; cursor:pointer; }
input[type=number], input[type=text] { width: 60px; }
</style>
</head>
<body>
<h1>Validador de Carga Avianca Cargo</h1>

<label>Tipo de carga: 
<select id="cargoType">
  <option value="">Seleccione</option>
  <option value="GEN">GEN</option>
  <option value="DGR">DGR</option>
  <option value="PER">PER</option>
  <option value="AVI">AVI</option>
  <option value="HUM">HUM</option>
  <option value="VAL">VAL</option>
  <option value="PHR">PHR</option>
  <option value="FSH">FSH</option>
  <option value="ELD">ELD</option>
  <option value="BAT">BAT</option>
  <option value="PRT">PRT</option>
  <option value="MED">MED</option>
  <option value="FTZ">FTZ</option>
  <option value="AGR">AGR</option>
  <option value="REF">REF</option>
  <option value="CMM">CMM</option>
  <option value="PAX">PAX</option>
  <option value="CTR">CTR</option>
  <option value="TMP">TMP</option>
  <option value="HAZ">HAZ</option>
</select>
</label>

<div id="phases"></div>
<button onclick="validateCarga()">Validar Carga</button>
<h2>Resultado Global: <span id="globalStatus">❌</span></h2>

<script>
// Cargar JSON estático
let cargoRules;
let aviancaLimits;
fetch('static/cargo_rules.json').then(r=>r.json()).then(data=>cargoRules=data);
fetch('static/avianca_rules.json').then(r=>r.json()).then(data=>aviancaLimits=data);

const phasesData = [
  { id:1, title:"Dimensiones y Peso", fields:["largo","ancho","alto","peso"] },
  { id:2, title:"Documentos Obligatorios", fields:["documents"] },
  { id:3, title:"Known Shipper / Screening", fields:["known_shipper"] }
];

const phasesDiv = document.getElementById('phases');
document.getElementById('cargoType').addEventListener('change', function() {
  const type = this.value;
  if(!type) { phasesDiv.innerHTML=''; return; }
  renderPhases(type);
});

function renderPhases(type){
  phasesDiv.innerHTML='';
  phasesData.forEach((phase,i)=>{
    const div = document.createElement('div');
    div.innerHTML=`<h2 onclick="toggleSection(${i})">${phase.title} <span id="status${i}">❌</span></h2>
    <div class="section" id="section${i}"></div>`;
    phasesDiv.appendChild(div);
    renderFields(i,type);
  });
}

function toggleSection(i){
  const s=document.getElementById(`section${i}`);
  s.style.display=(s.style.display==='block')?'none':'block';
}

function renderFields(i,type){
  const section = document.getElementById(`section${i}`);
  section.innerHTML='';
  if(i===0){ // Dimensiones y peso
    section.innerHTML=`Largo(cm): <input type="number" id="largo"><br>
    Ancho(cm): <input type="number" id="ancho"><br>
    Alto(cm): <input type="number" id="alto"><br>
    Peso(kg): <input type="number" id="peso"><br>`;
  }else if(i===1){ // Documentos
    const docs=cargoRules[type].documents;
    section.innerHTML=docs.map(d=>`${d}: <input type="checkbox" id="${d}"><br>`).join('');
  }else if(i===2){ // Known Shipper
    section.innerHTML=`Known Shipper/Screening/Regulated Agent: <input type="checkbox" id="known_shipper">`;
  }
}

function validateCarga(){
  let global='green';
  // fase 0 dimensiones
  let largo=parseFloat(document.getElementById('largo')?.value)||0;
  let ancho=parseFloat(document.getElementById('ancho')?.value)||0;
  let alto=parseFloat(document.getElementById('alto')?.value)||0;
  let peso=parseFloat(document.getElementById('peso')?.value)||0;
  const vol = (largo*ancho*alto)/1000000;
  let f0='ok';
  if(peso>aviancaLimits.limits.peso_max_kg || alto>aviancaLimits.limits.alto_max_cm || largo>aviancaLimits.limits.largo_max_cm || ancho>aviancaLimits.limits.ancho_max_cm){
    f0='error'; global='red';
  }
  document.getElementById('status0').innerText=(f0==='ok')?'✅':'❌';

  // fase 1 documentos
  const type = document.getElementById('cargoType').value;
  const docs=cargoRules[type].documents;
  let missing=false;
  docs.forEach(d=>{
    const chk=document.getElementById(d);
    if(chk && !chk.checked) missing=true;
  });
  let f1='ok';
  if(missing) { f1='error'; global='red'; }
  document.getElementById('status1').innerText=(f1==='ok')?'✅':'❌';

  // fase 2 Known Shipper
  const ks=document.getElementById('known_shipper')?.checked;
  let f2='ok';
  if(['DGR','VAL','PHR','AVI','REF','BAT'].includes(type) && !ks){ f2='error'; global='red'; }
  document.getElementById('status2').innerText=(f2==='ok')?'✅':'❌';

  // resultado global
  let globalIcon;
  if(global==='green') globalIcon='✅ Verde';
  else if(global==='red') globalIcon='❌ Rojo';
  document.getElementById('globalStatus').innerText=globalIcon;

  alert(`Volumen(m³): ${vol.toFixed(3)}\nPeso(kg): ${peso}\nDimensiones(cm): ${largo}x${ancho}x${alto}`);
}
</script>
</body>
</html>
