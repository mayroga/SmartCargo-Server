<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - SMART CARGO ADVISORY</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0f1a; color: #e0e0e0; margin: 0; padding-bottom: 50px; }
        .header { padding: 20px; background: #111a2b; text-align: center; border-bottom: 2px solid #00ffd5; }
        .box { background: #1a2235; padding: 15px; margin: 15px; border-radius: 12px; border: 1px solid #2d3748; }
        h3 { color: #00ffd5; margin-top: 0; border-bottom: 1px solid #2d3748; padding-bottom: 5px; }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 8px; background: #0b0f1a; color: white; border: 1px solid #3e4b5b; border-radius: 5px; box-sizing: border-box; }
        label { font-size: 0.85em; color: #a0aec0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main { background: #00ffd5; color: #0b0f1a; font-size: 1.1em; }
        .btn-add { background: #4a5568; color: white; }
        .btn-clear { background: #f44336; color: white; width: auto; padding: 5px 15px; }
        .status-card { padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; font-weight: bold; }
        .green { background: #064e3b; color: #6ee7b7; border: 1px solid #059669; }
        .yellow { background: #451a03; color: #fcd34d; border: 1px solid #d97706; }
        .red { background: #450a0a; color: #fca5a5; border: 1px solid #dc2626; }
        ul { text-align: left; padding-left: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">AL CIELO</h2>
    <small>SMART CARGO ADVISORY BY MAY ROGA</small>
</div>

<div class="box">
    <h3>PERFIL Y ORIGEN</h3>
    <div class="grid">
        <div>
            <label>ACTOR</label>
            <select id="actor">
                <option value="driver">CAMIONERO</option>
                <option value="forwarder">FORWARDER</option>
                <option value="owner">DUEÑO DE CARGA</option>
            </select>
        </div>
        <div>
            <label>FLUJO</label>
            <select id="movement">
                <option value="local">LOCAL (MIA)</option>
                <option value="transfer">TRANSFER</option>
                <option value="comat">COMAT</option>
            </select>
        </div>
    </div>
</div>

<div class="box">
    <h3>CLASIFICACIÓN DE CARGA</h3>
    <label>TIPO DE MERCANCÍA</label>
    <select id="cargo_type">
        <option value="gen">GENERAL CARGO</option>
        <option value="dg">DANGEROUS GOODS (DG)</option>
        <option value="per">PERISHABLE (PER)</option>
        <option value="avi">LIVE ANIMAL (AVI)</option>
        <option value="hum">HUMAN REMAINS (HUM)</option>
        <option value="pharma">PHARMA / MEDICAMENTOS</option>
        <option value="ice">DRY ICE ONLY</option>
    </select>

    <div class="grid">
        <div>
            <label>AERONAVE</label>
            <select id="aircraft">
                <option value="pax">PASSENGER (A330/A321)</option>
                <option value="cao">CARGO ONLY (767F/A330F)</option>
            </select>
        </div>
        <div>
            <label>MODALIDAD</label>
            <select id="consol">
                <option value="single">CARGA ÚNICA</option>
                <option value="consol">CONSOLIDADO</option>
            </select>
        </div>
    </div>
</div>

<div class="box">
    <h3>DETALLE DE PIEZAS</h3>
    <label>TIPO DE EMBALAJE</label>
    <select id="packaging">
        <option value="pallet_wd">PALLET MADERA (ISPM15)</option>
        <option value="pallet_pl">PALLET PLÁSTICO / METAL</option>
        <option value="drum">DRUMS (TAMBORES)</option>
        <option value="crate">CRATE (HUACAL)</option>
        <option value="box">LOOSE BOXES</option>
        <option value="uld">ULD (CONTENEDOR AEREO)</option>
    </select>
    
    <div class="grid" style="margin-top:10px;">
        <input type="number" id="L" placeholder="L (cm)">
        <input type="number" id="W" placeholder="W (cm)">
        <input type="number" id="H" placeholder="H (cm)">
        <input type="number" id="Kg" placeholder="Peso (Kg)">
    </div>
    <button class="btn-add" onclick="addPiece()">+ AGREGAR A MANIFIESTO</button>
    <div id="pieces_list" style="font-size: 0.8em; margin-top:10px; color:#cbd5e0;"></div>
    <button class="btn-clear" onclick="clearPieces()">BORRAR TODO</button>
</div>

<div class="box">
    <h3>ASISTENCIA POR VOZ</h3>
    <button onclick="startVoice()" style="background:#2d3748; color:white;">🎤 DESCRIBIR CARGA / EMBALAJE</button>
    <textarea id="voiceText" rows="2" placeholder="Describa irregularidades o detalles..."></textarea>
</div>

<button class="btn-main" onclick="sendData()">VERIFICAR PARA AVIANCA CARGO</button>

<div id="result"></div>

<script>
    let pieces = [];

    function addPiece() {
        const p = {
            l: document.getElementById('L').value,
            w: document.getElementById('W').value,
            h: document.getElementById('H').value,
            kg: document.getElementById('Kg').value
        };
        if(p.l && p.w && p.h && p.kg) {
            pieces.push(p);
            updateList();
            document.getElementById('L').value=''; document.getElementById('W').value=''; 
            document.getElementById('H').value=''; document.getElementById('Kg').value='';
        }
    }

    function updateList() {
        document.getElementById('pieces_list').innerHTML = pieces.map((p,i) => 
            `Pieza ${i+1}: ${p.l}x${p.w}x${p.h} cm - ${p.kg}Kg`).join('<br>');
    }

    function clearPieces() { pieces = []; updateList(); document.getElementById('result').innerHTML=''; }

    function startVoice() {
        let r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = "es-US";
        r.onresult = e => document.getElementById('voiceText').value = e.results[0][0].transcript;
        r.start();
    }

    async function sendData() {
        const payload = {
            actor: document.getElementById('actor').value,
            movement: document.getElementById('movement').value,
            cargo_type: document.getElementById('cargo_type').value,
            aircraft: document.getElementById('aircraft').value,
            consol: document.getElementById('consol').value,
            packaging: document.getElementById('packaging').value,
            pieces: pieces,
            notes: document.getElementById('voiceText').value
        };

        const res = await fetch("/api/check", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(payload)
        });
        const r = await res.json();
        
        let html = `
            <div class="status-card ${r.level}">
                <h2 style="margin:0;">${r.status}</h2>
                <p>Puntaje de Aceptación: ${r.score}%</p>
            </div>
            <div class="box">
                <h4 style="color:#fca5a5;">ACCIONES REQUERIDAS / ERRORES</h4>
                <ul>${r.errors.map(e => `<li>${e}</li>`).join('')}</ul>
                <h4 style="color:#fcd34d;">ADVERTENCIAS / ASESORÍA</h4>
                <ul>${r.warnings.map(w => `<li>${w}</li>`).join('')}</ul>
                <hr border="0" style="border-top:1px solid #2d3748;">
                <p><strong>Peso Total:</strong> ${r.total_weight} Kg | <strong>Volumen:</strong> ${r.total_vol.toFixed(2)} m³</p>
                <button onclick="window.print()" style="background:#4a5568; color:white;">GENERAR REPORTE PDF</button>
            </div>
        `;
        document.getElementById('result').innerHTML = html;
    }
</script>
</body>
</html>
