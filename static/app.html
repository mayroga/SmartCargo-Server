<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SMARTGOSERVER - Asesoría Completa de Carga</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px; color:#111; }
    h1 { text-align:center; color:#0a3d62; margin-bottom:20px; }
    .collapsible { background-color:#0a3d62; color:white; cursor:pointer; padding:10px; width:100%; border:none; text-align:left; outline:none; font-size:16px; border-radius:5px; margin-bottom:5px; }
    .active, .collapsible:hover { background-color:#062c47; }
    .content { padding:0 15px; display:none; overflow:hidden; background-color:#f9f9f9; border-radius:5px; margin-bottom:10px; }
    label { display:block; margin:8px 0 4px; font-weight:500; }
    input, select { padding:8px; width:100%; margin-bottom:10px; border-radius:4px; border:1px solid #ccc; }
    .docs, .tip, .checklist { background:#eef; padding:8px; margin:5px 0; border-radius:4px; font-size:14px; }
    .tip { font-style:italic; color:#555; }
    .result { font-size:16px; margin-top:15px; white-space:pre-wrap; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
    .alert { color:red; font-weight:bold; margin:5px 0; }
    .checklist input { margin-right:8px; width: auto; }
    .btn-evaluar { background-color:#0a3d62; color:white; font-weight:bold; cursor:pointer; border:none; padding:15px; width:100%; border-radius:5px; margin-top:10px; }
    .btn-borrar { background-color:#eb4d4b; color:white; font-weight:bold; cursor:pointer; border:none; padding:10px; width:100%; border-radius:5px; margin-top:10px; }
</style>
</head>
<body>

<h1>SMARTGOSERVER - Asesoría Completa de Carga Aérea</h1>

<button class="collapsible">I. Identificación y Rol</button>
<div class="content">
    <label for="rolUsuario">Rol del Usuario:</label>
    <select id="rolUsuario" onchange="updateRolFields()">
        <option value="">Seleccione</option>
        <option value="Dueño">Dueño</option>
        <option value="Forwarder">Forwarder</option>
        <option value="Chofer">Chofer / Camionero</option>
        <option value="AgenteWarehouse">Agente Warehouse</option>
        <option value="CounterAgent">Counter Agent</option>
    </select>
    <p id="avisoRol" class="tip"></p>

    <label for="awb">Número de Guía Aérea (AWB):</label>
    <input type="text" id="awb" placeholder="XXX-12345675">
    
    <label for="forwarder">Forwarder / Agente de Carga:</label>
    <input type="text" id="forwarder" placeholder="Ej: DHL, Kuehne + Nagel">
    
    <label for="origen">Origen:</label>
    <input type="text" id="origen" placeholder="Ej: MIA">
    <label for="destino">Destino:</label>
    <input type="text" id="destino" placeholder="Ej: BOG, LIM, SJO">
</div>

<button class="collapsible">II. Tipo de Carga y Documentos</button>
<div class="content">
    <label for="codigoCarga">Código IATA:</label>
    <select id="codigoCarga" onchange="mostrarDocumentos()">
        <option value="">Seleccione</option>
        <option value="GEN">GEN - General cargo</option>
        <option value="PER">PER - Perecedero</option>
        <option value="HUM">HUM - Human remains</option>
        <option value="VAL">VAL - Valores</option>
        <option value="AVI">AVI - Animales</option>
        <option value="DGR">DGR - Mercancía peligrosa</option>
    </select>
    <div id="documentosObligatorios" class="docs tip">Seleccione un tipo de carga para ver documentos.</div>
</div>

<button class="collapsible">III. Dimensiones, Peso y Pallets</button>
<div class="content">
    <label for="piezas">Número de piezas:</label>
    <input type="number" id="piezas" min="1" value="1">
    <label for="pesoTotal">Peso Total (kg):</label>
    <input type="number" id="pesoTotal" min="0" oninput="calcularVolumen()">
    <label for="largo">Largo (cm):</label>
    <input type="number" id="largo" min="0" oninput="calcularVolumen()">
    <label for="ancho">Ancho (cm):</label>
    <input type="number" id="ancho" min="0" oninput="calcularVolumen()">
    <label for="alto">Alto (cm):</label>
    <input type="number" id="alto" min="0" oninput="calcularVolumen()">
    
    <label for="volumen">Volumen (m³):</label>
    <input type="text" id="volumen" readonly>
    <label for="pesoVolumetrico">Peso Volumétrico (kg):</label>
    <input type="text" id="pesoVolumetrico" readonly>

    <label for="tipoPallet">Tipo de Pallet / ULD:</label>
    <select id="tipoPallet" onchange="mostrarEmbalaje()">
        <option value="">Seleccione</option>
        <option value="Loose">Loose Cargo</option>
        <option value="PMC">PMC Pallet</option>
        <option value="PAG">PAG Pallet</option>
        <option value="Contenedor">Contenedor</option>
    </select>
    <div id="infoEmbalaje" class="tip">Seleccione pallet para detalles.</div>
    <p id="alertDimensiones" class="alert"></p>
</div>

<button class="collapsible">IV. Evidencia Visual y Seguridad</button>
<div class="content">
    <label for="fotoCarga">Subir Foto de la Carga / Etiquetas (Opcional):</label>
    <input type="file" id="fotoCarga" accept="image/*">
    
    <label for="knownShipper">Known Shipper:</label>
    <select id="knownShipper">
        <option value="">Seleccione</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
    </select>

    <h3>Checklist de Rectificación</h3>
    <div class="checklist">
        <label><input type="checkbox" id="chkDryIce"> Dry Ice Declarado</label>
        <label><input type="checkbox" id="chkDGR"> Mercancía DGR</label>
        <label><input type="checkbox" id="chkEmbalaje"> Embalaje Adecuado</label>
        <label><input type="checkbox" id="chkEtiquetas"> Etiquetas Visibles</label>
        <label><input type="checkbox" id="chkFleje"> Fleje Seguro</label>
        <label><input type="checkbox" id="chkOrientacion"> Orientación Correcta</label>
    </div>
</div>

<button class="collapsible">V. Validación Final y Resultado</button>
<div class="content" id="faseFinal">
    <button class="btn-evaluar" onclick="evaluarCarga()">EVALUAR ASESORÍA TÉCNICA</button>
    <button class="btn-borrar" onclick="borrarTodo()">BORRAR DATOS</button>
    <div id="resultadoFinal" class="result" style="display:none;"></div>
</div>

<button class="collapsible">VI. Desglose de Documentos</button>
<div class="content">
    <button onclick="mostrarDocumentosDetallados()">Mostrar y Escuchar Desglose</button>
    <div id="documentosDetallados" class="docs" style="display:none; margin-top:10px;"></div>
</div>

<script>
// Manejo de secciones colapsables
document.querySelectorAll(".collapsible").forEach(btn => {
    btn.addEventListener("click", function() {
        this.classList.toggle("active");
        let content = this.nextElementSibling;
        content.style.display = (content.style.display === "block") ? "none" : "block";
    });
});

function updateRolFields() {
    const rol = document.getElementById('rolUsuario').value;
    const aviso = document.getElementById('avisoRol');
    aviso.innerText = (rol === "Chofer" || rol === "AgenteWarehouse") ? "Tip: Revise sellos y manifiestos." :
                      (rol === "Forwarder") ? "Tip: Validar documentación y AWB." : "";
}

function mostrarDocumentos() {
    const tipo = document.getElementById('codigoCarga').value;
    const docs = {
        "GEN":"AWB, Packing List, Invoice, Known Shipper",
        "PER":"AWB, Packing List, Fitosanitario, FDA, Known Shipper",
        "HUM":"AWB, Death Certificate, Embalming Certificate",
        "VAL":"AWB, Invoice, Declaración de valor",
        "AVI":"AWB, Certificado Sanitario, Known Shipper",
        "DGR":"AWB, Shipper Declaration x2, MSDS, Known Shipper"
    };
    document.getElementById('documentosObligatorios').innerText = docs[tipo] || "Seleccione un tipo de carga";
}

function calcularVolumen() {
    const L = +document.getElementById('largo').value || 0;
    const W = +document.getElementById('ancho').value || 0;
    const H = +document.getElementById('alto').value || 0;
    const vol = (L * W * H) / 1000000;
    document.getElementById('volumen').value = vol.toFixed(3) + ' m³';
    document.getElementById('pesoVolumetrico').value = (vol * 167).toFixed(2);
    
    let msg = "";
    if(H > 160) msg = "⚠ Solo Main Deck.";
    if(H > 244) msg = "⚠ Excede altura máxima.";
    document.getElementById('alertDimensiones').innerText = msg;
}

function mostrarEmbalaje() {
    const tipo = document.getElementById('tipoPallet').value;
    const info = {
        "Loose": "Cargue en BOXES/CRATES. Fleje y etiquetas obligatorias.",
        "PMC": "Palet PMC: Etiquetas hacia afuera, red de seguridad tensa.",
        "PAG": "Palet PAG: Verificar fleje y orientación UPSIDE.",
        "Contenedor": "Contenedor: Carga uniforme, asegurar DGR por separado."
    };
    document.getElementById('infoEmbalaje').innerText = info[tipo] || "Seleccione un tipo de pallet.";
}

// ENVÍO DE DATOS AL SERVIDOR (SmartCargo-Server)
async function evaluarCarga() {
    const resDiv = document.getElementById('resultadoFinal');
    resDiv.style.display = "block";
    resDiv.innerHTML = "Analizando carga con especialistas de AL CIELO...";

    const formData = new FormData();
    const payload = {
        rolUsuario: document.getElementById('rolUsuario').value,
        awb: document.getElementById('awb').value,
        codigoCarga: document.getElementById('codigoCarga').value,
        piezas: document.getElementById('piezas').value,
        pesoTotal: document.getElementById('pesoTotal').value,
        alto: document.getElementById('alto').value,
        pesoVolumetrico: document.getElementById('pesoVolumetrico').value,
        knownShipper: document.getElementById('knownShipper').value,
        chkDGR: document.getElementById('chkDGR').checked,
        chkEmbalaje: document.getElementById('chkEmbalaje').checked
    };

    formData.append("data", JSON.stringify(payload));
    const fotoFile = document.getElementById('fotoCarga').files[0];
    if (fotoFile) {
        formData.append("foto", fotoFile);
    }

    try {
        const response = await fetch('/api/evaluar', {
            method: 'POST',
            body: formData // Importante: No poner headers de JSON aquí
        });
        const result = await response.json();
        
        let html = `<div style="border-left: 5px solid #0a3d62; padding-left: 10px;">`;
        html += `<h3>Estado Final: ${result.status}</h3>`;
        if (result.errores.length > 0) {
            html += `<ul style="color:red;">${result.errores.map(e => `<li>${e}</li>`).join('')}</ul>`;
        }
        html += `<div class="docs" style="background:#fff; border:1px solid #ccc; white-space: pre-wrap;">${result.asesoria_tecnica}</div>`;
        html += `<p style="font-size:10px; color:#888; margin-top:10px;">Procesado vía: ${result.fuente}</p>`;
        html += `</div>`;
        resDiv.innerHTML = html;
    } catch (err) {
        resDiv.innerHTML = "❌ Error al conectar con SmartCargo-Server.";
    }
}

function borrarTodo() {
    if(confirm("¿Seguro que desea limpiar todos los campos?")) {
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        document.getElementById('resultadoFinal').innerHTML = '';
        document.getElementById('resultadoFinal').style.display = 'none';
        window.speechSynthesis.cancel();
    }
}

function mostrarDocumentosDetallados() {
    const cont = document.getElementById('documentosDetallados');
    cont.style.display = 'block';
    const texto = "Rectificación de documentos: AWB sin tachaduras, Packing List detallado, Shipper Declaration original. Verifique etiquetas DGR y fitosanitarios.";
    cont.innerText = texto;
    const utterance = new SpeechSynthesisUtterance(texto);
    utterance.lang = 'es-ES';
    speechSynthesis.speak(utterance);
}
</script>
</body>
</html>
